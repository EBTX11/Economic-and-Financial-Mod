japan_events.1.t: "Letters for All"
japan_events.1.d: "As modernist thinkers gain influence within the [ROOT.GetCountry.GetName], the limitations of the old courier system have become increasingly apparent. Whether through the dismantling of the feudal order or the spread of literacy among the population, the conditions now exist for a centralized postal service capable of supporting a modern state."
japan_events.1.f: "Messengers, marked with the government seal, ran through the streets with their pouches, carrying an unusual amount of letters. In the capital, officials bent over maps, adjusting routes and counting stamps throughout the night. Merchants grumbled at the disruption of old courier networks, while curious children pressed their first letters into the new post boxes. The country, once divided by custom, was beginning to speak with one voice."
japan_events.1.a: "Fully fund a national rollout."
japan_events.1.b: "Focus on major urban centers."
japan_events.1.c: "Rural areas take priority."
japan_events.1.e: "Entrust the reform to [SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')]."
japan_events.1.g: "Preserve the old courier system."
