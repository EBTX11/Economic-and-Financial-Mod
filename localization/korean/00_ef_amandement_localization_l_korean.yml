amendment_bimetallic_ratio_15_5_fra: "Germinal Bimetallic Ratio"
amendment_bimetallic_ratio_15_5_fra_desc: "The legal gold–silver parity is fixed according to the Germinal monetary system, establishing a bimetallic ratio of 15.5 to 1."

amendment_bimetallic_ratio_15_5_latine_union: "Latin Monetary Parity"
amendment_bimetallic_ratio_15_5_latine_union_desc: "The gold–silver ratio is aligned with the standards of the Latin Monetary Union, harmonizing bimetallic coinage across participating states."

amendment_usa_bimetallic_ratio_1834: "Revised American Bimetallic Ratio"
amendment_usa_bimetallic_ratio_1834_desc: "The gold–silver parity is adjusted in accordance with the Coinage Act of 1834, raising the legal ratio to favor silver over gold."

amendment_usa_bimetallic_ratio_1873: "End of Free Silver Coinage"
amendment_usa_bimetallic_ratio_1873_desc: "The free coinage of silver is effectively suspended, undermining the bimetallic system and preparing the transition toward a gold-based monetary standard."

amendment_spain_bimetallic_ratio_traditional: "Traditional Spanish Bimetallic Ratio"
amendment_spain_bimetallic_ratio_traditional_desc: "The gold–silver parity reflects long-standing Spanish monetary practices shaped by extensive silver production and colonial circulation."

amendment_german_bimetallic_ratio_conservative: "Conservative German Bimetallic Parity"
amendment_german_bimetallic_ratio_conservative_desc: "The monetary system maintains a cautious gold–silver ratio, favoring stability and continuity over rapid adjustment to international market conditions."

amendment_netherlands_bimetallic_ratio: "Dutch Administrative Bimetallic Ratio"
amendment_netherlands_bimetallic_ratio_desc: "The gold–silver parity is administratively aligned with neighboring monetary systems, preserving bimetallic circulation without formal treaty obligations."
