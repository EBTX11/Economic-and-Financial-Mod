japan_events.4.t: "The Westernization of Names"
japan_events.4.d: "As the [ROOT.GetCountry.GetName] conducts diplomacy and trade with foreign powers, questions have arisen over how [GetCulture('japanese').GetName] names should be rendered in treaties, correspondence, and official documents. Western representatives increasingly expect names to follow their own conventions, placing the given name before the family name."
japan_events.4.f: "Clerks leaned over their desks, pens scratching across letters for foreign officials. They whispered among themselves, debating whether clarity abroad justified a change to long-held tradition. A hand holding a seal paused over a paper, lingering for a moment before the ink was set."
japan_events.4.a: "Adopt Western conventions in foreign correspondence."
japan_events.4.b: "Maintain the traditional order of names."
japan_events.4.c: "This is a new era—adopt the Western convention for all cases."
japan_single_fire_events_name_order_westernized_mod: "Westernized Name Conventions"
japan_single_fire_events_name_order_traditional_mod: "Preserved Traditional Name Order"
japan_single_fire_events_name_order_resistance_mod: "Cultural Naming Dispute"
japan_single_fire_events_name_order_approval_mod: "Administrative Clarification"

japan_events.5.t: "The Question of Kanbun"
japan_events.5.d: "Decrees, regulations, and records have long relied on classical language understood only by the educated few. Reformers have argued that administration conducted in Vernacular Japanese would improve clarity and efficiency, while others have insisted that tradition itself has lent authority to the written word."
japan_events.5.f: "Bureaucrats worked late into the night, tirelessly rewording directives with quiet determination. One paused to rub his eyes, then pressed on, careful not to miss a single mark. Each scratch of the pen felt like a small battle against confusion and disorder."
japan_events.5.a: "Promote Vernacular Japanese in official administration."
japan_events.5.b: "Permit limited reform in internal correspondence."
japan_events.5.c: "Retain classical Kanbun in all state documents."
japan_language_partial_language_reform_mod: "Limited Administrative Language Reform"
japan_single_fire_events_language_reform_support_mod: "Adherence to Vernacular Administration"
japan_single_fire_events_language_traditionalist_opposition_mod: "Opposition to Vernacular Administration"

