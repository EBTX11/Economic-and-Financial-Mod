japan_events.2.t: "The Unequal Calendars"
japan_events.2.d: "Japan's centuries-old lunisolar calendar is increasingly out of sync with the Western world. Merchants have complained of difficulties in coordinating with foreign partners, whilst the populace has reported confusion over misaligned festivals, rents, and tax deadlines."
japan_events.2.f: "Clerks sat bent over their books, copying each line carefully. Their stacks of paper grew taller with every repetition, and their eyes ached from tracking months that no longer existed. The old calendar was quietly slipping away."
japan_events.2.f_telegraph: "Couriers hurried through the streets, delivering message after message. People paused to read each notice, their heads spinning as dates shifted faster than they could follow. News travelled instantly, and the old calendar vanished almost overnight."
japan_events.2.a: "Proceed with calendar reform immediately."
japan_events.2.b: "Utilize the [GetTechnology('electric_telegraph').GetName] to expedite changes."
japan_events.2.c: "Preserve the old system for now."
