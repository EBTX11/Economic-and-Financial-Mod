je_ryukyu_rivalry:1 "The Hidden Domain"
je_ryukyu_rivalry_reason:1 "Since the #b invasion of 1609#! by the forces of the #b Satsuma Domain#!, the Kingdom of [SCOPE.sCountry('ryukyu_scope').GetName] has existed as a domain of [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')] in all but name. Despite its subjugation by the Satsuma, the court at Shuri has continued to receive investiture from [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetName, 'CHI')] and dispatch tribute missions to Beijing, preserving the appearance of independence.\n\nThis arrangement has endured for generations; however, the balance of power in East Asia has shifted with the growing presence of western powers and the opening of Japan. Both parties must now clarify their relation to Ryukyu, triggering an open contest for the southern islands.\n$TOOLTIP_DELIMITER$\n@warning! #r Failure:#! \n [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag]'s Assertiveness reaches #variable 100%#!\n [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetNameNoFlag, 'JAP')] or [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetNameNoFlag, 'CHI')] are [Concept('concept_subject','Subjugated')] or #b Annexed#!\n [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] is [Concept('concept_subject','Subjugated')] or #b Annexed#! by a non-involved country\n\n@information! To Sway:\n Have a #v Money Transfer#! [concept_article] (#g @money!0.1-2K#!) with [SCOPE.sCountry('ryukyu_scope').GetName]\n Have #v Friendly#! or #v Amicable#! [concept_relations] with [SCOPE.sCountry('ryukyu_scope').GetName]\n Have the most [concept_naval_power_projection]\n Have [SCOPE.sCountry('ryukyu_scope').GetName] owe an [concept_obligation] \n Use the [concept_journal_entry] actions"
#je_ryukyu_rivalry_goal:1 "You are asserting more influence over [SCOPE.sCountry('ryukyu_scope').GetName] than your rival."
je_ryukyu_rivalry_victory_japan: "To achieve a #b Japanese#! victory:\n"
je_ryukyu_rivalry_victory_china: "To achieve a #b Chinese#! victory:\n"
je_ryukyu_rivalry_victory_ryukyu: "To achieve a #b Ryukyuan#! victory:\n"
ryukyu_rivalry_sway_tt: "Swaying Ryukyu fully to one's side breaks any hold opponents may have over her, re-enabling [Concept('concept_subject','Subjugation')].\n\nTo Sway:\n Have a #v Money Transfer#! [concept_article] (#g @money!0.1-2K#!) with Ryukyu\n Have #v Friendly#! or #v Amicable#! [concept_relations] with Ryukyu\n Have the most [concept_naval_power_projection]\n Have Ryukyu owe an [concept_obligation]\n Use the [concept_journal_entry] actions"
ryukyu_rivalry_assertiveness_tt: "Ryukyu will assert her neutrality once the bar reaches #v 100%#!. Once asserted, she can no longer be made a [concept_subject] via [concept_diplomatic_action] for #v 50#! years.\n\nThe Assertiveness bar will increase by #g 0.5#! every month if the Sway bar remains between #v -20#! and #v +20#!.\n\nRyukyu can assert her neutrality by playing Japan and China against one another, using the available actions that affect Sway. \n\nExamples:\n Have a #v Money Transfer#! [concept_article] (#g @money!0.1-2K#!) with both or neither sides\n Have #v Friendly#! or #v Amicable#! [concept_relations] with both or neither sides\n Owe both or neither side an [concept_obligation]\n Cancel or sign the aforementioned treaties when one side gets the upper or lower hand"
