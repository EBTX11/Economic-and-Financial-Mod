 concept_presence: "Presence"
 concept_presence_desc: "The $concept_presence$ of a [concept_fleet] affects how effectively its [Concept('concept_admiral','$concept_admirals$')] carry out their [Concept('concept_order','$concept_orders$')]. $concept_presence$ builds up over time while a $concept_fleet$ is stationary in a [concept_sea_node]."

 concept_mission_efficiency: "Mission Efficiency"
 concept_mission_efficiency_desc: "$concept_mission_efficiency$ determines how efficiently a [concept_fleet] carries out its [concept_naval_mission]. It is based on the number of [Concept('concept_sea_node', '$concept_sea_regions_short$')] assigned to the mission area and the fleet's current [concept_presence]."

 concept_party_whip:0 "Party Whip"
 concept_party_whip_short:0 "Whip"
 concept_party_whip_desc:0 "The $concept_party_whip$ keeps the rest of their [concept_party] member's [Concept('concept_ideology','$concept_ideologies$')] in check. When [concept_in_government], the $concept_party_whip$ partially overrides the ideological [concept_law] stances on the other [Concept('concept_interest_group','$concept_interest_groups$')] in the $concept_party$ for the purposes of calculating [concept_ideological_incoherence]. The [concept_party_leader] acts as the $concept_party_whip_short$."

 concept_economy_health:0 "Economy Health"
 concept_economy_health_healthy:0 "Healthy Economy"
 concept_economy_health_healthy_short:0 "Healthy"
 concept_economy_health_unhealthy:0 "Unhealthy Economy"
 concept_economy_health_unhealthy_short:0 "Unhealthy"
 concept_economy_health_desc:1 "A [Concept('concept_country','$concept_country_possessive$')] economy is considered $concept_economy_health_healthy_short$ if #italic either#!:\n#indent_newline:3 • its fixed incomes exceed its fixed expenses#!\n#indent_newline:3 • its [concept_principal] is less than half their total [concept_credit]"

 concept_bankroll:0 "$bankroll$"
 concept_bankrolling:0 "Bankrolling"
 concept_bankrolls: "Bankrolls"
 concept_bankroll_desc: "One [concept_country] pays part of its income to another, based on the weekly tax revenue of the recipient. This action has a chance each month to generate an [concept_obligation] towards the bankrolling [concept_country] so long as it was not given as part of a [concept_sway] offer."

 concept_fund_lobbies: "Fund Lobbies"
 concept_funding_lobbies: "Funding Lobbies"
 concept_fund_lobbies_desc: "One [concept_country] pays part of its income to the [Concept('concept_pop', '$concept_pops$')] of another, based on the weekly tax revenue of the recipient. This action has a chance each week to create or strengthen friendly [Concept('concept_political_lobby', '$concept_political_lobbies_short$')] in the target $concept_country$."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED MAY 6, 2022

 concept_subject:0 "Subject"
 concept_subjects:1 "Subjects"
 concept_subject_possessive:0 "Subject’s"
 concept_subject_desc:1 "A [concept_country] whose [concept_autonomy] and right to self-determination is limited to varying degree by an [concept_overlord]. $concept_subject$ relationships are a type of [concept_diplomatic_pact] that $concept_countries$ can be asked to join or forced into with a [concept_diplomatic_play]. The precise effects depends on the [concept_subject_type], but tend to include being forced into their $concept_overlord$'s [concept_market], having to give up a part of their [Concept('concept_treasury','$concept_treasury_possessive$')] income, decreased [concept_prestige], the inability to start your own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] or freely decide which side to support in them, and inheriting the $concept_overlord$'s [concept_ruler] as your [concept_head_of_state].\n\n$concept_subjects$ can be liberated with a $concept_diplomatic_play$ started by themselves or a third party. Some $concept_subject$ types can also be targeted by a $concept_diplomatic_play_short$ by their $concept_overlord$ to reduce their [concept_autonomy] further, or even become fully #b Annexed#! by them."

 concept_subject_type: "Subject Type"
 concept_subject_types: "Subject Types"
 concept_subject_type_desc: "There are a total of #v [GetDataModelSize(GetSubjectTypes)]#! different $concept_subject_types$:#indent_newline:3 \n[GetSubjectTypesList]#!\nSee the $SUBJECT_TYPES_VISUALIZATION$ on the #b Diplomacy#! panel for more in-depth details on the effects of each type."

 concept_overlord:0 "Overlord"
 concept_overlords: "Overlords"
 concept_overlord_possessive:0 "Overlord’s"
 concept_overlord_desc:0 "The dominant [concept_country] in a [concept_subject] relationship, who derive a number of benefits from the [concept_diplomatic_pact] while (usually) having to pay [concept_influence] for it."

 concept_liberty_desire: "Liberty Desire"
 concept_liberty_desire_desc: "The demand for [concept_autonomy] in a [concept_subject] [concept_country] is measured by its $concept_liberty_desire$. The $concept_subject$ will be loyal and stable while at low levels, while high levels of $concept_liberty_desire$ could result in calls for greater self-governance, reduced obligations, or even armed revolt for independence."

 concept_great_power:0 "Great Power"
 concept_great_powers:1 "Great Powers"
 concept_great_power_desc:3 "Those few [Concept('concept_country', '$concept_countries$')] that run the world through global empires or absolute local dominance are considered to be $concept_great_power$ [concept_rank]. They are in a constant standoff with other $concept_great_powers$ for an edge, and always wary of plucky [Concept('concept_major_power','$concept_major_powers$')] trying to ascend to greatness at their expense.[AddLocalizationIf(GetPlayer.IsValid,'concept_great_power_desc_added')]"
 concept_great_power_desc_added:0 "\n\n$concept_great_powers$ gain the following benefits:\n[GetRankModifier('great_power').GetDesc]"

 concept_major_power:0 "Major Power"
 concept_major_power_short:0 "Major"
 concept_major_powers:0 "Major Powers"
 concept_major_power_desc:2 "[Concept('concept_country', '$concept_countries$')] of $concept_major_powers$ [concept_rank] have established themselves as notable through their regional presence. While they are not yet strong enough to establish a truly global empire they can be a major local force to be reckoned with, and the most powerful among them may aspire to ascend to [concept_great_power] status.[AddLocalizationIf(GetPlayer.IsValid,'concept_major_power_desc_added')]"
 concept_major_power_desc_added:0 "\n\n$concept_major_powers$ gain the following benefits:\n[GetRankModifier('major_power').GetDesc]"

 concept_minor_power:0 "Minor Power"
 concept_minor_powers:0 "Minor Powers"
 concept_minor_power_desc:3 "[Concept('concept_country', '$concept_countries$')] of $concept_minor_power$ [concept_rank] are pawns in the imperialist games of [Concept('concept_major_power','$concept_major_power_short$')] and [Concept('concept_great_power','$concept_great_powers$')], who often use them as buffer $concept_countries$, [Concept('concept_puppet','$concept_puppets$')], or captive [Concept('concept_market','$concept_markets$')].[AddLocalizationIf(GetPlayer.IsValid,'concept_minor_power_desc_added')]"
 concept_minor_power_desc_added:0 "\n\n$concept_minor_powers$ gain the following benefits:\n[GetRankModifier('minor_power').GetDesc]"

 concept_insignificant_power:0 "Insignificant Power"
 concept_insignificant_power_short:0 "Insignificant"
 concept_insignificant_power_desc:2 "[Concept('concept_country', '$concept_countries$')] with such low [concept_prestige] they don't even qualify to be considered [Concept('concept_minor_power','$concept_minor_powers$')] are of $concept_insignificant_power_short$ [concept_rank]. They struggle for their right to self-determination while trying not to appear too inconvenient to nearby [Concept('concept_major_power','$concept_major_power_short$')] and [Concept('concept_great_power','$concept_great_powers$')].[AddLocalizationIf(GetPlayer.IsValid,'concept_insignificant_power_desc_added')]"
 concept_insignificant_power_desc_added:0 "\n\n$concept_insignificant_power_short$ $concept_countries$ gain the following benefits:\n[GetRankModifier('insignificant_power').GetDesc]"

 concept_unrecognized_power:0 "Unrecognized Power"
 concept_unrecognized_power_short:0 "Unrecognized"
 concept_unrecognized_powers:0 "Unrecognized Powers"
 concept_unrecognized_regional_power:0 "Unrecognized Regional Power"
 concept_unrecognized_major_power:0 "Unrecognized Major Power"
 concept_unrecognized_power_desc:2 "$concept_unrecognized_powers$ are [Concept('concept_country','$concept_country_polities$')] perceived as inferior and uncivilized by the reigning [Concept('concept_great_power','$concept_great_powers$')], who regard them as little more than potential future conquests. As a result their [concept_prestige] is penalized and they can be targeted with more severe [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]. They are also restricted in what [Concept('concept_rank','$concept_ranks$')] they may reach, no matter how much $concept_prestige$ they acquire.[AddLocalizationIf(GetPlayer.IsValid,'concept_unrecognized_power_desc_added')]"
 concept_unrecognized_power_desc_added:1 "\n\nAn $concept_unrecognized_power$ that wishes to remove these penalties must claim recognition from completing the $je_earn_recognition$ [concept_journal_entry]."

 concept_protectorate:0 "Protectorate"
 concept_protectorates: "Protectorates"
 concept_protectorate_desc:2 "A $concept_protectorate$ ([concept_subject]) is an autonomous [concept_subject_type] able to start their own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]."

 concept_puppet:0 "Puppet"
 concept_puppets:0 "Puppets"
 concept_puppet_desc:2 "[Concept('concept_recognized_power','$concept_recognized_powers$')] may turn a weaker [concept_country] into their $concept_puppet$ ([concept_subject]). A $concept_puppet$ is a [concept_subject_type] that cannot start their own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] yet are forced to join their [Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')], and must also pay #v 30%#! of their [concept_treasury] income to their $concept_overlord$ each week. A $concept_puppet$'s [concept_rank] cannot increase to match or exceed their $concept_overlord$'s, and their $concept_overlord$ may target them with the #b Annexation#! $concept_diplomatic_play$."

 concept_personal_union:0 "Personal Union"
 concept_personal_unions: "Personal Unions"
 concept_personal_union_desc:4 "Two [Concept('concept_country', '$concept_countries$')] with the [SelectLocalization(GetPlayer.IsValid,'concept_personal_union_desc_added','Monarchy')] [concept_law] may be joined together in a $concept_personal_union$ ([concept_subject]), a [concept_subject_type] where the [Concept('concept_overlord','$concept_overlord_possessive$')] [concept_ruler] is the [concept_head_of_state] in both $concept_countries$. The subject cannot start their own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')], yet are forced to join their $concept_overlord$'s [Concept('concept_war','$concept_wars$')]. The [concept_diplomatic_pact] will break if the $concept_overlord$ abolishes the $law_monarchy$."
 concept_personal_union_desc_added:0 "[GetLawType('law_monarchy').GetName]"

 concept_dominion:0 "Dominion"
 concept_dominions: "Dominions"
 concept_dominion_desc:1 "[Concept('concept_recognized_power','$concept_recognized_powers$')] may turn a weaker [concept_country] into their $concept_dominion$ ([concept_subject]). A $concept_dominion$ is a more autonomous [concept_subject_type] that are able to start their own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] and are forced to join their [Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')]. They must pay #v 25%#! of their [concept_treasury] income to their $concept_overlord$ each week."

 concept_colony_subject: "Colony"
 concept_colony_subjects: "Colonies"
 concept_colony_subject_desc: "[Concept('concept_recognized_power','$concept_recognized_powers$')] may turn a weaker [concept_country] into their $concept_colony$ ([concept_subject]). A $concept_colony$ is a [concept_subject_type] that cannot start their own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] yet are forced to join their [Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')], and must also pay #v 30%#! of their [concept_treasury] income to their $concept_overlord$ each week. A $concept_colony$'s [concept_rank] cannot increase to match or exceed their $concept_overlord$'s, and their $concept_overlord$ may target them with the #b Annexation#! $concept_diplomatic_play$."

 concept_chartered_company: "Chartered Company"
 concept_chartered_companies: "Chartered Companies"
 concept_chartered_company_desc: "In special circumstances, [Concept('concept_recognized_power','$concept_recognized_powers$')] may establish a $concept_chartered_company$ ([concept_subject]). A $concept_chartered_company$ is a highly autonomous [concept_subject_type] that are able to start their own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] and are forced to join their [Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')]. There are also special restrictions on reducing the [concept_autonomy], and their base [concept_liberty_desire] gain is greatly reduced. They must pay #v 40%#! of their [concept_treasury] income to their $concept_overlord$ each week."

 concept_tributary:0 "Tributary"
 concept_tributaries: "Tributaries"
 concept_tributary_desc:1 "[Concept('concept_unrecognized_power','$concept_unrecognized_powers$')] may turn a weaker [concept_country] into their $concept_tributary$ ([concept_subject]). A $concept_tributary$ is a more autonomous [concept_subject_type] that are able to start their own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] and are not forced to join their [Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')]. They must pay #v 20%#! of their [concept_treasury] income to their $concept_overlord$ each week."

 concept_vassal:0 "Vassal"
 concept_vassals: "Vassals"
 concept_vassalize:0 "Vassalize"
 concept_vassal_desc:1 "[Concept('concept_unrecognized_power','$concept_unrecognized_powers$')] may turn a weaker [concept_country] into their $concept_vassal$ ([concept_subject]). A $concept_vassal$ is a [concept_subject_type] that cannot start their own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] yet are forced to join their [Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')], and must also pay #v 30%#! of their [concept_treasury] income to their $concept_overlord$ each week."

 concept_crown_land_subject:0 "Crown Land"
 concept_crown_land_subjects: "Crown Lands"
 concept_crown_land_subject_desc:1 "A $concept_crown_land_subject$ is a [concept_subject_type] that cannot start their own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] yet are forced to join their [Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')], and must also pay #v 40%#! of their [concept_treasury] income to their $concept_overlord$ each week. A $concept_crown_land_subject$'s [concept_rank] cannot increase to match or exceed their $concept_overlord$'s, and their $concept_overlord$ may target them with the #b Annexation#! $concept_diplomatic_play$."

 concept_observer_mode:0 "Observer Mode"
 concept_observer:0 "Observer"
 concept_observe:0 "Observe"
 concept_observing:0 "Observing"
 concept_observer_mode_desc:1 "An $concept_observing$ player has full access to the user interface and insight into what is happening in the game, but cannot make any gameplay changes."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED MAY 5, 2022

 concept_trade: "Trade"
 concept_trading: "Trading"
 concept_importing: "Importing"
 concept_imports: "Imports"
 concept_import: "Import"
 concept_imported: "Imported"
 concept_exporting: "Exporting"
 concept_exports: "Exports"
 concept_export: "Export"
 concept_exported: "Exported"
 concept_trade_desc: "$concept_trade$ is the process of $concept_importing$ and $concept_exporting$ [Concept('concept_good','$concept_goods$')]. Most $concept_trade$ is conducted autonomously by a [GetBuildingType('building_trade_center').GetName] via the [concept_world_market], but [Concept('concept_country','$concept_countries$')] can also set up [Concept('concept_treaty', '$concept_treaties$')] to trade $concept_goods$ between them directly. $concept_trade$ can be an effective way for $concept_countries$ to improve their economic situation."

 concept_trade_revenue: "Trade Revenue"
 concept_trade_revenue_desc: "[concept_trade] generates revenue for the [SelectLocalization(GetPlayer.IsValid,'concept_trade_revenue_desc_added','Trade Center')] managing it, depending on the [concept_market_price] difference and the volume traded. [concept_tariffs] reduce the $concept_trade_revenue$ generated."
 concept_trade_revenue_desc_added: "[GetBuildingType('building_trade_center').GetName]"

 concept_trade_privilege: "Trade Privilege"
 concept_trade_privileges: "Trade Privileges"
 concept_trade_privilege_desc: "A type of [concept_treaty] [concept_article] granted by one [concept_market_owner] to another. It affects every [concept_country] in the receiver's [concept_market], increasing their [concept_trade_advantage] relative to how much of the [concept_trade] is conducted with the giver's $concept_market$."

 concept_trade_advantage: "Trade Advantage"
 concept_relative_trade_advantage: "Relative Advantage"
 concept_trade_advantage_short: "Advantage"
 concept_trade_advantage_desc: "$concept_trade_advantage$ is the value that determines the [concept_import_price] and [concept_export_price] for a particular [GetBuildingType('building_trade_center').GetName] and therefore also directly affects the amount of [Concept('concept_good','$concept_goods$')] traded. It is influenced by factors such as the [GetBuildingType('building_trade_center').GetName] level, the [Concept('concept_market_area','$concept_market_area_possessive$')] share of global production of a $concept_good$, [Concept('concept_interest','$concept_interests$')] in relevant [Concept('concept_strategic_region','$concept_strategic_regions$')] and [Concept('concept_trade_privilege','$concept_trade_privileges$')]. $concept_trade_advantage$ is calculated per $concept_good$, per direction, so the $concept_trade_advantage$ differs for $concept_importing$ Coal and $concept_exporting$ Fabric for example."

 concept_trade_potential: "Trade Potential"
 concept_trade_potential_desc: "$concept_trade_potential$ is a rough approximation for the potential to [Concept('concept_trade','$concept_import$')] or [Concept('concept_trade','$concept_export$')] a [concept_good] in a particular [concept_state]. It considers numerous factors such as the the [concept_local_price], the [concept_world_market_price], [concept_trade_advantage], the difference between [concept_good_production] and [concept_good_consumption], as well as [concept_tariffs] and [concept_subventions]. \n\n@information! $concept_trade_potential$ should #b not#! be considered an accurate predictor of trade volumes, but is useful to determine which $concept_goods$ a $concept_state$ is likely to $concept_trade$ more of if it has free $concept_trade_capacity$."

 concept_trade_capacity: "Trade Capacity"
 concept_trade_capacity_usage: "Trade Capacity Usage"
 concept_trade_capacity_desc: "$concept_trade_capacity$ is generated by [GetBuildingType('building_trade_center').GetName] levels and used to conduct [concept_trade] with the [concept_world_market]. The quantity of [Concept('concept_good','$concept_goods$')] traded per $concept_trade_capacity$ varies per $concept_good$."

 concept_market_area: "Market Area"
 concept_market_areas: "Market Areas"
 concept_market_area_possessive: "Market Area’s"
 concept_market_area_desc: "$concept_market_areas$ are parts of a [concept_market] that are connected via land or straits. There is always one [concept_world_market_hub] per $concept_market_area$ through which it conducts [concept_trade] with the [concept_world_market]."

 concept_traded_quantity: "Traded Quantity"
 concept_traded_quantity_desc: "The amount of a [concept_good] that is [Concept('concept_trade', '$concept_imported$')] or $concept_exported$ with each [concept_trade_capacity] used."

 concept_tariffs: "Tariffs"
 concept_tariff: "Tariff"
 concept_tariff_rate: "Tariff Rate"
 concept_tariffs_desc: "$concept_tariffs$ are a fee that [Concept('concept_country', '$concept_countries$')] can collect from a [GetBuildingType('building_trade_center').GetName] for each [Concept('concept_trade', '$concept_imported$')] or $concept_exported$ [concept_good]. Therefore, they will make it less attractive to conduct [concept_trade] of a particular [concept_good], for example to ensure critical military $concept_goods$ remain in the $concept_country$. A $concept_country_possessive$ [Concept('concept_law', '$concept_laws$')] determines their maximum level of $concept_tariffs$. The level of $concept_tariffs$ for all members of a [concept_market] are determined by the [concept_market_owner]."

 concept_subventions: "Subventions"
 concept_subvention: "Subvention"
 concept_subvention_rate: "Subvention Rate"
 concept_subventions_desc: "$concept_subventions$ are a sum of money a [concept_country] can pay out to a [GetBuildingType('building_trade_center').GetName] for each [Concept('concept_trade', '$concept_imported$')] or $concept_exported$ [concept_good]. Therefore, they will make it more attractive to conduct [concept_trade] of a particular good, for example to weaken the competition. A $concept_country_possessive$ [Concept('concept_law', '$concept_laws$')] determines their maximum level of $concept_subventions$. The level of $concept_subventions$ for all members of a [concept_market] are determined by the [concept_market_owner]."

 concept_building_owners: "Building Owners"
 concept_building_owning: "Building Owning"
 concept_building_owners_desc: "A [Concept('concept_building','$concept_building_possessive$')] size is divided into [Concept('concept_building_level','$concept_building_levels_short$')]. These $concept_building_levels_short$ can either be [concept_privately_owned] by [Concept('concept_pop','$concept_pops$')], or [concept_nationally_owned] by a [Concept('concept_country','$concept_country$')]. The [Concept('concept_building_balance','$concept_building_balance_profit$')] from a $concept_building$ is shared among its owners as [concept_dividends]."

 concept_nationally_owned: "Nationally Owned"
 concept_nationally_owns: "Nationally Owns"
 concept_nationally_own: "Nationally Own"
 concept_nationally_owning: "Nationally Owning"
 concept_nationally_owned_desc: "A [concept_building_level] that is owned by the [concept_government] of a [concept_country].\n\n$concept_nationally_owned$ Levels pay out [concept_government_dividends] to the $concept_country$ that owns them. While $concept_nationally_owned$ Levels provide [concept_money] directly to the $concept_government$, they cost [concept_bureaucracy] and have reduced benefits from [concept_economy_of_scale].\n\n$concept_building_levels$ built by [concept_government_construction] become $concept_nationally_owned$, and all [Concept('concept_government_building', '$concept_government_buildings$')] are fully $concept_nationally_owned$.\n\nA [concept_building] can be [Concept('concept_nationalize', '$concept_nationalized$')] to turn their $concept_building_levels$ to $concept_nationally_owned$, or become [concept_privately_owned] via [Concept('concept_privatize', '$concept_privatization$')]."

 concept_privately_owned: "Privately Owned"
 concept_privately_own: "Privately Own"
 concept_privately_owns: "Privately Owns"
 concept_privately_owned_desc: "A [concept_building_level] that is owned by [Concept('concept_pop', '$concept_pops$')]. These $concept_pops$ are either the [concept_workforce] of the [concept_building] itself, or the $concept_workforce$ of $MANOR_HOUSES_GC_LINK$ and $FINANCIAL_DISTRICTS_GC_LINK$ (mainly $ARISTOCRATS_GC_LINK$ and $CAPITALISTS_GC_LINK$).\n\n$concept_privately_owned$ Levels pay out [concept_dividends] to the $concept_pops$ that own them.\n\n$concept_building_levels$ built by [concept_private_construction] become $concept_privately_owned$.\n\nA $concept_building$ can be [Concept('concept_nationalize', '$concept_nationalized$')] to turn their $concept_building_levels$ to [concept_nationally_owned], or become $concept_privately_owned$ via [Concept('concept_privatize', '$concept_privatization$')]."

 concept_nationalize: "Nationalize"
 concept_nationalized: "Nationalized"
 concept_nationalization: "Nationalization"
 concept_nationalizing: "Nationalizing"
 concept_national: "National"
 concept_nationalize_desc: "A [concept_building] that is not fully [concept_nationally_owned] can be $concept_nationalized$ by the owner of the [concept_state] the $concept_building$ is in.\n\n$concept_nationalizing$ [concept_privately_owned] Levels may [Concept('concept_radical', '$concept_radicalize$')] the [Concept('concept_pop', '$concept_pops$')] that own the $concept_building$, especially if you do not offer [concept_money] as compensation.\n\nA [concept_foreign_investment] can also be $concept_nationalized$, if the owning $concept_country$ is no longer allowed to make $concept_foreign_investments$.\n\nThe availability and cost of $concept_nationalization$ depends on your $ECONOMIC_SYSTEM_GC_LINK$."

 concept_privatize: "Privatize"
 concept_privatized: "Privatized"
 concept_privatization: "Privatization"
 concept_privatizations: "Privatizations"
 concept_privatizing: "Privatizing"
 concept_private: "Private"
 concept_privatize_desc: "A [concept_building] that is [concept_nationally_owned] can be put up for sale, allowing [Concept('concept_pop', '$concept_pops$')] to purchase it and make it [concept_privately_owned] through the [concept_investment_pool]. Whether $concept_privatization$ is available depends on your $ECONOMIC_SYSTEM_GC_LINK$."

 concept_monopoly: "Monopoly"
 concept_monopolies: "Monopolies"
 concept_monopolize: "Monopolize"
 concept_monopolized: "Monopolized"
 concept_monopoly_desc: "A $concept_monopoly$ on a [concept_building] gives its owner exclusive $concept_building$ rights of that [Concept('concept_building', '$concept_building_industry$')]. It can either be a [concept_company_monopoly] or a [concept_country_monopoly]."

 concept_company_monopoly: "Company Monopoly"
 concept_company_monopolies: "Company Monopolies"
 concept_company_monopolize: "Company Monopolize"
 concept_company_monopolized: "Company Monopolized"
 concept_company_monopoly_short: "Monopoly"
 concept_company_monopolies_short: "Monopolies"
 concept_company_monopolize_short: "Monopolize"
 concept_company_monopolized_short: "Monopolized"
 concept_company_monopoly_desc: "A $concept_company_monopoly$ gives a [concept_company] a [concept_monopoly] on a [concept_building] with exclusive $concept_building$ rights of that [Concept('concept_building', '$concept_building_industry$')]"

 concept_country_monopoly: "Country Monopoly"
 concept_country_monopolies: "Country Monopolies"
 concept_country_monopolize: "Country Monopolize"
 concept_country_monopolized: "Country Monopolized"
 concept_country_monopoly_short: "Monopoly"
 concept_country_monopolies_short: "Monopolies"
 concept_country_monopolize_short: "Monopolize"
 concept_country_monopolized_short: "Monopolized"
 concept_country_monopoly_desc: "A $concept_country_monopoly$ gives a [concept_country] a [concept_monopoly] on a [concept_building] with exclusive $concept_building$ rights of that [Concept('concept_building', '$concept_building_industry$')]. The [Concept('concept_good', '$concept_goods$')] produced by a $concept_monopoly$ will increase in price up to #v 20%#! proportionate to this $good$ [concept_sell_orders] share at the [concept_world_market]."

 concept_company_charter: "Company Charter"
 concept_company_charters: "Company Charters"
 concept_company_charter_short: "Charter"
 concept_company_charters_short: "Charters"
 concept_company_charter_desc: "[Concept('concept_country','$concept_countries$')] can give their [Concept('concept_company','$concept_companies$')] a $concept_company_charter$ which grants the $concept_company$ a particular right. These rights can range from establishing a [concept_monopoly] to the rights to build a different [Concept('concept_building', '$concept_building_industry$')] or to construct a [concept_regional_company_hq] in another country. $concept_countries$ have a number of free $concept_company_charters$ they can hand out at no cost. [Concept('concept_technology','$concept_technologies$')] and [Concept('concept_law','$concept_laws$')] can increase this limit. Additional $concept_company_charters_short$ past the limit can be given to $concept_companies$, but will incur an [concept_authority] cost."

 concept_company_hq: "Company HQ"
 concept_company_hqs: "Company HQs"
 concept_company_hq_short: "HQ"
 concept_company_hqs_short: "HQs"
 concept_company_hq_desc: "$concept_company_hqs$ are [Concept('concept_building','$concept_buildings$')] that represent the administration of [concept_company] assets. They own [Concept('concept_building_level','$concept_building_levels$')] from which they receive their [concept_dividends]."

 concept_regional_company_hq: "Regional Company HQ"
 concept_regional_company_hqs: "Regional Company HQs"
 concept_regional_company_hq_short: "Regional HQ"
 concept_regional_company_hqs_short: "Regional HQs"
 concept_regional_company_hq_desc: "A [concept_company] can establish a $concept_regional_company_hq$ in a foreign [concept_country] if they have been granted an Investment [concept_company_charter] by their own $concept_country$. Additionally they need access to the foreign $concept_country$ via [concept_foreign_investment_rights] and an established presence with a small number of [Concept('concept_building_level','$concept_building_levels$')]. The $concept_regional_company_hq$ acts mostly like a [concept_company_hq], but will use the foreign $concept_country_possessive$ [concept_investment_pool] to construct additional $concept_building_levels$ and will reinvest parts of their [concept_dividends] directly into their own $concept_country_possessive$ $concept_investment_pool$."

 concept_company_category: "Company Category"
 concept_company_categories: "Company Categories"
 concept_company_category_short: "Category"
 concept_company_categories_short: "Categories"
 concept_company_category_desc: "A $concept_company_category$ describes which kinds of [Concept('concept_pop','$concept_pops$')] partake in the ownership of a [concept_company]. It determines which [Concept('concept_production_method','$concept_production_methods$')] are available in the [concept_company_hq], shaping which [Concept('concept_profession','$concept_professions$')] are employed there. It also determines who receive a share of the [concept_dividends], and whether the $concept_company$ pays [concept_government_dividends] or not.\n\n#title The $concept_company_categories_short$ are:#!#indent_newline:3 \n#b $company_category_capitalist_owned$#!#indent_newline:3 \n$company_category_capitalist_owned_desc$#!\n\n#b $company_category_aristocrat_owned$#!#indent_newline:3 \n$company_category_aristocrat_owned_desc$#!\n\n#b $company_category_shopkeeper_owned$#!#indent_newline:3 \n$company_category_shopkeeper_owned_desc$#!\n\n#b $company_category_bureaucrat_owned$#!#indent_newline:3 \n$company_category_bureaucrat_owned_desc$#!\n\n#b $company_category_academic_owned$#!#indent_newline:3 \n$company_category_academic_owned_desc$#!"

 concept_concept:0 "Concept"
 concept_concepts:0 "Concepts"
 concept_concept_desc:0 "This is a tooltippable game concept with another [concept_concept] within."

 concept_sol:0 "Standard of Living"
 concept_sol_desc:1 "$concept_sol$ measures a [Concept('concept_pop','$concept_pop_possessive$')] living conditions, with their material [concept_wealth] as the baseline. It governs [Concept('concept_pop_growth','$concept_pop_growth_birthrate_and_mortality$')], and every time it changes it can cause $concept_pops$ to become more [concept_radical] or [Concept('concept_loyalist','$concept_loyal$')]. The average $concept_sol$ in a [concept_state] affects its [concept_migration_pull]."

 concept_expected_sol:0 "Minimum Expected Standard of Living"
 concept_expected_sol_short:0 "Minimum Expected"
 concept_expected_sol_desc:0 "$concept_expected_sol$ is the lowest [concept_sol] that a [concept_pop] is willing to tolerate. This number is based on whether the $concept_pop$ is [concept_lower_strata], [concept_middle_strata], or [concept_upper_strata] and adjusted by [concept_literacy], and can be modified by certain [Concept('concept_technology', '$concept_technologies$')]. If a $concept_pop$ has a lower $concept_sol$ than the $concept_expected_sol_short$ they will gradually become more [concept_radical]. $concept_pops$ with a $concept_sol$ above the $concept_expected_sol_short$ will still become more $concept_radical$ each time their $concept_sol$ is reduced."

 concept_famine: "Famine"
 concept_famines: "Famines"
 concept_famine_desc: "A $concept_famine$ is the result of a large part of the [Concept('concept_pop','$concept_population$')] in a [concept_state] suffering from [concept_starvation]. It is primarily a political classification meant to bring attention to the plight of the ones in need in your society.\n\nA $concept_famine$ is declared in a $concept_state$ if all of these conditions are fulfilled:\n$EFFECT_LIST_BULLET$at least #b #r [GetDefine('NPops', 'FAMINE_POPULATION_SHARE_IN_STARVATION')|0%]#!#! of the $concept_population$ is $concept_starving$\n$EFFECT_LIST_BULLET$at least #b #r [GetDefine('NPops', 'FAMINE_POPULATION_SHARE_IN_SEVERE_STARVATION')|%0]#!#! is suffering from $concept_severe_starvation$.\n$EFFECT_LIST_BULLET$the state does #b not#! belong to a [concept_decentralized_nation]"

 concept_food_security: "Food Security"
 concept_food_security_desc: "$concept_food_security$ measures how easy or difficult it is for a [concept_pop] to acquire all the food it requires to survive. If a $concept_pop$'s $concept_food_security$ gets too low, it will start suffering from [concept_starvation]. The lower $concept_food_security$ goes, the harsher the effects of $concept_starvation$ will be.\n\nThere are two main factors that affect $concept_food_security$. The first of them is the [concept_shortage] level for the [GetPopNeed('popneed_basic_food').GetName] [Concept('concept_pop_needs','$concept_pop_need_short$')]. The second factor is based on how much [concept_money] the $concept_pop$ is spending on [GetPopNeed('popneed_basic_food').GetNameNoFormatting] compared to the $concept_pop$'s expected expenses at base cost."

 concept_starvation: "Starvation"
 concept_starving: "Starving"
 concept_mild_starvation: "Mild Starvation"
 concept_mild_starvation_short: "Mild"
 concept_severe_starvation: "Severe Starvation"
 concept_severe_starvation_short: "Severe"
 concept_starvation_desc: "A [concept_pop] is considered to be $concept_starving$ if their [concept_food_security] is too low. This can be due to the $concept_pop$'s [concept_wealth] being too low or simply because there is not enough [GetPopNeed('popneed_basic_food').GetName] the $concept_pop$ can access.\n\n#b $concept_mild_starvation$#! begins at #b #v [GetDefine('NPops', 'FOOD_SECURITY_STARVATION_THRESHOLD')|0%]#!#! $concept_food_security$ and has reduced effects.\n[GetStaticModifier('starvation_penalty').GetDesc]\n\n#r $concept_severe_starvation$#! happens at #b #v [GetDefine('NPops', 'FOOD_SECURITY_SEVERE_STARVATION_THRESHOLD')|0%]#!#! $concept_food_security$ and has harsher effects. If not addressed this will result in the $concept_pop$ dying.\n[GetStaticModifier('severe_starvation_penalty').GetDesc]\n\nAdditionally, $concept_pops$ suffering from $concept_starvation$ will also [Concept('concept_radical','$concept_radicalize$')] over time. How many people $concept_radicalize$ and at what rate depends on how low their $concept_food_security$ is."

 concept_harvest_condition: "Harvest Condition"
 concept_harvest_conditions: "Harvest Conditions"
 concept_harvest_condition_desc: "A $concept_harvest_condition$ is an occurrence that primarily affects a [Concept('concept_country','$concept_country_possessive$')] rural sector with a variable [Concept('concept_harvest_condition_intensity','$concept_harvest_condition_intensity_short$')], duration, and range. It is generally a natural phenomenon and can have either #g positive#! or #r negative#! effects on the [Concept('concept_state','$concept_states$')] it affects. $concept_harvest_conditions$ will mostly affect the [concept_throughput] of agricultural [Concept('concept_building','$concept_buildings$')], but they can also have an effect on your [Concept('concept_pop','$concept_population$')] and $concept_states$ in other ways, such as reducing available [concept_infrastructure].\n\n$concept_harvest_conditions$ will often affect $concept_states$ surrounding their #b epicenter#!. In such cases, the [concept_harvest_condition_intensity] will generally decrease as the distance to the #b epicenter#! increases.\n\n#title Potential $concept_harvest_conditions$:#!#indent_newline:3 \n[GetHarvestConditionTypesList]#!"

 concept_harvest_condition_intensity: "Harvest Condition Intensity"
 concept_harvest_condition_intensity_short: "Intensity"
 concept_harvest_condition_intensity_desc: "The $concept_harvest_condition_intensity_short$ of [concept_harvest_condition] multiplies its effects on a [concept_state]. The closer a $concept_state$ is to the epicenter [concept_state_region], the higher the $concept_harvest_condition_intensity_short$ will most likely be."

 concept_pop_growth:0 "Pop Growth"
 concept_pop_growth_birthrate_and_mortality:0 "Birth Rate and Mortality"
 concept_pop_growth_birthrate:0 "Birth Rate"
 concept_pop_growth_mortality:0 "Mortality"
 concept_pop_growth_desc:3 "The net number of [Concept('concept_individual','$concept_individuals$')] a [concept_pop] gains or loses over time is governed by its $concept_pop_growth_birthrate_and_mortality$. Both metrics are governed by [concept_sol] and modified by factors such as disease, dangerous working conditions, beneficial [Concept('concept_institution', '$concept_institutions$')], and available living space.\n\n@information! External changes to a $concept_pop$'s size due to e.g. [concept_migration] or [concept_casualties] of [concept_war] are not considered $concept_pop_growth$."

 concept_individual:0 "Individual"
 concept_individuals:0 "Individuals"
 concept_individual_desc:1 "An individual is a single person within a [concept_pop], who can be either a [Concept('concept_working_adults','$concept_working_adult$')] or a [Concept('concept_dependents','$concept_dependent$')]. All [Concept('concept_pop', '$concept_pops$')] are made up of $concept_individuals$ with the same [concept_culture], [concept_religion], [concept_profession], and [Concept('concept_building','$concept_building_workplace$')]."

 concept_jobseeker:0 "Jobseeker"
 concept_jobseekers:0 "Jobseekers"
 concept_jobseeking: "Jobseeking"
 concept_jobseeker_desc:1 "A Jobseeker is a [Concept('concept_working_adults', '$concept_working_adult$')] with negative [concept_job_satisfaction] who is not working in a [concept_government_building] or in a [concept_building] being [Concept('concept_subsidies', '$concept_subsidized$')]."

 concept_building:0 "Building"
 concept_buildings:0 "Buildings"
 concept_building_industry:0 "Industry"
 concept_building_industries:0 "Industries"
 concept_building_possessive:1 "Building’s"
 concept_buildings_possessive:1 "Buildings’"
 concept_building_workplace:0 "Workplace"
 concept_building_desc:2 "$concept_buildings$ drive your [Concept('concept_country','$concept_country_possessive$')] economy via the [concept_good_production] (and [concept_good_consumption]) of [Concept('concept_good','$concept_goods$')]. They can also produce a number of other useful effects, such as [concept_bureaucracy], [concept_infrastructure], and [GetGoods('merchant_marine').GetName].\n\nTo perform their functions they require a [concept_workforce] made up by [Concept('concept_pop', '$concept_pops$')] of different [Concept('concept_profession','$concept_professions$')], who receive a [concept_building_wage] in return for their labor.\n\nWhat functions a particular $concept_building$ serves is determined by its active [Concept('concept_production_method','$concept_production_methods$')], and the magnitude of its impact is determined by its [Concept('concept_building_level','$concept_building_level_short$')].[AddLocalizationIf(GetPlayer.IsValid,'concept_building_desc_added')]"
 concept_building_desc_added:1 "\n\nYou can [Concept('concept_construction','$concept_construct$')] new, or expand existing, $concept_buildings$ in each of your [Concept('concept_state','$concept_states$')] using your [GetBuildingType('building_construction_sector').GetName]."

 concept_building_group: "Building Group"
 concept_building_groups: "Building Groups"
 concept_building_group_desc: "A $concept_building_group$ is a group of [Concept('concept_building','$concept_buildings$')] most often used to describe similar $concept_buildings$ needed to fulfill certain conditions in, for example, [Concept('concept_journal_entry','$concept_journal_entries$')].\n\n#title Common $concept_building_groups$ are:#!#indent_newline:3 \n• [GetBuildingGroup('bg_agriculture').GetName]\n• [GetBuildingGroup('bg_plantations').GetName]\n• [GetBuildingGroup('bg_staple_crops').GetName]#!"

 concept_company: "Company"
 concept_companies: "Companies"
 concept_company_possessive: "Company’s"
 concept_company_desc: "$concept_companies$ are associated with one or several types of [Concept('concept_building','$concept_buildings$')] in a [concept_country]. When established in said $concept_country$ they increase the [concept_throughput] and @construction![Nbsp][concept_construction] efficiency of their associated $concept_buildings$. The degree to which a $concept_company$ provides benefits depends on the relative [concept_prestige] ranking of the $concept_country$, with $concept_countries$ in the #v Top-[GetDefine('NDiplomacy','TOP_PRESTIGE_RANK_BONUS_THRESHOLD')]#! receiving even stronger bonuses.\n\n$concept_companies$ have a [concept_prosperity] score which increases from high [concept_productivity] and can provide additional bonuses for its $concept_country$."

 concept_prosperity: "Prosperity"
 concept_prosperous: "Prosperous"
 concept_prosperity_desc: "$concept_companies$ have a $concept_prosperity$ score which depends on their [concept_productivity] and number of employed [concept_building] levels, among other factors. When a $concept_company$ reaches [GetDefine('NEconomy','COMPANY_PROSPERITY_BONUS_ACTIVATION_THRESHOLD')|v0] $concept_prosperity$, it will be considered $concept_prosperous$ and activate a bonus [concept_modifier] for its [concept_country].\nIf the $concept_prosperity$ of a $concept_prosperous$ company falls below [GetDefine('NEconomy','COMPANY_PROSPERITY_BONUS_DEACTIVATION_THRESHOLD')|v0] it will no longer be considered $concept_prosperous$ and its bonus $concept_modifier$ will be deactivated."

 concept_building_level:0 "Building Level"
 concept_building_level_short:0 "Level"
 concept_building_levels:0 "Building Levels"
 concept_building_levels_short:0 "Levels"
 concept_building_levels_parenthetical_plural: "Building Level(s)"
 concept_building_levels_parenthetical_plural_short: "Level(s)"
 concept_building_level_desc:1 "A [Concept('concept_building', '$concept_building_possessive$')] $concept_building_level_short$ scales its current [concept_good_consumption], [concept_good_production], [concept_workforce] requirements, and may apply an [concept_economy_of_scale] bonus.\n\nExpanding a $concept_building$'s $concept_building_level_short$ usually requires [concept_construction], though some $concept_building$'s $concept_building_level_short$ is automatically adjusted based on other factors such as [concept_infrastructure], [Concept('concept_conscription_center','$concept_conscription$')] rate, or unused $concept_arable_land$.\n\nEach $concept_building_level_short$ is either [concept_privately_owned] or [concept_nationally_owned].\n\nThe maximum $concept_building_level_short$ a $concept_building$ can be expanded to may depend on the [concept_resource_potential] or [concept_arable_land] in the [concept_state]."


 concept_diplomatic_play:0 "Diplomatic Play"
 concept_diplomatic_play_short:0 "Play"
 concept_diplomatic_plays:0 "Diplomatic Plays"
 concept_diplomatic_plays_short:0 "Plays"
 concept_diplomatic_play_negotiated:0 "Negotiated"
 concept_diplomatic_play_desc:4 "A $concept_diplomatic_play$ is a period of hostile diplomatic negotiations between two or more [Concept('concept_country','$concept_countries$')] that follows after one $concept_country$ makes a demand for a concession by another. To start a $concept_diplomatic_play$ you must have a high enough [concept_interest_tier] in the relevant [concept_strategic_region], which also entitles you to participate in $concept_diplomatic_plays_short$ as a third party in that $concept_strategic_region$.\n\nThe $concept_diplomatic_play$ will [Concept('concept_escalation', '$concept_escalate$')] through three phases: [concept_opening_moves], [concept_diplomatic_maneuvers], and [concept_countdown_to_war]. These phases set the terms for a possible [concept_peace_deal] should the $concept_diplomatic_play$ $concept_escalate$ into a [concept_war]. A $concept_war$ can be averted if either the [concept_initiator] or [concept_target] of the $concept_diplomatic_play_short$ backs down and grants the other their [Concept('concept_primary_demand','$concept_primary_demands$')]."

 concept_sympathy:0 "Sympathy"
 concept_sympathy_desc:0 "All AI-controlled [Concept('concept_country','$concept_countries$')] involved in a [concept_diplomatic_play] begin the play with a level of $concept_sympathy$ for each side, which influences how likely they are to support that side in the conflict. AI [Concept('concept_country','$concept_countries$')] tend to have higher $concept_sympathy$ for the [concept_target], for countries they have [Concept('concept_diplomatic_pact','$concept_diplomatic_pacts$')] with, and for those are opposing a [concept_country] with high [concept_infamy]. $concept_sympathy$ can also increase over the course of the [concept_diplomatic_play], as a side that gains powerful backers or accrues [concept_infamy] through adding [Concept('concept_war_goal', '$concept_war_goals$')] tends to generate $concept_sympathy$ for the opposing side."

 concept_neutrality:0 "Neutrality"
 concept_neutrality_desc:0 "All AI-controlled [Concept('concept_country','$concept_countries$')] involved in a [concept_diplomatic_play] have a level of $concept_neutrality$ based on their internal conditions and their general level of interest in the participants of the play. The higher their $concept_neutrality$, the more difficult it will be to convince that [concept_country] to get involved in the play."

 concept_confidence:0 "Confidence"
 concept_confidence_desc:0 "An AI-controlled [concept_country] that is one of the main participants in a [concept_diplomatic_play] has a level of $concept_confidence$ based on their internal conditions and how likely they believe it is that they will be able to win any ensuing war. The chance that the AI [concept_country] will decide to back down is directly determined by their confidence, though this is not guaranteed even at low $concept_confidence$ levels, especially if backing down would lead to their annexation."

 concept_maneuver:0 "Maneuver"
 concept_maneuvers:1 "Maneuvers"
 concept_maneuver_desc:3 "$concept_maneuvers$ can be spent on taking actions in a [concept_diplomatic_play], including claiming additional [Concept('concept_war_goal', '$concept_war_goals$')] or [Concept('concept_sway','$concept_swaying$')] other [Concept('concept_country', '$concept_countries$')] to your side. The amount of $concept_maneuvers$ you have is limited by your [concept_rank]."

 concept_opening_moves:0 "Opening Moves"
 concept_opening_moves_desc:1 "The $concept_opening_moves$ phase is the first phase of a [concept_diplomatic_play]. In this phase the [concept_target] gets to set their primary [concept_war_goal], and both [concept_initiator] and $concept_target$ can claim additional [Concept('concept_war_goal', '$concept_war_goals$')] using [Concept('concept_maneuver', '$concept_maneuvers$')]."

 concept_diplomatic_maneuvers:0 "Diplomatic Maneuvers"
 concept_diplomatic_maneuvers_desc:0 "The $concept_diplomatic_maneuvers$ phase is the second phase of a [concept_diplomatic_play]. In this phase, the [concept_initiator] and [concept_target] can attempt to [concept_sway] other [Concept('concept_country', '$concept_countries$')] to their side or claim additional [Concept('concept_war_goal', '$concept_war_goals$')] for themselves, at the cost of [Concept('concept_maneuver', '$concept_maneuvers$')]."

 concept_countdown_to_war:0 "Countdown to War"
 concept_countdown_to_war_desc:1 "The $concept_countdown_to_war$ phase is the third and last phase of a [concept_diplomatic_play]. [concept_war] might now be inevitable, with both sides frantically making preparations or considering any last-minute options to back down.\n\n@information! Typical preparations for $concept_war$ includes: [Concept('concept_mobilize_army','$concept_mobilize_army_mobilization$')] of [Concept('concept_army','$concept_armies$')], giving their [Concept('concept_general','$concept_generals$')] [Concept('concept_order','$concept_orders$')] to advance or defend the [Concept('concept_front', '$concept_fronts$')], $concept_conscript_battalion_drafting$ [Concept('concept_conscript_battalion', '$concept_conscript_battalions$')], and promoting your $concept_generals$ to increase their [concept_command_limit] where necessary."

 concept_war_leader:0 "War Leader"
 concept_war_leaders:0 "War Leaders"
 concept_war_leader_desc:0 "One [concept_country] on each side of a [concept_war] is considered the $concept_war_leader$ for that side, usually (but not always) corresponding to the [concept_initiator] and [concept_target] of the [concept_diplomatic_play] that spawned it. They are the only ones who may propose [Concept('concept_peace_deal','$concept_peace_deals$')], though every $concept_peace_deal$ must be ratified by all negotiating members of the $concept_war$ to be accepted."

 concept_initiator:0 "Initiator"
 concept_initiator_desc:0 "The [concept_country] that initiated a [concept_diplomatic_play]."

 concept_target:0 "Target"
 concept_target_desc:0 "The [concept_country] targeted by a [concept_diplomatic_play]."

 concept_homeland:0 "Homeland"
 concept_homelands:1 "Homelands"
 concept_homeland_desc:2 "A [Concept('concept_culture','$concept_culture_possessive$')] $concept_homelands$ consist of those [Concept('concept_state_region','$concept_state_regions$')] that [Concept('concept_pop', '$concept_pops$')] of that $concept_culture$ feel are historically or naturally their territory. $concept_pops$ are more prone to [Concept('concept_migration','$concept_migrate$')] to their $concept_homelands$ than other [Concept('concept_state','$concept_states$')], and $concept_pops$ who reside there will never consider [Concept('concept_assimilation','$concept_assimilating$')].\n\nLaunching a [concept_diplomatic_play] to conquer a $concept_state$ considered a $concept_homeland$ of one of your [concept_primary_cultures] is considered relatively legitimate, and will generate substantially less [concept_infamy] than usual."

 concept_mobilization_option: "Mobilization Option"
 concept_mobilization_option_short: "Option"
 concept_mobilization_options: "Mobilization Options"
 concept_mobilization_option_desc: "An [concept_army] can be configured with any number of $concept_mobilization_options$ while in peacetime. Each $concept_mobilization_option_short$ applies a cost in [Concept('concept_good','$concept_goods$')] and an effect for all [Concept('concept_battalion','$concept_battalions$')] in the $concept_army$ while it is [Concept('concept_mobilize_army','$concept_mobilize_army_mobilized$')]."

 concept_mobilize_army: "Mobilize Army"
 concept_mobilize_army_mobilize: "Mobilize"
 concept_mobilize_army_mobilizing: "Mobilizing"
 concept_mobilize_army_mobilized: "Mobilized"
 concept_mobilize_army_mobilization: "Mobilization"
 concept_mobilize_army_demobilize: "Demobilize"
 concept_mobilize_army_demobilized: "Demobilized"
 concept_mobilize_army_demobilization: "Demobilization"
 concept_mobilize_army_desc: "$concept_mobilize_army_mobilizing$ an [concept_army] will immediately begin the process of $concept_mobilize_army_mobilization$ for all [Concept('concept_battalion', '$concept_battalions$')] assigned to it. A $concept_mobilize_army_mobilized$ $concept_army$ will automatically stand down once the [concept_country] is no longer at [concept_war]. Early $concept_mobilize_army_demobilization$ while in active warfare is possible, but takes time and a substantial cost."

 concept_mobilize_battalion:0 "Mobilize Battalion"
 concept_mobilize_battalion_demobilized:0 "Demobilized"
 concept_mobilize_battalion_mobilize:0 "Mobilize"
 concept_mobilize_battalion_mobilizing:0 "Mobilizing"
 concept_mobilize_battalion_mobilized:0 "Mobilized"
 concept_mobilize_battalions_mobilized:0 "Mobilized Battalions"
 concept_mobilize_battalion_mobilization:0 "Mobilization"
 concept_mobilize_battalion_mobilized_manpower: "Mobilized Manpower"
 concept_mobilize_battalion_desc:2 "[Concept('concept_battalion', '$concept_battalions$')] in a [Concept('concept_mobilize_army', '$concept_mobilize_army_mobilized$')] [concept_army] immediately start $concept_mobilize_battalion_mobilizing$ at a rate based on the [concept_infrastructure] of their [concept_state], better $concept_infrastructure$ means more $concept_battalions$ may $concept_mobilize_army_mobilize$ at once. $concept_mobilize_battalion_mobilized$ and $concept_mobilize_battalion_mobilizing$ $concept_battalions$ consume more [Concept('concept_military_good','$concept_military_goods$')] based on their $concept_army$'s [Concept('concept_mobilization_option','$concept_mobilization_options$')], but are fully prepared to follow any of their $concept_army$'s [Concept('concept_general', '$concept_generals$')] into [concept_battle]."

 concept_fully_mobilized_battalions:0 "Fully Mobilized Battalions"
 concept_fully_mobilized_battalions_desc:0 "A [Concept('concept_country','$concept_country_possessive$')] fully mobilized [Concept('concept_battalion','$concept_battalions$')] include all $concept_battalions$ in [Concept('concept_mobilize_army', '$concept_mobilize_army_mobilized$')] [Concept('concept_army', '$concept_armies$')] that have already undergone [Concept('concept_mobilize_battalion','$concept_mobilize_battalion_mobilization$')] and are fully prepared to follow any of their $concept_army$'s [Concept('concept_general', '$concept_generals$')] into [concept_battle]."

 concept_available_battalions:0 "Available Battalions"
 concept_available_battalions_desc:2 "A [Concept('concept_country','$concept_country_possessive$')] available [Concept('concept_battalion','$concept_battalions$')] include all $concept_battalions$ currently raised by [SelectLocalization(GetPlayer.IsValid,'concept_available_battalions_desc_added','barracks')] and/or [Concept('concept_conscription_center','$concept_conscription_centers$')]."
 concept_available_battalions_desc_added:0 "[GetBuildingType('building_barrack').GetName]"

 concept_potential_battalions:0 "Potential Battalions"
 concept_potential_regulars:0 "Potential Regulars"
 concept_potential_conscripts:0 "Potential Conscripts"
 concept_potential_battalions_desc:2 "A [Concept('concept_country','$concept_country_possessive$')] maximum potential [Concept('concept_battalion','$concept_battalions$')] is the sum of the its Potential Regular $concept_battalions$ and Potential [Concept('concept_conscript_battalion','$concept_conscript_battalions$')].\n\n#b Potential Regular $concept_battalions$#!: the number of $concept_battalions$ the $concept_country$'s currently constructed [SelectLocalization(GetPlayer.IsValid,'concept_potential_battalions_desc_added','barracks')] are able to support\n\n#b Potential $concept_conscript_battalions$#!: the number of $concept_conscript_battalions$ the $concept_country$'s [SelectLocalization(GetPlayer.IsValid,'concept_potential_battalions_desc_additional','conscription center')]s would create if [Concept('concept_conscription_center','$concept_conscription$')] had been activated across all [Concept('concept_state','$concept_states$')]"
 concept_potential_battalions_desc_added:0 "[GetBuildingType('building_barrack').GetName]"
 concept_potential_battalions_desc_additional:0 "[GetBuildingType('building_conscription_center').GetName]"

 concept_conscription_center:0 "Conscription Center"
 concept_conscription_centers:0 "Conscription Centers"
 concept_conscription_center_conscription:0 "Conscription"
 concept_conscripted:0 "Conscripted"
 concept_conscription:0 "Conscription"
 concept_conscription_center_desc:2 "When a [concept_state] is $concept_conscripted$ during a [concept_diplomatic_play] or [concept_war], a [SelectLocalization(GetPlayer.IsValid,'concept_conscription_center_desc_added','conscription center')] appears with a [concept_building_level] depending on its #v $state_conscription_rate_add$#! and $concept_state$ [Concept('concept_pop','$concept_population$')] size. This [concept_military_building] will recruit civilian [concept_workforce] into [Concept('concept_conscript_battalion','$concept_conscript_battalions$')] that will be automatically assigned to [Concept('concept_general','$concept_generals$')] in their [concept_hq] as they are raised.\n\nAfter the $concept_war$, all $concept_conscription_centers$ will deactivate and the $concept_conscript_battalions$ will disband. $concept_pops$ who return to civilian life are not guaranteed to return to their old [concept_profession] but must seek new employment opportunities."
 concept_conscription_center_desc_added:0 "[GetBuildingType('building_conscription_center').GetName]"

 concept_conscription_limit: "Conscription Limit"
 concept_conscription_limit_short: "Limit"
 concept_conscription_limit_desc: "The max number of [Concept('concept_conscript_battalion', '$concept_conscript_battalions$')] a [concept_state] can recruit. The $concept_conscription_limit$ is calculated from the [concept_workforce] of a $concept_state$ multiplied by its $state_conscription_rate_add$. It cannot exceed the $state_building_conscription_center_max_level_add$ set in place by your [GetLawGroup('lawgroup_army_model').GetName] [concept_law]."

 concept_strategic_objective: "Strategic Objective"
 concept_strategic_objectives: "Strategic Objectives"
 concept_strategic_objective_short: "Objective"
 concept_strategic_objective_desc: "A $concept_strategic_objective$ can be assigned to an [concept_army]. If an enemy or friendly [concept_state] is assigned as an $concept_army_possessive$ $concept_strategic_objective$, any of the $concept_army_possessive$ advancing [Concept('concept_general','$concept_generals$')] will try to advance the [concept_front] towards that $concept_state$. If the $concept_state$ is under friendly control, they will prioritize expanding the defensive perimiter around the $concept_state$. While defending $concept_generals$ will focus on the defence of the $concept_state$ and surrounding areas, prioritizing defensive [Concept('concept_battle','$concept_battles$')] closest to the $concept_strategic_objective$.\n\nAn $concept_army$ can have one $concept_strategic_objective$, but several $concept_armies$ can have the same $concept_state$ as their $concept_strategic_objective_short$."

 concept_conscript_battalion:0 "Conscript Battalion"
 concept_conscript_battalions:0 "Conscript Battalions"
 concept_conscript_battalion_short:0 "Conscript"
 concept_conscript_battalions_short:0 "Conscripts"
 concept_conscript_battalion_drafting:0 "Drafting"
 concept_conscript_battalion_desc:4 "$concept_conscript_battalions$ are temporary [Concept('concept_battalion', '$concept_battalions$')] recruited and maintained from the civilian [Concept('concept_pop','$concept_population$')] by [Concept('concept_conscription_center','$concept_conscription_centers$')] and activated during [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] or [Concept('concept_war','$concept_wars$')].\n\n@information! Note that $concept_conscript_battalions$ do not count towards the [concept_command_limit] of an [concept_army] until actually being raised and employed. When raised, only the higher of your regular [Concept('concept_battalion','$concept_battalions$')] or $concept_conscript_battalions$ is compared against the $concept_command_limit$, so raising $concept_conscript_battalions$ will only strain the limit if you have more of them than regular $concept_battalions$."

 concept_front:0 "Front"
 concept_fronts:1 "Fronts"
 concept_front_desc:2 "A collection of [Concept('concept_province', '$concept_provinces$')] on the border of [Concept('concept_theater','$concept_theaters$')] between two [Concept('concept_country', '$concept_countries$')] at [concept_war] with each other. [Concept('concept_general', '$concept_generals$')] can be [Concept('concept_order','$concept_ordered$')] to advance or defend $concept_fronts$, which can result in [Concept('concept_battle','$concept_battles$')] that change the size of the $concept_theaters$ and the location of the $concept_front$."

 concept_advancement_progress:0 "Advancement Progress"
 concept_advancement_progress_desc:1 "[Concept('concept_general','$concept_generals$')] [Concept('concept_order','$concept_ordered$')] to advance a [concept_front] accumulate $concept_advancement_progress$ daily depending on their [concept_advancement_speed]. Once the $concept_advancement_progress$ of the $concept_front$ has reached [GetDefine('NMilitary','BATTLE_PLAN_ADVANCE_PROGRESS_TO_LAUNCH')|v0] a [concept_battle] will start. While a $concept_battle$ is ongoing on the $concept_front$, $concept_advancement_progress$ on that $concept_front$ will be paused."

 concept_advancement_speed:0 "Advancement Speed"
 concept_advancement_speed_desc:1 "How rapidly a [concept_general] can advance their [concept_front] by accumulating [concept_advancement_progress].\nA $concept_general$ with no [Concept('concept_mobilize_battalion','$concept_mobilize_battalion_mobilized$')] [Concept('concept_battalion','$concept_battalions$')] has an effective $concept_advancement_speed$ of zero."

 concept_province:0 "Province"
 concept_provinces:1 "Provinces"
 concept_province_possessive:0 "Province’s"
 concept_province_land:0 "Land"
 concept_province_desc:2 "Subdivisions of [Concept('concept_state', '$concept_states$')], each with its own [concept_terrain]. $concept_provinces$ are transferred between $concept_states$ during [Concept('concept_colony','$concept_colonization$')], and can be temporarily transferred between [Concept('concept_theater','$concept_theaters$')] during [concept_war] as the outcome of [Concept('concept_battle','$concept_battles$')]."

 concept_battle_condition:0 "Battle Condition"
 concept_battle_conditions: "Battle Conditions"
 concept_battle_condition_short:0 "Condition"
 concept_battle_condition_desc:0 "During [Concept('concept_battle','$concept_battles$')] each side will be affected by a $concept_battle_condition$ that influences the outcome. Which $concept_battle_condition_short$ applies depends on a number of factors, which often includes the [Concept('concept_character_trait','$concept_character_traits$')] of the [Concept('concept_commander','$concept_commanders$')] in charge of that side."

 concept_naval_battle_condition: "Naval Battle Condition"
 concept_naval_battle_conditions: "Naval Battle Conditions"
 concept_naval_battle_condition_short: "Condition"
 concept_naval_battle_condition_desc: "[Concept('concept_naval_battle','$concept_naval_battles$')] are affected by a $concept_naval_battle_condition$ that influences everyone involved in the battle. Which $concept_naval_battle_condition_short$ applies depends on a number of factors, which often includes any [concept_harvest_condition] affecting the location of the $concept_naval_battle$."

 concept_army: "Army"
 concept_armies: "Armies"
 concept_army_possessive: "Army’s"
 concept_army_long: "Army Formation"
 concept_army_desc: "An $concept_army$ is a land [Concept('concept_military_formation','$concept_military_formation$')] composed of $combat_unit_group_infantry$, $combat_unit_group_artillery$ and $combat_unit_group_cavalry$ [Concept('concept_battalion','$concept_battalions$')], led by a [concept_general] who lends bonuses from his [Concept('concept_character_trait','$concept_character_traits$')] and [Concept('concept_order','$concept_orders$')] to the whole $concept_army$.\n\nWhen deployed to a [Concept('concept_front','$concept_front$')], an $concept_army$ executes its $concept_order$ such as #b $advance$#! or #b $defend$#!, fighting [Concept('concept_battle','$concept_battles$')] against any enemy $concept_armies$ present on that $concept_front$. How well it fights depends on the [Concept('concept_offense','$concept_offense$')] and [Concept('concept_defense','$concept_defense$')] of its $concept_battalions$ and their [concept_morale].\n\nAn $concept_army$ must be ordered to [Concept('concept_mobilize_army','$concept_mobilize_army_mobilize$')] before its $concept_battalions$ are ready to fight, and stands down again automatically once the [concept_war] ends. Before $concept_mobilize_army_mobilizing$, the $concept_army$ can be configured with [Concept('concept_mobilization_option','$concept_mobilization_options$')] that apply effects to its $concept_battalions$ at a cost of [Concept('concept_good','$concept_goods$')] while $concept_mobilize_army_mobilized$."

 concept_fleet: "Fleet"
 concept_fleets: "Fleets"
 concept_fleet_possessive: "Fleet’s"
 concept_fleet_long: "Fleet Formation"
 concept_fleet_desc: "A $concept_fleet$ is a naval [Concept('concept_military_formation','$concept_military_formation$')] composed of [Concept('concept_ship','$concept_ships$')], led by an [concept_admiral] who lends bonuses from his [Concept('concept_character_trait','$concept_character_traits$')] and [Concept('concept_order','$concept_orders$')] to the whole $concept_military_formation$.\n\nIt can be sent on [Concept('concept_naval_mission','$concept_naval_missions$')] like [GetNavalMissionType('naval_mission_type_intercept').GetName], [GetNavalMissionType('naval_mission_type_blockade').GetName], and [GetNavalMissionType('naval_mission_type_port_bombardment').GetName] covering several [Concept('concept_sea_node','$concept_sea_regions$')], clashing in [Concept('concept_naval_battle','$concept_naval_battles$')] with any enemy $concept_fleets$ that they find (or that find them).\n\n$concept_fleets$ tend to take a long time to build up, and many $concept_ships$ become obsolete over time as they cannot always be upgraded. Think carefully before investing too heavily into large $concept_fleets$."

 concept_battle: "Battle"
 concept_battles: "Battles"
 concept_battle_desc: "When two [Concept('concept_commander','$concept_commanders$')] encounter each other and come into conflict during a [concept_war], they and their [Concept('concept_unit','$concept_units$')] will clash in an attempt to inflict [concept_casualties] and damage each others' [concept_morale]. The side whose [concept_manpower] has run out or become $concept_morale_demoralized$ first will withdraw, leaving the other side victorious.\n\nOn land, $concept_battles$ take place in [Concept('concept_province','$concept_provinces$')] adjacent to [Concept('concept_front','$concept_fronts$')] when one [concept_general] is advancing to take or regain $concept_province_land$. The winner will either conquer more $concept_provinces$ or prevent the enemy from doing so."
 concept_naval_battle: "Naval Battle"
 concept_naval_battles: "Naval Battles"
 concept_naval_battle_desc: "When two [Concept('concept_commander','$concept_commanders$')] encounter each other and come into conflict during a [concept_war], they and their [Concept('concept_ship','$concept_ships$')] will clash in an attempt to inflict [concept_casualties] and sink each other' $concept_ships$. The side whose $concept_ships$ have all been destroyed or disengaged will withdraw, leaving the other side victorious.\n\n$concept_naval_battles$ take place in Sea Nodes when one [concept_admiral] intercepts another due to conflicting [Concept('concept_order','$concept_orders$')]. The winner leaves their opponent damaged and forces them to return to port for repairs, leaving them unable to execute their $concept_order$ for a time."

 concept_timed_modifier:0 "Timed Modifier"
 concept_timed_modifiers:0 "Timed Modifiers"
 concept_timed:0 "Timed"
 concept_timed_modifier_desc:0 "A [concept_modifier] with an expiry date, after which it will disappear. $concept_timed_modifiers$ can either maintain its full effect up until its expiry date, or [concept_decay] gradually until the date has been reached."

 concept_modifier:0 "Modifier"
 concept_modifiers:1 "Modifiers"
 concept_modifier_desc:1 "Any adjustment of a value away from its norm is considered a $concept_modifier$. These can be indefinite or [Concept('concept_timed_modifier','$concept_timed$')], and their origin can always be sourced back to something like a [concept_law], [concept_technology], [concept_institution], [concept_building], [concept_character_trait], or even an option selected during a special event. Values adjusted by $concept_modifiers$ all have tooltips that explain the full list of sources and their values."

 concept_terrain:0 "Terrain"
 concept_terrain_desc:3 "A [Concept('concept_province','$concept_province_possessive$')] $concept_terrain$ determines its [concept_combat_width] and how volatile and unpredictable [Concept('concept_battle','$concept_battles$')] in that $concept_province$ is. [Concept('concept_general','$concept_generals$')] can also be more or less versed in fighting in different types of $concept_terrain$.\n\nThe $concept_terrain$ of a given $concept_province$ can change as a result of the [Concept('concept_building','$concept_buildings$')] constructed in the [concept_state]."

 concept_strategic_region: "Strategic Region"
 concept_strategic_region_short: "Region"
 concept_strategic_regions: "Strategic Regions"
 concept_strategic_regions_short: "Regions"
 concept_strategic_region_desc: "A collection of [Concept('concept_state_region', '$concept_state_regions$')] considered a region of strategic importance. [Concept('concept_country','$concept_countries$')] have an [concept_interest] in all $concept_strategic_regions_short$ where they have generated sufficient [concept_involvement].\n\nMaintaining a high enough [concept_interest_tier] in a $concept_strategic_region$ is a prerequisite to participate in [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] taking place there."

 concept_strategic_region_stance: "AI Strategic Region Stance"
 concept_strategic_region_stance_short: "Stance"
 concept_strategic_region_stances_short: "Stances"
 concept_strategic_region_stance_desc: "A $concept_strategic_region_stance_short$ is an indication of a [Concept('concept_country','$concept_countries$')] foreign policy views within a specific [concept_strategic_region].\n\nThis can affect how a $concept_country$ reacts to a [concept_diplomatic_play] or whether it wants to launch one itself, as well as the [concept_attitude] that it develops towards $concept_countries$ in that $concept_strategic_region_short$."

 concept_sway:0 "Sway"
 concept_swaying:0 "Swaying"
 concept_swayed:0 "Swayed"
 concept_sway_desc: "The [concept_initiator] or [concept_target] in a [concept_diplomatic_play] can attempt to $concept_sway$ any other [concept_country] with a high enough [concept_interest_tier] in the [concept_strategic_region] to their side, by offering a [concept_war_goal] or other promise such as an [concept_obligation]. Attempting to $concept_sway$ a $concept_country$ costs [Concept('concept_maneuver','$concept_maneuvers$')], and the chance an AI $concept_country$ will accept the offer depends on your [concept_relations] and their [concept_attitude] to you as well as your opponent."

 concept_offer_support: "Offer Support"
 concept_offer_of_support: "Offer of Support"
 concept_offer_support_desc: "A participant in a [concept_diplomatic_play] can $concept_offer_support$ to the [concept_initiator] or [concept_target] in a [concept_diplomatic_play]. This works exactly like a [concept_sway], with the exception that it is the potential supporter that sets the terms of what they are willing to be [Concept('concept_sway','$concept_swayed$')] with, but does not cost any [Concept('concept_maneuver','$concept_maneuvers$')] for either side."

 concept_diplomatic_demand: "Diplomatic Demand"
 concept_diplomatic_demands: "Diplomatic Demands"
 concept_diplomatic_demand_short: "Demand"
 concept_diplomatic_demands_short: "Demands"
 concept_diplomatic_demand_desc: "A $concept_diplomatic_demand$ is a single [concept_war_goal] which one [concept_country] demands from another. If the $concept_diplomatic_demand$ is rejected, a [concept_diplomatic_play] will start with the demanded [concept_war_goal] as the [concept_primary_demand] of the [concept_initiator]."

 concept_diplomatic_action:0 "Diplomatic Action"
 concept_diplomatic_actions:0 "Diplomatic Actions"
 concept_diplomatic_actions_short:0 "Actions"
 concept_diplomatic_action_desc:2 "A broad term for interactions between two [Concept('concept_country','$concept_countries$')] that includes [Concept('concept_instant_diplomatic_action','$concept_instant_diplomatic_actions$')], [Concept('concept_ongoing_diplomatic_action','$concept_ongoing_diplomatic_actions$')], and [Concept('concept_diplomatic_pact','$concept_diplomatic_pacts$')]. They differ from [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] in that no third party is allowed to have a say in its outcome, and there is no risk the action on its own might escalate into [concept_war]."

 concept_subject_action: "Subject Action"
 concept_subject_actions: "Subject Actions"
 concept_subject_action_desc: "A type of [concept_diplomatic_action] that [Concept('concept_subject','$concept_subjects$')] can issue against their [concept_overlord]."

 concept_overlord_action: "Overlord Action"
 concept_overlord_actions: "Overlord Actions"
 concept_overlord_action_desc: "A type of [concept_diplomatic_action] that [Concept('concept_overlord','$concept_overlords$')] can issue against their [Concept('concept_subject','$concept_subjects$')]."

 concept_bloc_member_action: "Bloc Member Action"
 concept_bloc_member_actions: "Bloc Member Actions"
 concept_bloc_member_action_desc: "A type of [concept_diplomatic_action] that [Concept('concept_power_bloc_member','$concept_power_bloc_members_short$')] can issue against other [Concept('concept_power_bloc_member','$concept_power_bloc_members_short$')], including the [Concept('concept_power_bloc_leader','$concept_power_bloc_leader_short$')]."

 concept_bloc_leader_action: "Bloc Leader Action"
 concept_bloc_leader_actions: "Bloc Leader Actions"
 concept_bloc_leader_action_desc: "A type of [concept_diplomatic_action] that [Concept('concept_power_bloc_leader','$concept_power_bloc_leaders_short$')] can issue against [Concept('concept_power_bloc_member','$concept_power_bloc_members_short$')]."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED MAY 4, 2022

 concept_government_building:0 "Government Building"
 concept_government_buildings:1 "Government Buildings"
 concept_government_building_desc:2 "A [concept_building] owned and operated by the [concept_government] using funds from the [concept_treasury].\n\n$concept_government_buildings$ have no [Concept('concept_good','$concept_goods$')] [concept_good_production] and therefore no [concept_revenue], but produce a number of other resources crucial to running a [concept_country] such as [concept_bureaucracy], [concept_infrastructure], [GetGoods('merchant_marine').GetName], and [Concept('concept_unit','$concept_units$')].\n\nThe [concept_workforce] of non-military $concept_government_buildings$ get paid according to the [concept_government_wage], while [Concept('concept_military_building','$concept_military_buildings$')] get paid according to the [concept_military_wage].\n\n$concept_government_buildings$ are always fully [concept_nationally_owned]"

 concept_military_building:0 "Military Building"
 concept_military_buildings:1 "Military Buildings"
 concept_military_building_army_and_navy:0 "Army and Navy"
 concept_military_building_desc:4 "[Concept('concept_government_building','$concept_government_buildings$')] used to train, maintain, and supply [Concept('concept_battalion','$concept_battalions$')] and [Concept('concept_ship','$concept_ships$')] for the [Concept('concept_country','$concept_country_possessive$')] army and navy respectively. The [concept_workforce] of $concept_military_buildings$ get paid according to the [concept_military_wage]."

 concept_incorporated_state:0 "Incorporated State"
 concept_incorporated_states:1 "Incorporated States"
 concept_incorporate_state:0 "Incorporate State"
 concept_incorporated_state_possessive: "Incorporated State’s"
 concept_incorporate:0 "Incorporate"
 concept_incorporated:0 "Incorporated"
 concept_incorporating:0 "Incorporating"
 concept_incorporation:0 "Incorporation"
 concept_incorporated_state_desc:2 "[Concept('concept_state','$concept_states$')] that are fully integrated into a [concept_country]. [Concept('concept_pop', '$concept_pops$')] in $concept_incorporated_states$ pay taxes, gain access to benefits from [Concept('concept_institution', '$concept_institutions$')], and participate fully in the Country's political system. [Concept('concept_unincorporated_state','$concept_unincorporated_states$')] can be $concept_incorporated$ through a sometimes lengthy process."

 concept_capacity:0 "Capacity"
 concept_capacities:0 "Capacities"
 concept_capacity_desc:0 "A measure of your [Concept('concept_country','$concept_country_possessive$')] capabilities in one of three areas: [concept_bureaucracy], [concept_authority], and [concept_influence]. $concept_capacities$ are not stored and used, but continuously generated from different sources and continually expended by the various projects you have going on. Your remaining balance in each area is displayed in the top bar. Having an excess of a $concept_capacity$ will yield a minor bonus for your $concept_country$, while having a lack of a $concept_capacity$ will inflict large penalties."

 concept_bureaucracy:0 "Bureaucracy"
 concept_bureaucracy_desc:4 "@bur! Bureaucracy is a [concept_capacity] used to maintain your [Concept('concept_country','$concept_country_possessive$')] administrative cohesion and day-to-day operations. The cost increases with the population across your [Concept('concept_incorporated_state', '$concept_incorporated_states$')] and with every [concept_institution] investment level, and is also used to administer [Concept('concept_commander','$concept_commanders$')]. You gain @bur! from operating [SelectLocalization(GetPlayer.IsValid,'concept_bureaucracy_desc_added','Government Administration')] [Concept('concept_building','$concept_buildings$')]."
 concept_bureaucracy_desc_added:0 "[GetBuildingType('building_government_administration').GetName]"

 concept_authority:0 "Authority"
 concept_authority_desc:3 "@aut! Authority is a [concept_capacity] used to effect internal change to your [concept_country], like issuing [Concept('concept_decree', '$concept_decrees$')] or managing [Concept('concept_interest_group', '$concept_interest_groups$')]. You gain @aut! from [Concept('concept_law', '$concept_laws$')]."

 concept_influence:0 "Influence"
 concept_influence_desc: "@inf! Influence is a [concept_capacity] used for [Concept('concept_diplomatic_action', '$concept_diplomatic_actions$')], [Concept('concept_diplomatic_pact','$concept_diplomatic_pacts_short$')] and [Concept('concept_treaty', '$concept_treaties$')] targeting another [concept_country]. You gain @inf! based on your [concept_rank]."

 concept_institution:0 "Institution"
 concept_institutions:1 "Institutions"
 concept_institution_possessive:0 "Institution’s"
 concept_institution_desc:2 "$concept_institutions$ provide benefits to [Concept('concept_incorporated_state', '$concept_incorporated_states$')] across your [concept_country]. They cost [concept_bureaucracy] to maintain in proportion to the number of [Concept('concept_pop', '$concept_pops$')] living in your $concept_incorporated_states$ and the $concept_institution$'s investment level. Higher levels increase both the cost and the effect. Adjusting investment levels take a set amount of time."

 concept_law:0 "Law"
 concept_laws:0 "Laws"
 concept_law_desc:4 "$concept_laws$ sets the ground rules for how your [concept_country] operates and is governed. The effects of a $concept_law$ are determined both by the base effects of the $concept_law$ and those of any [Concept('concept_amendment','$concept_amendments$')] attached to it. Certain $concept_laws$ enable [Concept('concept_institution', '$concept_institutions$')] that provide further control. $concept_enactment_of_laws_potential$"

 concept_amendment: "Amendment"
 concept_amendments: "Amendments"
 concept_amendment_desc: "An $concept_amendment$ is an addition to a [concept_law] that alters its effects, sponsored by a specific [concept_interest_group]. If an $concept_interest$ will [Concept('concept_endorse_oppose','$concept_endorse_or_oppose$')] an $concept_amendment$ is determined by the [concept_parent_law] of the $concept_amendment$. $concept_amendment_repeal_desc$"

 concept_amendment_repeal: "Amendment Repeal"
 concept_repeal: "Repeal"
 concept_repealed: "Repealed"
 concept_repealing: "Repealing"
 concept_amendment_repeal_desc: "An [concept_amendment] may be $concept_repealed$ if the $concept_amendment$ is not on cooldown, and any [concept_interest_group] in [concept_government] [Concept('concept_endorse_oppose','$concept_opposes$')] the $concept_amendment$'s [concept_parent_law]."

 concept_parent_law: "Parent Law"
 concept_parent_law_desc: "The $concept_parent_law$ of an [concept_amendment] determines the [Concept('concept_endorse_oppose','$concept_stance$')] of an [concept_ideology] towards the $concept_amendment$. Each [concept_interest_group] will then [Concept('concept_endorse_oppose','$concept_endorse_or_oppose$')] an $concept_amendment$ depending on their $concept_ideologies$."

 concept_enactment_setback: "Enactment Setback"
 concept_enactment_setbacks: "Enactment Setbacks"
 concept_enactment_setback_short: "Setback"
 concept_enactment_setbacks_short: "Setbacks"
 concept_enactment_setback_desc:1 "While [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacting$')] a [concept_law] you may suffer $concept_enactment_setbacks_short$. This could be due to a [Concept('concept_enactment_stall','$concept_enactment_stall_short$')] result at the $concept_enactment_of_laws_enactment$ checkpoint, a consequence of a [Concept('concept_enactment_debate','$concept_enactment_debate_short$')], or that [concept_enactment_success] chance fell below #v 0#!. If you accumulate too many $concept_enactment_setbacks_short$, the $concept_enactment_of_laws_enactment$ #r fails#!.\n\n@warning! If the enactment #r fails#!, you will not be able to attempt to enact that $concept_law$ again for #v [GetDefine('NPolitics','LAW_ENACTMENT_COOLDOWN_DAYS')|0] days#!."

 concept_enactment_phase: "Enactment Phase"
 concept_enactment_phase_short: "Phase"
 concept_enactment_phases_short: "Phases"
 concept_enactment_phases: "Enactment Phases"
 concept_enactment_phase_desc: "To [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] a [concept_law] you must successfully guide it through [GetDefine('NPolitics', 'LAW_ENACTMENT_MAX_PHASES')|v] $concept_enactment_phases_short$ [AddLocalizationIf(GetPlayer.IsValid,'concept_enactment_phase_ingame_added')]by achieving [Concept('concept_enactment_success','$concept_enactment_successes$')]. During this process there is a risk of getting [Concept('concept_enactment_setback','$concept_enactment_setbacks$')] that may cause the $concept_enactment_of_laws_enactment$ to #r fail#!."
 concept_enactment_phase_ingame_added: "- [GetPlayer.GetCustom('enactment_phase_0')|v], [GetPlayer.GetCustom('enactment_phase_1')|v], and [GetPlayer.GetCustom('enactment_phase_2')|v] - "

 concept_money:1 "Money"
 concept_money_desc:5 "$concept_money$ makes the world go 'round. It is used to pay for [Concept('concept_government_wage','$concept_government_wages$')] and [concept_bureaucracy] production, [concept_construction] materials, industry [concept_subsidies], [GetGoods('merchant_marine').GetName] for your [Concept('concept_shipping_lane','$concept_shipping_lanes$')], and last but probably not least, your military. You gain $concept_money$ by [Concept('concept_taxes','$concept_taxing$')] your [Concept('concept_pop', '$concept_pops$')] and enforcing [concept_tariffs]. Excess $concept_money$ in your [concept_treasury] balance is used to pay off your [concept_loans] or stockpile gold in your [concept_gold_reserves]. Insufficient $concept_money$ increases your $concept_loans$ towards your [Concept('concept_credit','$concept_credit_limit$')], which is determined by how much $concept_money$ is in your $concept_buildings$' [concept_cash_reserves]."

 concept_workforce:0 "Workforce"
 concept_workforce_desc:1 "The $concept_workforce$ of a [concept_building] consists of [Concept('concept_pop', '$concept_pops$')] of different [Concept('concept_profession', '$concept_professions$')] depending on the currently active [Concept('concept_production_method', '$concept_production_methods$')]."

 concept_gold_reserves:0 "Gold Reserves"
 concept_gold_reserves_desc:1 "A [Concept('concept_country','$concept_country_possessive$')] weekly budget surplus is accumulated in its $concept_gold_reserves$. If the budget balance becomes negative, any [concept_money] in the $concept_gold_reserves$ will be depleted first before the $concept_country$ starts taking [concept_loans]. The $concept_gold_reserves$ can only accumulate up to a fraction of your [concept_gdp] before diminishing returns set in. Stockpiling gold will eventually lead to depleting your economic engine."

 concept_cash_reserves:0 "Cash Reserves"
 concept_cash_reserves_desc:2 "The assets of a [concept_building] are stored in its $concept_cash_reserves$. If the $concept_building$ runs a positive weekly [concept_building_balance], some of the [concept_money] is deposited into the $concept_cash_reserves$ while the rest is paid out to the [concept_building_owners] as [concept_dividends].\n\n$concept_cash_reserves$ are considered to be owned by the $concept_building_owners$, and [Concept('concept_pop', '$concept_pops$')] will get angry if their $concept_cash_reserves$ are lost due to [concept_bankruptcy]. The sum of all $concept_cash_reserves$ in your [concept_country] determines your [concept_credit]."

 concept_obsession:0 "Obsession"
 concept_obsessed:0 "Obsessed"
 concept_obsessions: "Obsessions"
 concept_obsession_desc:1 "A [concept_culture] can be $concept_obsessed$ with specific [Concept('concept_good','$concept_goods$')]. [Concept('concept_pop', '$concept_pops$')] of that $concept_culture$ will spend significantly more on $concept_goods$ they are $concept_obsessed$ with compared to other $concept_goods$ in the same [concept_pop_needs] category."

 concept_taboo:0 "Taboo"
 concept_taboos: "Taboos"
 concept_taboo_desc:1 "A [concept_religion] can be have a $concept_taboo$ against specific [Concept('concept_good','$concept_goods$')]. [Concept('concept_pop', '$concept_pops$')] of that $concept_religion$ will spend significantly less on $concept_goods$ they consider $concept_taboo$ compared to other $concept_goods$ in the same [concept_pop_needs] category."

 concept_goods_substitution:0 "Goods Substitution"
 concept_goods_substitutes_short:0 "Substitutes"
 concept_goods_substitutable: "Substitutable"
 concept_goods_substitution_desc: "A [Concept('concept_pop_needs','$concept_pop_need$')] can be fulfilled by any of the [Concept('concept_good','$concept_goods$')] it consists of, and the availability of each $concept_good$ determines how much it is consumed.\n\nFor example, the [GetPopNeed('popneed_basic_food').GetName] $concept_pop_need$ contains both [GetGoods('grain').GetName] and [GetGoods('meat').GetName]. [Concept('concept_pop','$concept_pops$')] will typically consume more [GetGoods('grain').GetName] and less [GetGoods('meat').GetName]. However, if [GetGoods('meat').GetName] becomes more available than [GetGoods('grain').GetName], they will shift towards consuming more [GetGoods('meat').GetName] and less [GetGoods('grain').GetName] instead. In some cases, $concept_pops$ may even stop consuming a $concept_good$ entirely if there is no availability for that $concept_good$.\n\nAdditionally, [Concept('concept_culture','$concept_cultural$')] [Concept('concept_obsession','$concept_obsessions$')] and [Concept('concept_religion','$concept_religious$')] [Concept('concept_taboo','$concept_taboos$')] can significantly affect the consumption of certain $concept_goods$.\n\n$concept_goods$ with a higher $concept_base_price$ will contribute more to fulfilling a $concept_pop_need$ than those with a lower $concept_base_price$. For instance, a single unit of [GetGoods('groceries').GetName] is equivalent to several units of [GetGoods('grain').GetName]."

 concept_market_price:0 "Market Price"
 concept_market_prices:0 "Market Prices"
 concept_market_price_share: "Market Price Share"
 concept_market_price_short: "Price"
 concept_market_prices_short: "Prices"
 concept_market_price_desc:2 "The price of a [concept_good] in the [concept_market]. It is based on [concept_buy_orders] and [concept_sell_orders], and affect the [concept_local_price] of [Concept('concept_good','$concept_goods$')] in all participating [Concept('concept_state','$concept_states$')] depending on their [concept_market_access].\n\nThe degree to which the $concept_market_price$ influences the [concept_local_price] is calculated by multiplying the [concept_market_access] with the [Concept('concept_state','$concept_state_possessive$')] #v $state_market_access_price_impact$#! modifier."

 concept_local_price:0 "Local Price"
 concept_local_prices: "Local Prices"
 concept_local_goods_prices: "Local Goods Prices"
 concept_local_price_desc:2 "The price of a [concept_good] in a [concept_state]. It is determined by the local [concept_good_consumption] and [concept_good_production], moderated by the [concept_market_price] depending on the [Concept('concept_state','$concept_state_possessive$')] [concept_market_access] and #v $state_market_access_price_impact$#! modifier. All transactions occur in the $concept_local_price$, with purchases and sales creating [Concept('concept_buy_orders','$concept_buy_order_short$')] and [concept_sell_orders] on the [concept_market]."

 concept_world_market_price: "World Market Price"
 concept_world_market_price_desc: "The average price at which a [concept_good] is traded on the [concept_world_market]. This is dependent on the number of [Concept('concept_trade','$concept_exports$')] versus $concept_imports$ of that $concept_good$."

 concept_import_price: "Import Price"
 concept_import_price_desc: "The price at which a [concept_good] is imported from the [concept_world_market] in a specific [concept_state]. This is based on both the [concept_world_market_price] and the $concept_state_possessive$ relative [concept_trade_advantage]."

 concept_export_price: "Export Price"
 concept_export_price_desc: "The price at which a [concept_good] is exported to the [concept_world_market] in a specific [concept_state]. This is based on both the [concept_world_market_price] and the $concept_state_possessive$ relative [concept_trade_advantage]."

 concept_local_good: "Local Good"
 concept_local_goods: "Local Goods"
 concept_local_good_desc: "$concept_local_goods$ are certain [Concept('concept_good','$concept_goods$')] that are not available in the wider [concept_market] outside the [concept_state] where they are produced. Their price is fully determined by local [concept_good_production] and [concept_good_consumption], with [concept_market_price] not factored in at all."

 concept_subsistence_building:0 "Subsistence Building"
 concept_subsistence_buildings: "Subsistence Buildings"
 concept_subsistence_building_farming:0 "Subsistence Farming"
 concept_subsistence_building_desc:2 "A set of [Concept('concept_building', '$concept_buildings$')] that perform low-intensity, decentralized production of food and basic resource [Concept('concept_good','$concept_goods$')] suitable for mere survival. Their production is split between a small quantity of [Concept('concept_good','$concept_goods$')] to be sold on the [concept_market] and [concept_subsistence_output] used to sustain the meager [concept_sol] of the [SelectLocalization(GetPlayer.IsValid,'concept_subsistence_building_desc_added','Peasants')] who work there. They are considerably less effective than most $concept_buildings$, but will operate on any unclaimed [concept_arable_land] and does not require manual [concept_construction]."
 concept_subsistence_building_desc_added:0 "[GetPopType('peasants').GetName]"

 concept_economy_of_scale:0 "Economy of Scale"
 concept_economy_of_scale_desc:2 "Many [Concept('concept_building','$concept_buildings$')] become more efficient the larger they get. Such $concept_buildings$ gain the following effects for every [concept_building_level] beyond the first:\n[GetStaticModifier('economy_of_scale').GetDesc][AddLocalizationIf(GetPlayer.IsValid,'concept_economy_of_scale_desc_ingame_added')]"
 concept_economy_of_scale_desc_ingame_added:0 "\n\nYour current national level cap for $concept_economy_of_scale$ effects is [GetPlayer.GetModifier.GetValueWithBreakdownFor('building_economy_of_scale_level_cap_add')]."

 concept_interest_group:0 "Interest Group"
 concept_interest_groups:0 "Interest Groups"
 concept_interest_group_possessive:1 "Interest Group’s"
 concept_interest_group_plural_possessive:1 "Interest Groups’"
 concept_interest_group_desc:5 "A political faction within your [concept_country] that share a common interest. They are supported by [Concept('concept_pop', '$concept_pops$')] in relation to their [Concept('concept_interest_group_attraction','$concept_interest_group_attraction_short$')] to them, and the [concept_clout] they enjoy is based directly on the supporting $concept_pops$' [concept_political_strength]. $concept_interest_groups$ have a number of [Concept('concept_ideology', '$concept_ideologies$')], causing them to [Concept('concept_endorse_oppose','$concept_endorse_or_oppose$')] different [Concept('concept_law', '$concept_laws$')].\n\nThey also have three [Concept('concept_interest_group_trait', '$concept_interest_group_traits$')] that are activated on different [concept_approval] levels. Their [Concept('concept_leader','$concept_leader_possessive$')] personal $concept_ideology$ also rubs off on the $concept_interest_group$."

 concept_interest_group_attraction:0 "Interest Group Attraction"
 concept_interest_group_attraction_short:0 "Attraction"
 concept_interest_group_attractions:1 "Interest Group Attractions"
 concept_attracted:0 "Attracted"
 concept_interest_group_attraction_desc:4 "How likely [Concept('concept_pop', '$concept_pops$')] are to support a particular [concept_interest_group]. Influenced by the $concept_pop$'s properties, such as [concept_profession], [concept_wealth], and [concept_education_access], a high $concept_interest_group_attraction_short$ means the $concept_pop$ feels it's likely this $concept_interest_group$ represents their political interests."

 concept_politician:0 "Politician"
 concept_politicians:1 "Politicians"
 concept_politician_desc:2 "A [concept_character] that is actively engaged in the day-to-day politics of their [concept_interest_group]. $concept_politicians$ are eligible to become its next [concept_leader] even if their [concept_prominence] is below [GetDefine('NCharacters','PROMINENCE_SIGNIFICANT_THRESHOLD')|v]."

 concept_leader:0 "Leader"
 concept_leaders:0 "Leaders"
 concept_leader_possessive:0 "Leader’s"
 concept_leader_desc:2 "The [concept_character] who leads an [concept_interest_group] has a set of [Concept('concept_character_trait', '$concept_character_traits$')] that affect it, and a personal [concept_ideology] that is added to the $concept_interest_group$'s $concept_ideologies$ for as long as that $concept_leader$ is in charge."

 concept_interest_group_trait:0 "Interest Group Trait"
 concept_interest_group_traits:1 "Interest Group Traits"
 concept_interest_group_trait_short:0 "Trait"
 concept_interest_group_traits_short:0 "Traits"
 concept_interest_group_trait_desc:1 "All [Concept('concept_interest_group','$concept_interest_groups$')] have three $concept_interest_group_traits_short$ that take effect on different levels of [concept_approval] and have a considerable impact on the whole [concept_country].\nA negative $concept_interest_group_trait_short$ will activate if $concept_approval$ drops below $ig_approval_unhappy$ (#v [GetDefine('NPolitics','APPROVAL_THRESHOLD_UNHAPPY')|0=+]#!)\nA positive $concept_interest_group_trait_short$ will activate if $concept_approval$ exceeds $ig_approval_happy$ (#v [GetDefine('NPolitics','APPROVAL_THRESHOLD_HAPPY')|0=+]#!)\nAn additional positive $concept_interest_group_trait_short$ will activate if $concept_approval$ exceeds $ig_approval_loyal$ (#v [GetDefine('NPolitics','APPROVAL_THRESHOLD_LOYAL')|0=+]#!).\nOnce active, the $concept_interest_group_trait_short$ will not deactivate until $concept_approval$ is at least [GetDefine('NPolitics','IG_TRAIT_STICKINESS')|v] points away from the threshold.\n\nThe $concept_interest_group_traits_short$ of [concept_marginalized] $concept_interest_groups$ never activate, while the $concept_interest_group_traits_short$ of [concept_powerful] $concept_interest_groups$ have increased effect."

 concept_decay:0 "Decay"
 concept_decaying:0 "Decaying"
 concept_decay_desc:0 "A $concept_decaying$ effect will gradually decrease in intensity, starting from its initial value and decreasing linearly down to #v 0#! over the stated decay duration."

 concept_character_trait:0 "Character Trait"
 concept_character_traits:1 "Character Traits"
 concept_character_trait_short: "Trait"
 concept_character_traits_short:0 "Traits"
 concept_character_trait_desc:1 "Personality $concept_character_traits_short$, Skill $concept_character_traits_short$, or Conditions that impact a [Concept('concept_character','$concept_character_possessive$')] ability to carry out their current [concept_character_role]. More or different $concept_character_traits$ may develop as the $concept_character$ gains [concept_life_experience]."

 concept_construction_queue:0 "Construction Queue"
 concept_construction_queue_desc:2 "Any [Concept('concept_building', '$concept_buildings$')] that have been set to be expanded, but are currently not using any [concept_construction], are placed in the $concept_construction_queue$. Whenever any $concept_construction$ becomes available, the first $concept_building$ in the $concept_construction_queue$ will start using that $concept_construction$ and then switch to being [concept_under_construction]."

 concept_government_construction:0 "Government Construction"
 concept_government_constructions:0 "Government Constructions"
 concept_government_construction_desc:1 "A $concept_government_construction$ is a [concept_building] that is being expanded on the direct orders of a [Concept('concept_country','$concept_country_possessive$')] [concept_government].\n\nIt can draw funds directly from the state treasury and can be reprioritized or removed from the [concept_construction_queue].\n\nThe resulting [Concept('concept_building_level','$concept_building_levels$')] become [concept_nationally_owned]"

 concept_private_construction:0 "Private Construction"
 concept_private_constructions:0 "Private Constructions"
 concept_private_construction_desc:1 "A $concept_private_construction$ is a [concept_building] that is being expanded on the orders of private actors.\n\nIt is always funded by the [concept_investment_pool] and cannot be can be reprioritized or removed from the [concept_construction_queue].\n\nThe resulting [Concept('concept_building_level','$concept_building_levels$')] become [concept_privately_owned]"

 concept_under_construction:0 "Under Construction"
 concept_under_construction_desc:0 "When a [concept_building] is using [concept_construction] it is considered being $concept_under_construction$."

 concept_urbanization:0 "Urbanization"
 concept_urbanization_desc:2 "$concept_urbanization$ is generated by most [Concept('concept_building', '$concept_buildings$')] constructed in a [concept_state] to varying degrees. When sufficient $concept_urbanization$ has accumulated in a $concept_state$, an [SelectLocalization(GetPlayer.IsValid,'concept_urbanization_desc_added','Urban Center')] will be automatically expanded."
 concept_urbanization_desc_added:0 "[GetBuildingType('building_urban_center').GetName]"

 concept_endorse_oppose:0 "$concept_endorsement$ and $concept_opposition$ to $concept_laws$"
 concept_endorse:0 "Endorse"
 concept_endorses:0 "Endorses"
 concept_endorsed:0 "Endorsed"
 concept_endorsing: "Endorsing"
 concept_endorsement:0 "Endorsement"
 concept_opposition:0 "Opposition"
 concept_oppose:0 "Oppose"
 concept_opposes:0 "Opposes"
 concept_opposed: "Opposed"
 concept_opposing: "Opposing"
 concept_indifferent:0 "Indifferent"
 concept_endorses_and_opposes:0 "$concept_endorses$ and $concept_opposes$"
 concept_endorse_or_oppose: "$concept_endorse$ or $concept_oppose$"
 concept_stance: "Stance"
 concept_endorse_oppose_desc:2 "An [Concept('concept_interest_group','$concept_interest_group_possessive$')] $concept_endorsement$ or $concept_opposition$ of a [concept_law] is determined by their [Concept('concept_ideology','$concept_ideologies$')]. $concept_enactment_of_laws_potential$"

 concept_ideology:0 "Ideology"
 concept_ideologies:0 "Ideologies"
 concept_ideology_possessive: "Ideology’s"
 concept_ideology_desc:3 "An [Concept('concept_interest_group','$concept_interest_group_possessive$')] $concept_ideology$ influences which [Concept('concept_law','$concept_laws$')] it [Concept('concept_endorse_oppose','$concept_endorses_and_opposes$')]. Their stance on the $concept_laws$ which are currently in effect in the [concept_country] have small, permanent effects on the $concept_interest_group$'s [concept_approval]. While a $concept_country$ is trying to [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] a new $concept_law$, a larger but temporary effect applies relative to which $concept_law$ is being removed and which is coming into effect. This temporary effect will eventually [concept_decay], leaving only the permanent, objective effect on $concept_approval$."

 concept_presidency_stability: "Presidency Stability"
 concept_presidency_stability_short: "Stability"
 concept_presidency_stability_desc:2 "$concept_presidency_stability$ is a metric for the level of unrest within one of the three [Concept('concept_presidency', '$concept_presidencies$')] of colonial India.\n\n#title The stability of a $concept_presidency$ falls within one of four brackets:#! #indent_newline:3 \n#r Critical#!: #v [GetPlayer.MakeScope.ScriptValue('uneasy_raj_stability_critical_lower_bound')]#!-#v [GetPlayer.MakeScope.ScriptValue('uneasy_raj_stability_critical_upper_bound')]#!\n#b Low#!: #v [GetPlayer.MakeScope.ScriptValue('uneasy_raj_stability_low_lower_bound')]#!-#v [GetPlayer.MakeScope.ScriptValue('uneasy_raj_stability_low_upper_bound')]#!\n#b Medium#!: #v [GetPlayer.MakeScope.ScriptValue('uneasy_raj_stability_medium_lower_bound')]#!-#v [GetPlayer.MakeScope.ScriptValue('uneasy_raj_stability_medium_upper_bound')]#!\n#b High#!: #v [GetPlayer.MakeScope.ScriptValue('uneasy_raj_stability_high_lower_bound')]#!-#v [GetPlayer.MakeScope.ScriptValue('uneasy_raj_stability_high_upper_bound')]#!#!\n\n#title The following conditions in a $concept_presidency$ #r decrease#! its stability:#! #indent_newline:3 \n• [Concept('concept_state', '$concept_states$')] in [concept_turmoil] in the $concept_presidency$\n• [Concept('concept_subject', '$concept_subjects$')] with #bold high#! [concept_liberty_desire] in the $concept_presidency$#!\n\n#title The following conditions in the East India Company #r decrease#! stability:#! #indent_newline:3 \n• #bold Low#! [concept_approval] of [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]\n• #bold High#! [concept_taxes] in the East India Company\n• #bold Low#! [Concept('concept_military_wage','$concept_military_wages$')] in the East India Company\n• [GetIdeology('ideology_utilitarian_leader').GetName] leaders in [concept_government]\n• #bold Not#! having the [GetLawType('law_total_separation').GetName] [concept_law]\n• #bold Not#! having the [GetLawType('law_professional_army').GetName] [concept_law]\n• Events and other effects #!\n\n#title The following conditions #g increase#! the stability of a $concept_presidency$:#! #indent_newline:3 \n• [Concept('concept_state', '$concept_states$')] with [Concept('concept_loyalist','$concept_loyalists$')] in the $concept_presidency$\n• [Concept('concept_subject', '$concept_subjects$')] with #bold low#! [concept_liberty_desire] in the $concept_presidency$#!\n\n#title The following conditions in the East India Company #g increase#! stability:#! #indent_newline:3 \n• Native #b Indian#! [Concept('concept_interest_group', '$concept_interest_groups$')] [concept_in_government]\n• #bold High#! [concept_approval] of [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]\n• #bold Low#! [concept_taxes] in the East India Company\n• #bold High#! [Concept('concept_military_wage','$concept_military_wages$')] in the East India Company\n• Events and other effects#!"

 concept_presidency: "Presidency"
 concept_presidency_desc: "The $concept_presidencies$ are the highest level administrative units of colonial India. There are three $concept_presidencies$, with borders delineated by [Concept('concept_georegion','$concept_georegions$')].\n\n#bold Bengal Presidency#!\n#title $concept_georegions$:#! [GetGeographicRegion('geographic_region_bengal_old').GetName], [GetGeographicRegion('geographic_region_central_india_old').GetName], and [GetGeographicRegion('geographic_region_punjab_old').GetName].\n\n#bold Bombay Presidency#!\n#title $concept_georegions$:#! [GetGeographicRegion('geographic_region_bombay_old').GetName].\n\n#bold Madras Presidency#!\n#title $concept_georegions$:#! [GetGeographicRegion('geographic_region_madras_old').GetName]."
 concept_presidencies: "Presidencies"

 concept_court_intrigue: "Court Intrigue" # for je_sikh_sovereignty
 concept_court_intrigue_short: "Intrigue"
 concept_court_intrigue_desc:1 "$concept_court_intrigue$ represents the progress of various plots to overthrow the $RULER_TITLE_MAHARAJA$ ([concept_ruler]). $concept_court_intrigue_short$ is tracked in the #b $je_sikh_sovereignty$#! [concept_journal_entry]. If $concept_court_intrigue_short$ reaches #v 100%#!, the $RULER_TITLE_MAHARAJA$ ($concept_ruler$) will be assassinated, [concept_empire_stability] will be #bold reset#! to #v 0#!, $concept_court_intrigue_short$ will decrease, and a new candidate will be enthroned.\n\n#title The following conditions #g #b decrease#!#! $concept_court_intrigue$:#! #indent_newline:3 \n• $RULER_TITLE_MAHARAJA$ ([concept_ruler]) is #b $Ranjit$ $Singh$#!\n• [GetCharacterTrait('ruthless').GetName] [Concept('concept_leader', '$concept_leaders$')] [concept_in_government] with [concept_approval] above #v 5#!\n• [GetCharacterTrait('compliant').GetName] [Concept('concept_leader', '$concept_leaders$')] [concept_in_government]\n• [concept_ruler] [concept_interest_group] is [concept_powerful]\n• High [concept_legitimacy]\n• Events and other effects #!\n\n#title The following conditions #r #b increase#!#! $concept_court_intrigue$:#! #indent_newline:3 \n• [GetCharacterTrait('reckless').GetName] [concept_ruler]\n• Low [concept_ruler] [concept_popularity]\n• [GetCharacterTrait('ruthless').GetName] [Concept('concept_leader', '$concept_leaders$')] [concept_in_government] or [concept_in_opposition] with [concept_approval] below #v 0#!\n• [GetCharacterTrait('ambitious').GetName] [Concept('concept_leader', '$concept_leaders$')] [concept_in_government] or [concept_in_opposition] with [concept_approval] below #v 0#!\n• [concept_ruler] [concept_interest_group] is [concept_marginalized]\n• Low [concept_legitimacy]\n• Events and other effects#!"

 concept_empire_stability: "Empire Stability" # for je_sikh_sovereignty
 concept_empire_stability_short: "Stability"
 concept_empire_stability_desc: "$concept_empire_stability$ represents the strength of the $RULER_TITLE_MAHARAJA$ ([concept_ruler]). [Concept('concept_empire_stability','$concept_empire_stability_short$')] is tracked in the #b $je_sikh_sovereignty$#! [concept_journal_entry].\n\nLegitimacy must be above #v 50#! for $concept_empire_stability_short$ to increase. If [concept_court_intrigue] reaches #v 100%#!, the $RULER_TITLE_MAHARAJA$ ($concept_ruler$) will be assassinated, $concept_empire_stability_short$ will be #bold reset#! to #v 0#!, $concept_court_intrigue_short$ will decrease, and a new candidate will be enthroned.\n\n#title The following conditions #g #b increase#!#! $concept_empire_stability$:#! #indent_newline:3 \n• [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] is [concept_in_government]\n• [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] is [concept_powerful]\n• [GetReligion('sikh').GetName] is the [concept_state_religion]\n• [GetLawType('law_freedom_of_conscience').GetName] [concept_law] is [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')]\n• Events and other conditions #!\n\n#title The following conditions #r #b decrease#!#! $concept_empire_stability$:#! #indent_newline:3 \n• [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] [concept_interest_group] is not [concept_in_government]\n• [concept_court_intrigue] reaches #v 100%#!\n• Events and other conditions #!"

 concept_ottoman_integrity: "Rumelian Integrity" # for je_great_eastern_crisis
 concept_ottoman_integrity_short: "Integrity"
 concept_ottoman_integrity_desc: "$concept_ottoman_integrity$ represents the stability of $dyn_c_ottoman_empire_adj$ in the [GetStrategicRegion('region_balkans').GetName] [concept_strategic_region] under threat of [Concept('concept_secession','$concept_secessionist$')] [Concept('concept_political_movement','$concept_political_movements$')]. [Concept('concept_ottoman_integrity','$concept_ottoman_integrity_short$')] is tracked in the #b $je_great_eastern_crisis$#! [concept_journal_entry].\n\n[concept_activism] for all $concept_secessionist$ $concept_political_movements$ in $dyn_c_ottoman_empire$ must be #b below#! #v 75#! for $concept_ottoman_integrity_short$ to increase.\n\n#title The following conditions #g #b increase#!#! $concept_ottoman_integrity$:#! #indent_newline:3 \n• [concept_legitimacy] in $dyn_c_ottoman_empire$ is #v 50#! or #b above#!\n• $dyn_c_ottoman_empire$ is #r #b not#!#! at [concept_war]\n• $dyn_c_ottoman_empire$ does #r #b not#!#! have any growing [Concept('concept_secession','$concept_secessionist$')] [Concept('concept_political_movement','$concept_political_movements$')]\n• $dyn_c_ottoman_empire$ has recently crushed a [concept_secession]#!"

 concept_balkan_culture: "Balkan Culture" # for je_great_eastern_crisis
 concept_balkan_cultures: "Balkan Cultures"
 concept_balkan_culture_short: "Balkan"
 concept_balkan_culture_desc: "#title [Concept('concept_secession', '$concept_secessionist$')] [Concept('concept_political_movement','$concept_political_movements$')] driven by the following [Concept('concept_culture', '$concept_cultures$')] impact [concept_ottoman_integrity]:#! #indent_newline:3 \n• [GetCulture('albanian').GetName]\n• [GetCulture('bosniak').GetName]\n• [GetCulture('bulgarian').GetName]\n• [GetCulture('croat').GetName]\n• [GetCulture('greek').GetName]\n• [GetCulture('romanian').GetName]\n• [GetCulture('serb').GetName]"

 concept_subsistence_output:0 "Subsistence Output"
 concept_subsistence_output_desc:3 "A form of in-kind income that [SelectLocalization(GetPlayer.IsValid,'concept_subsistence_output_desc_added','Peasants')] generate from [Concept('concept_subsistence_building','$concept_subsistence_building_farming$')], which represents the work they perform producing [Concept('concept_good','$concept_goods$')] to cover their own [Concept('concept_pop_needs','$concept_pop_needs_short$')]. Unlike [Concept('concept_building_wage','$concept_building_wages$')], $concept_subsistence_output$ is not paid out from the $concept_building$'s [concept_revenue] and is not subject to [concept_budget_income_taxes]."
 concept_subsistence_output_desc_added:0 "[GetPopType('peasants').GetName]"

 concept_split_state:0 "Split State"
 concept_split_states: "Split States"
 concept_split_state_short:0 "Split"
 concept_split_state_desc:2 "A [concept_state_region] split into multiple smaller [Concept('concept_state', '$concept_states$')] belonging to different [Concept('concept_country','$concept_countries$')]. When split, a portion of the [Concept('concept_resource_potential','$concept_resource_potentials$')], [Concept('concept_building','$concept_buildings$')], and [Concept('concept_pop','$concept_pops$')] are redistributed between the $concept_states$. Should one $concept_country$ take control of more than one part of the $concept_split_state$, these will be combined into a single $concept_state$."

 concept_unincorporated_state:0 "Unincorporated State"
 concept_unincorporated_state_short:0 "Unincorporated"
 concept_unincorporated_states:0 "Unincorporated States"
 concept_unincorporated_state_icon:0 "@unincorporated!"
 UNINCORPORATED_ICON_WITH_CONCEPT: "[Concept('concept_unincorporated_state','$concept_unincorporated_state_icon$')]"
 concept_unincorporated_state_desc:2 "A [concept_state] that is within a [Concept('concept_country','$concept_country_possessive$')] domain, but considered a territorial holding or frontier beyond the reach of [Concept('concept_institution','$concept_institutions$')] and [concept_government]. [Concept('concept_pop', '$concept_pops$')] who live in $concept_unincorporated_states$ are disenfranchised and do not contribute much [concept_political_strength] to their [Concept('concept_interest_group', '$concept_interest_groups$')], nor can they [Concept('concept_votes','$concept_vote$')] in [Concept('concept_election','$concept_elections$')]. On the upside (for them) they are exempt from [Concept('concept_taxes','$concept_taxation$')].\n\n$concept_unincorporated_states$ do not cost [concept_bureaucracy] to maintain, as $concept_taxes$ are not collected and $concept_institutions$ do not provide any benefits there. $concept_unincorporated_states$ can be [Concept('concept_incorporated_state','$concept_incorporated$')], which will put it under the direct management of the [Concept('concept_country','$concept_country_possessive$')] central authority.[AddLocalizationIf(GetPlayer.IsValid,'concept_unincorporated_state_desc_added')]"
 concept_unincorporated_state_desc_added:1 "\n\n$concept_unincorporated_states$ are subject to the following effects:\n[GetStaticModifier('unincorporated_state').GetDesc]#!"

 concept_decentralized_nation:1 "Decentralized Nation"
 concept_decentralized_nations:3 "Decentralized Nations"
 concept_decentralized: "Decentralized"
 concept_decentralized_nation_desc:1 "A [Concept('concept_country','$concept_country_nation$')] that share most properties of $concept_countries$ - [Concept('concept_pop','$concept_pops$')], a [concept_ruler], [Concept('concept_building','$concept_buildings$')], [Concept('concept_law','$concept_laws$')] and so on - but with a lack of centralized power (and/or will) to enforce borders. This makes them prone to [Concept('concept_colony','$concept_colonization$')] by $concept_countries$ who do not see them as equals to be properly [Concept('concept_diplomatic_play','$concept_diplomatic_play_negotiated$')] with for land rights.\n\n$concept_decentralized_nations$ are AI controlled and are not playable by humans."

 concept_arable_land:0 "Arable Land"
 concept_arable_land_desc:1 "The amount of land in a [concept_state] that can be used for cultivating crops or raising cattle. Unlike [Concept('concept_building','$concept_buildings$')] that require certain [Concept('concept_resource_potential','$concept_resource_potentials$')] to be constructed, $concept_arable_land$ must be shared between the $concept_building$ types that require it.\n\nThe amount of $concept_arable_land$ that stands unused by other $concept_buildings$ may be used for [Concept('concept_subsistence_building','$concept_subsistence_buildings$')], letting [Concept('concept_pop','$concept_pops$')] eke out a meager living even if not gainfully employed."

 concept_state_region:0 "State Region"
 concept_state_regions:0 "State Regions"
 concept_state_region_possessive: "State Region’s"
 concept_state_region_desc:3 "A part of the world corresponding with a certain fixed set of [Concept('concept_province', '$concept_provinces$')]. A $concept_state_region$ is usually equivalent to a [concept_state]. In certain cases a $concept_state_region$ can become a [concept_split_state], where two or more [Concept('concept_country','$concept_countries$')] each hold a $concept_state$ in the same $concept_state_region$."

 concept_occupancy:0 "Occupancy"
 concept_occupancy_desc:1 "How fully employed a [concept_building] is, which also determines how much of its maximum [Concept('concept_good_production','Productive')] capacity is utilized. If the $concept_building$ has room to hire a larger [concept_workforce], it will always try to do so. If its hiring is limited by the [concept_building_wage] it can offer, it will increase $concept_building_wages$ for as long as its [concept_building_balance] remains positive."

 concept_votes:0 "Votes"
 concept_vote:0 "Vote"
 concept_voting_rights:0 "Voting Rights"
 concept_voting:0 "Voting"
 concept_votes_desc:1 "Your [Concept('concept_law', '$concept_laws$')] determine whether any given [concept_pop] gets to cast a $concept_vote$, and if so, how much [concept_political_strength] that $vote$ will count for. $concept_votes$ are cast for [Concept('concept_party','$concept_parties$')] during [concept_election] periods. $concept_pops$ will tend to vote for the $concept_party$ their [concept_interest_group] belongs to, but may be won over by another $concept_party$ with greater [concept_momentum]. After the $concept_election$ date, the number of total $concept_votes$ each $concept_party$ received will be fixed until the next $concept_election$, and will increase the [concept_clout] of any $concept_interest_groups$ that are members of the $concept_party$."

 concept_clout:0 "Clout"
 concept_clout_desc:1 "An [Concept('concept_interest_group','$concept_interest_group_possessive$')] share of the total [concept_political_strength] that [Concept('concept_pop', '$concept_pops$')] across their [concept_country] generate. $concept_clout$ is the final word on how influential an $concept_interest_group$ is, and affects everything from [concept_legitimacy] and [concept_enactment_of_laws] if the $concept_interest_group$ is [concept_in_government], to [concept_political_movement_support] and [Concept('concept_activism','$concept_activism_short$')] if it is [concept_in_opposition]. It also affects whether the $concept_interest_group$ is considered [concept_powerful], [concept_influential], or [concept_marginalized]."

 concept_powerful:0 "Powerful"
 concept_powerful_desc:1 "$concept_influential_powerful_common$ A $concept_powerful$ $concept_interest_group$'s [Concept('concept_interest_group_trait','$concept_interest_group_traits$')] will have a [GetDefine('NPolitics','POWERFUL_IG_TRAIT_BONUS')|%0=+] greater effect than if they were merely $concept_influential$.\n\n$concept_interest_groups$ are considered $concept_powerful$ while their $concept_clout$ is above [GetDefine('NPolitics','POWERFUL_IG_THRESHOLD')|%0]."

 concept_influential:0 "Influential"
 concept_influential_powerful_common:0 "The amount of [concept_clout] an [concept_interest_group] has decides whether it is [concept_powerful], $concept_influential$, or [concept_marginalized]."
 concept_influential_desc:1 "$concept_influential_powerful_common$ An $concept_influential$ $concept_interest_group$'s [Concept('concept_interest_group_trait','$concept_interest_group_traits$')] will have a lesser effect than if they were $concept_powerful$.\n\n$concept_interest_groups$ are considered $concept_influential$ while their $concept_clout$ is below [GetDefine('NPolitics','POWERFUL_IG_THRESHOLD')|%0v]."

 concept_marginalized:0 "Marginalized"
 concept_marginalized_desc:2 "$concept_marginalized$ [Concept('concept_interest_group', '$concept_interest_groups$')] have too little [concept_clout] to be politically noteworthy and cannot be included in the [concept_government]. A $concept_marginalized$ $concept_interest_group$ that is supported by at least [GetDefine('NPolitics','MARGINAL_IG_JOIN_PARTY_POPULATION_THRESHOLD')] will be able to join a [concept_party], and will cease being $concept_marginalized$ once they do so. Their [Concept('concept_interest_group_trait','$concept_interest_group_traits$')] are deactivated for as long as they remain $concept_marginalized$.\n\nAlready $concept_marginalized$ $concept_interest_groups$ remain $concept_marginalized$ for as long as their $concept_clout$ is below [GetDefine('NPolitics','MARGINAL_IG_THRESHOLD')|%0v]. Non-$concept_marginalized$ $concept_interest_groups$ that are not in a $concept_party$ will become $concept_marginalized$ once their $concept_clout$ drops below [GetDefine('NPolitics','MARGINAL_IG_CUTOFF')|%0v], unless they are already [concept_in_government] in which case they do not become $concept_marginalized$ until removed.\n\nThe [Concept('concept_interest_group_trait','$concept_interest_group_traits$')] of $concept_interest_groups$ whose $concept_clout$ is below [GetDefine('NPolitics','MARGINAL_IG_THRESHOLD')|%0v] but are not $concept_marginalized$ will have a [GetDefine('NPolitics','POWERFUL_IG_TRAIT_BONUS')|%0=+] less effect than if they were merely $concept_influential$"

 concept_politically_unaligned_aligned:1 "Politically Unaligned/Aligned"
 concept_politically_unaligned:1 "Politically Unaligned"
 concept_politically_involved:1 "Politically Aligned"
 concept_politically_unaligned_aligned_desc:4 "The part of a [concept_pop] that does not support an [concept_interest_group] is called #b Politically Unaligned#!. This is often due to low [concept_literacy] or [concept_sol]. $concept_politically_unaligned$ parts of $concept_pops$ do not participate in the political process and any [concept_political_strength] they possess is wasted.\n\nThe opposite of this is #b Politically Aligned#!. Which means the $concept_pop$ is part of one of your [Concept('concept_country', '$concept_country_possessive$')] [Concept('concept_interest_group', '$concept_interest_groups$')] and the $concept_pop$'s $concept_political_strength$ is attributed to that $concept_interest_group$.\n\n[Concept('concept_character', '$concept_characters$')] below the age of [GetDefine('NCharacters','ADULT_AGE')|v] are usually #b $concept_politically_unaligned$.#!"

 concept_investment_level:0 "Investment Level"
 concept_investment_levels:1 "Investment Levels"
 concept_investment_level_desc:4 "The current level of an [concept_institution]. Each level costs an amount of [concept_bureaucracy] depending on the [Concept('concept_pop','$concept_population$')] size of your [Concept('concept_incorporated_state','$concept_incorporated_states$')], and its effects scale with the level.[AddLocalizationIf(GetPlayer.IsValid,'concept_investment_level_ingame_added')]"
 concept_investment_level_ingame_added:1 "\n\nYou currently pay @bur! #v [Multiply_CFixedPoint(GetPlayer.GetInstitutionInvestmentBureaucracyCost,'(CFixedPoint)-1')|0+]#! [concept_bureaucracy] for [GetPlayer.GetInstitutionInvestment|v0] $concept_investment_levels$, or @bur! #v [GetPlayer.GetInstitutionInvestmentBureaucracyFactor|+0]#! [concept_bureaucracy] per level."

 concept_production_lens:0 "Production Lens"
 concept_production_lens_desc:1 "View [Concept('concept_state','$concept_states$')] and construct [concept_good_production] [Concept('concept_building','$concept_buildings$')]."

 concept_political_lens:0 "Political Lens"
 concept_political_lens_desc:1 "View [Concept('concept_interest_group','$concept_interest_groups$')] and [Concept('concept_incorporated_state','$concept_incorporated_states$')], construct [Concept('concept_government_building','$concept_government_buildings$')], issue [Concept('concept_decree','$concept_decrees$')], and manage matters of domestic political importance to your [concept_country]."

 concept_diplomatic_lens:0 "Diplomatic Lens"
 concept_diplomatic_lens_desc:1 "View the [concept_attitude] of other [Concept('concept_country','$concept_countries$')] and monitor your [Concept('concept_interest','$concept_interests$')] and their [Concept('concept_strategic_region','$concept_strategic_regions$')], establish [Concept('concept_diplomatic_pact','$concept_diplomatic_pacts$')] and take [Concept('concept_diplomatic_action','$concept_diplomatic_actions_short$')], and start [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]."

 concept_military_lens:0 "Military Lens"
 concept_military_lens_desc:1 "View the progress of ongoing [Concept('concept_war','$concept_wars$')], construct [Concept('concept_military_building','$concept_military_buildings$')], and recruit [Concept('concept_commander','$concept_commanders$')]."

 concept_country:0 "Country"
 concept_countries:1 "Countries"
 concept_country_nation:0 "Nation"
 concept_country_nation_state:0 "Nation-State"
 concept_country_polity:0 "Polity"
 concept_country_polities:0 "Polities"
 concept_country_possessive:1 "Country’s"
 concept_countries_possessive:0 "Countries’"
 concept_country_desc:3 "A $concept_country$ consists of one or several parcels of [Concept('concept_province','$concept_province_land$')] organized into [Concept('concept_state','$concept_states$')], in which a [Concept('concept_pop','$concept_population$')] resides under the rule of a [concept_government] and its [concept_head_of_state]. In Victoria 3, both human and AI players each control a $concept_country$.\n\nAside from the nature of their $concept_pops$, which $concept_states$ they own, and how they been developed, a $concept_country$ is defined also by their [concept_country_tier], [concept_primary_cultures], and [concept_state_religion], and whether they are [Concept('concept_recognized_power','$concept_recognized_power_short$')] or [Concept('concept_unrecognized_power','$concept_unrecognized_power_short$')]. $concept_countries$ also have different [Concept('concept_law','$concept_laws$')] and access to different [Concept('concept_technology','$concept_technologies$')]."

 concept_decree:0 "Decree"
 concept_decrees:2 "Decrees"
 concept_decree_desc:2 "$concept_decrees$ are demands made by a [Concept('concept_country','$concept_country_possessive$')] [concept_ruler] to effect changes in a [concept_state] under their control. $concept_decrees$ cost [concept_authority] for as long as they are active. Once issued, the $concept_decree$ will provide a certain bonus to the $concept_state$ until it is removed."

 concept_pop_needs:1 "Pop Needs"
 concept_pop_need:0 "Pop Need"
 concept_pop_needs_short:0 "Needs"
 concept_pop_need_short:0 "Need"
 concept_pop_needs_desc:1 "[Concept('concept_pop', '$concept_pops$')] spend their income on [Concept('concept_good', '$concept_goods$')] to fulfill their $concept_pop_needs_short$. The higher their [concept_wealth] the more $concept_goods$ it will purchase. $concept_pops$ gain more diverse and luxurious $concept_pop_needs_short$ as their $concept_wealth$ increases. A given $concept_pop_need_short$ can often be satisfied by a variety of $concept_goods$ via [concept_goods_substitution]. If the $concept_pop$ has money left over after its $concept_pop_needs_short$ have been fulfilled their $concept_wealth$ will increase. The inverse is also true: if the $concept_pop$ cannot afford their $concept_pop_needs_short$ they will still purchase them, and the shortfall reduces their $concept_wealth$."

 concept_combat_unit_group: "Military Unit Group"
 concept_combat_unit_groups: "Military Unit Groups"
 concept_combat_unit_group_short: "Unit Group"
 concept_combat_unit_groups_short: "Unit Groups"
 concept_combat_unit_group_desc: "$concept_units$ are categorized into [Concept('concept_default_unit','$concept_default_units$')] and [Concept('concept_special_unit','$concept_special_units$')] which possess different strengths and weaknesses. #b [GetCombatUnitGroup('combat_unit_group_infantry').GetName]#! is better suited for defending territory, while #b [GetCombatUnitGroup('combat_unit_group_cavalry').GetName]#! is better at [concept_occupation] for example."

 concept_combat_unit_type: "Military Unit Type"
 concept_combat_unit_types: "Military Unit Types"
 concept_combat_unit_type_short: "Unit Type"
 concept_combat_unit_types_short: "Unit Types"
 concept_combat_unit_type_desc: "Within a [concept_combat_unit_group] there are different types of $concept_units_short$. Most of the time, they are unlocked by technological advances and are better at fighting than the type they replace."

 concept_unit: "Military Unit"
 concept_units: "Military Units"
 concept_unit_short: "Unit"
 concept_units_short: "Units"
 concept_unit_possessive: "Military Unit’s"
 concept_unit_desc: "$concept_units$ are [Concept('concept_battalion','$concept_battalions$')] assigned to a [concept_military_formation] and perform military operations under the guidance of a [concept_general]. $concept_battalions$ are sub-divided into distinct groups: [GetBattalionGroupsList]. Units in the #b Default#! group are unlimited, while having more #b Special#! units than Default ones may incur an [concept_organization] penalty."

 concept_special_unit: "Special Unit"
 concept_special_units: "Special Units"
 concept_special_unit_desc: "These are [Concept('concept_unit','$concept_units$')] that are not #b [GetCombatUnitGroup('combat_unit_group_infantry').GetName]#! which are considered [Concept('concept_default_unit','$concept_default_units$')].\n\n$concept_special_units$ for [Concept('concept_army','$concept_armies$')]:\n$TAB$#b [GetCombatUnitGroup('combat_unit_group_artillery').GetName]#!\n$TAB$#b [GetCombatUnitGroup('combat_unit_group_cavalry').GetName]#!"

 concept_default_unit: "Default Unit"
 concept_default_units: "Default Units"
 concept_default_unit_desc: "These are #b [GetCombatUnitGroup('combat_unit_group_infantry').GetName]#! [Concept('concept_unit','$concept_units$')] in [Concept('concept_army','$concept_armies$')]."

 concept_kill_rate:0 "Kill Rate"
 concept_kill_rate_desc:0 "How effective a [concept_unit] is at ensuring their opponent's [concept_casualties] end up unable to come back to fight another day. Increases the ratio of [concept_casualties] that end up killed (instead of [concept_wounded]). $concept_kill_rate$ is countered by the enemy $concept_unit$'s [concept_recovery_rate]."

 concept_recovery_rate:0 "Recovery Rate"
 concept_recovery_rate_desc:0 "The percentage of [concept_casualties] a [concept_unit] takes that survive, in some cases by becoming [concept_dependents]. Can be increased with #b [Concept('concept_mobilization_option','$concept_mobilization_options$')]. $concept_recovery_rate$ is countered by the enemy $concept_unit$'s [concept_kill_rate]."

 concept_casualties:0 "Casualties"
 concept_casualties_desc:0 "[concept_manpower] who fall in battle or through [concept_attrition] are considered $concept_casualties$. A proportion of $concept_casualties$ are killed outright while the remainder are [concept_wounded]. This ratio is dependent on the [Concept('concept_unit','$concept_unit_possessive$')] [concept_recovery_rate] compared to their enemy's [concept_kill_rate]."

 concept_offense:0 "Offense"
 concept_offense_desc:0 "A [Concept('concept_unit','$concept_unit_possessive$')] fighting ability in [concept_battle] while advancing into enemy territory."

 concept_defense:0 "Defense"
 concept_defense_desc:0 "A [Concept('concept_unit','$concept_unit_possessive$')] fighting ability in [concept_battle] while defending from enemy incursions."

 concept_blockade_strength: "Blockade Strength"
 concept_blockade_strength_short: "Strength"
 concept_blockade_strength_desc: "Determines the degree to which a [concept_fleet] is able to successfully [concept_blockade] enemy [Concept('concept_state', '$concept_states$')]."

 concept_blockade_efficiency: "Blockade Efficiency"
 concept_blockade_efficiency_desc: "$concept_blockade_efficiency$ is the average [concept_blockade] level a [concept_fleet] achieves across all hostile ports in its [concept_naval_mission] area. It is based on [concept_blockade_strength] vs the [concept_blockade_resistance] of each target port, distributed evenly across all targeted ports."

 concept_blockade_resistance: "Blockade Resistance"
 concept_blockade_resistance_short: "Resistance"
 concept_blockade_resistance_desc: "$concept_blockade_resistance$ is the amount of [concept_blockade_strength] required to fully [concept_blockade] a [concept_state]. It is based on factors such as coastal [concept_building] output and local [concept_trade] volumes."

 concept_blockade: "Blockade"
 concept_blockade_level: "Blockade Level"
 concept_blockades: "Blockades"
 concept_blockaded: "Blockaded"
 concept_blockade_desc: "$concept_blockades$ are a set up in a [concept_sea_node] via an [concept_admiral] [concept_order]. They damage [Concept('concept_supply_network','$concept_supply_networks$')] and reduce access to the [concept_world_market] in ports adjacent to the $concept_sea_node$. The $concept_blockade_level$ is determined by the respective attribute on ship [Concept('concept_unit','$concept_unit$')]. $ship_group_capital_ships$ are best suited for $concept_blockades$."

 concept_naval_hostilities: "Naval Hostilities"
 concept_naval_hostilities_desc: "$concept_naval_hostilities$ is a state of hostility between two [Concept('concept_country','$concept_countries$')] that permits hostile naval actions without a formal [concept_war]. Fleets may engage in [Concept('concept_battle','$concept_battles$')] and enforce [Concept('concept_blockade','$concept_blockades$')] against countries with which they have $concept_naval_hostilities$."

 concept_organization: "Organization"
 concept_organization_organized: "Organized"
 concept_organization_desc: "A [concept_military_formation] with low $concept_organization$ will be less effective in [concept_battle] in a variety of ways. $concept_organization$ starts out low when a $concept_military_formation$ is first created, but will increase over time while the $concept_military_formation$ is not traveling. $concept_organization$ is limited if you have too low [concept_command_limit] for all your [Concept('concept_unit','$concept_units$')] or if your $concept_military_formation$ has more [Concept('concept_special_unit','$concept_special_units$')] than [Concept('concept_default_unit','$concept_default_units$')].\n\n$concept_organization$ can also be impacted temporarily when switching [Concept('concept_mobilization_option','$concept_mobilization_options$')] on or off, and when transferring [Concept('concept_unit','$concept_units$')] between [Concept('concept_mobilize_army','$concept_mobilize_army_mobilized$')] $concept_armies$ with different sets of $concept_mobilization_options$.\n\n#indent_newline:3 A $concept_military_formation$ with low $concept_organization$ will suffer increasing penalties the lower the value is.\n\n#indent_newline:3 For an [concept_army], these penalties go up to the following effects:\n[GetStaticModifier('low_organization_army').GetDesc]#!\n\n#indent_newline:3 For a [concept_fleet], the penalties are at most the following:\n[GetStaticModifier('low_organization_fleet').GetDesc]#!"

 concept_unit_experience: "Experience"
 concept_experience: "Experience"
 concept_unit_experience_desc: "$concept_experience$ determines the [concept_veterancy_level] of [Concept('concept_unit','$concept_units$')] and of the Crew in [Concept('concept_ship','$concept_ships$')]. Once they have enough $concept_experience$, they are promoted to a higher $concept_veterancy_level_short$.\n\n For $concept_units$, $concept_experience$ is gained over time, more when mobilized and during battles.\n\nFor $concept_ships$, not being on a [concept_naval_mission] will cause its Crew to lose $concept_experience$ over time."

 concept_veterancy_level: "Veterancy Rank"
 concept_veterancy_levels: "Veterancy Ranks"
 concept_veterancy_level_short: "Rank"
 concept_veterancy_levels_short: "Ranks"
 concept_veterancy_level_desc: "[Concept('concept_unit','$concept_units$')] and the Crew in [Concept('concept_ship','$concept_ships$')] gain $concept_veterancy_levels$ by earning [concept_unit_experience]. Higher $concept_veterancy_levels_short$ grant increasing bonuses to the offensive and defensive capabilities of the $concept_unit$ or $concept_ship$ in question."

 concept_battalion:0 "Battalion"
 concept_battalions:1 "Battalions"
 concept_battalion_desc:3 "An army [concept_unit] in a [Concept('concept_country','$concept_country_possessive$')] military. They are created and maintained by [SelectLocalization(GetPlayer.IsValid,'concept_battalion_desc_added','Barracks')] and are commanded by [Concept('concept_general','$concept_generals$')]."
 concept_battalion_desc_added:0 "[GetBuildingType('building_barrack').GetName]"

 concept_in_government:0 "In Government"
 concept_in_government_desc:2 "[Concept('concept_interest_group','$concept_interest_groups$')] included in the [concept_government] affect which [Concept('concept_law','$concept_laws$')] can be [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')] and set the [concept_country] [concept_legitimacy]. They will never support [Concept('concept_political_movement','$concept_political_movements$')] unless their [concept_approval] drops low enough that they leave to join the [Concept('concept_in_opposition','$concept_in_opposition_short$')]."

 concept_change_rate_scaling: "Change Rate Scaling"
 concept_change_rate_scaling_desc: "As [concept_liberty_desire] nears either 0 or 100, its progress is slowed by $concept_change_rate_scaling$, reflecting a natural hesitance in the [Concept('concept_pop', '$concept_population$')] to depart from the status quo and accept increased or decreased [concept_autonomy]."

 concept_in_opposition:0 "In Opposition"
 concept_in_opposition_short:1 "Opposition"
 concept_in_opposition_desc:2 "[Concept('concept_interest_group','$concept_interest_groups$')] not part of the [concept_government] are considered $concept_in_opposition$. Their only way to affect [concept_enactment_of_laws] is through [Concept('concept_political_movement','$concept_political_movements$')], but their [Concept('concept_interest_group_trait','$concept_interest_group_traits$')] apply in full as usual."

 concept_legitimacy:1 "Legitimacy"
 concept_legitimate:0 "Legitimate"
 concept_legitimacy_desc:1 "A [Concept('concept_government','$concept_government_possessive$')] $concept_legitimacy$ measures how well the composition of the [Concept('concept_interest_group','$concept_interest_groups$')] [concept_in_government] fits with the [Concept('concept_country','$concept_country_possessive$')] [Concept('concept_law', '$concept_laws$')]. The lower the $concept_legitimacy$, the longer the time between attempts to [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] new $concept_laws$. $legitimacy_coup_loc$ Raising or lowering [concept_taxes] also has an impact on $concept_legitimacy$."
 legitimacy_coup_loc: "A $concept_government$ with high $concept_legitimacy$ is more [Concept('concept_coup_resistance','$concept_coup_resistant$')] to [Concept('concept_coup','$concept_coups$')]."

 concept_acceptance: "Acceptance"
 concept_accepted: "Accepted"
 concept_acceptance_desc: "A [Concept('concept_pop', '$concept_pop_possessive$')] $concept_acceptance$ is a value from [GetDefine('NPops', 'MIN_ACCEPTANCE_VALUE')|v] to [GetDefine('NPops', 'MAX_ACCEPTANCE_VALUE')|v], which determines which [concept_acceptance_status] the $concept_pop$ has.\n\n$concept_acceptance$ is primarily determined by the $concept_pop_possessive$ [concept_culture] and [concept_religion], and the corresponding $CITIZENSHIP_GC_LINK$ and $CHURCH_AND_STATE_GC_LINK$ [Concept('concept_law_group', '$concept_law_groups$')] in the [concept_country] the $concept_pop$ lives in.\n\n$concept_acceptance$ changes are not always instant; $concept_pops$ of a certain [concept_cultural_community] may have a different $concept_acceptance$, due to recent [concept_law] changes or [Concept('concept_migration', '$concept_immigration$')]."

 concept_acceptance_status: "Acceptance Status"
 concept_acceptance_statuses: "Acceptance Statuses"
 concept_acceptance_status_short: "Status"
 concept_accepted_status_short: "Accepted"
 concept_acceptance_status_desc: "A [Concept('concept_pop', '$concept_pop_possessive$')] $concept_acceptance_status$ determines how accepted or discriminated it is in a [concept_country].\n\nThe $concept_acceptance_status_short$ a $concept_pop$ gets is determined by its [concept_acceptance] value.\n\nThe exact effects of a certain $concept_acceptance_status$ are determined by the [Concept('concept_country','$concept_country_possessive$')] [Concept('concept_law', '$concept_laws$')].\n\nPossible $concept_acceptance_statuses$ are, from lowest to highest:\n$EFFECT_LIST_BULLET$$VIOLENT_HOSTILITY_GC_LINK$\n$EFFECT_LIST_BULLET$$CULTURAL_ERASURE_GC_LINK$\n$EFFECT_LIST_BULLET$$OPEN_PREJUDICE_GC_LINK$\n$EFFECT_LIST_BULLET$$SECOND_RATE_CITIZEN_GC_LINK$\n$EFFECT_LIST_BULLET$$FULL_ACCEPTANCE_GC_LINK$"

 concept_national_awakening: "National Awakening"
 concept_national_awakening_desc: "A [concept_culture] which reaches [GetDefine('NPops','CULTURAL_FERVOR_NATIONAL_AWAKENING_THRESHOLD')|0v] [concept_fervor] has a chance to start a $concept_national_awakening$. $concept_cultures$ with an active $concept_national_awakening$ will gain additional $concept_fervor$ whilst it is active, and [Concept('concept_political_movement','$concept_political_movements$')] with this $concept_culture$ will have greater [concept_pop] Attraction."

 concept_ideological_incoherence: "Ideological Incompatibility"
 concept_ideological_incoherence_desc: "A [Concept('concept_government','$concept_government_possessive$')] [concept_legitimacy] is reduced if the [Concept('concept_interest_group','$concept_interest_groups$')] [concept_in_government] have [Concept('concept_ideology','$concept_ideologies$')] that do not match the current [Concept('concept_law', '$concept_laws$')] of the [concept_country]."

 concept_market_capital:0 "Market Capital"
 concept_market_capitals:0 "Market Capitals"
 concept_market_capital_short: "Capital"
 concept_market_capital_desc:2 "The [concept_state] that serves as the nexus of a [concept_market], to which all other $concept_states$ in the $concept_market$ must connect lest they become [Concept('concept_isolated_state','$concept_isolated_state_short$')]. [concept_trade] with the [concept_world_market] is often, but not always, managed from the $concept_market_capital$. The $concept_market_capital$ is often the same $concept_state$ as the [Concept('concept_market_owner','$concept_market_owner_possessive$')] [concept_capital_state], but it is possible to keep these separate.[AddLocalizationIf(GetPlayer.IsValid,'concept_market_capital_desc_added')] "
 concept_market_capital_desc_added:0 "\nThe following effects apply:\n[GetStaticModifier('market_capital_state').GetDesc]"

 concept_ownership_share: "Pop Ownership Share"
 concept_ownership_shares: "Pop Ownership Shares"
 concept_ownership_share_desc: "Determines how the [Concept('concept_building_balance','$concept_building_balance_profit$')] of [Concept('concept_building_level','$concept_building_levels$')] that are [concept_privately_owned] by its [concept_workforce] is distributed.\n\nThe [concept_dividends] are given to each [Concept('concept_pop','$concept_pops$')] as [concept_pop_income], depending on the size of their share compared to the rest of the $concept_workforce$.\n\nThe $concept_pop$ is also considered to own that proportion of the [concept_building]'s current [concept_cash_reserves].\n\nThis is the main source of income for $ARISTOCRATS_GC_LINK$ and $CAPITALISTS_GC_LINK$, as they are considered part of the $concept_workforce$ of $MANOR_HOUSES_GC_LINK$ and $FINANCIAL_DISTRICTS_GC_LINK$, respectively."

 concept_market_share:0 "Market Share"
 concept_market_shares: "Market Shares"
 concept_market_share_desc:3 "The $concept_market_share$ of each [concept_country] in a [concept_market] is determined by its [concept_gdp], with a bonus if they are the [concept_market_owner]. The higher a $concept_country$'s $concept_market_share$ the more [Concept('concept_consumption_tax', '$concept_consumption_taxes$')] they collect in the [concept_market]."

 concept_default:0 "Default"
 concept_default_desc:4 "Once the [concept_treasury] accumulates [concept_loans] large enough that they exceed the [Concept('concept_country','$concept_country_possessive$')] total [concept_credit], the $concept_country$ is considered to be in $concept_default$. This will pause all ongoing [concept_construction] and will have a negative impact on the [concept_throughput] of [Concept('concept_building', '$concept_buildings$')], growing more severe as time passes. Penalties are removed as soon as the $concept_country$'s weekly balance becomes positive again, or if [concept_bankruptcy] is declared."

 concept_decision:0 "Decision"
 concept_decisions:0 "Decisions"
 concept_decision_desc: "Large projects that can be undertaken by a nation will appear as #v $concept_decisions$#!, including expeditions across the globe and the construction of man-made canals. \n\n$concept_decisions$ can be found underneath [Concept('concept_journal_entry','$concept_journal_entries$')] in the #v Journal#!."

 concept_bankruptcy:0 "Bankruptcy"
 concept_bankruptcy_desc:2 "If a [concept_country] is in [concept_default] and unable to pay back its [concept_loans], it may opt to declare $concept_bankruptcy$. This will clear the debt but wipe out all [concept_cash_reserves] the $concept_country$ had borrowed from, and will greatly anger any [Concept('concept_pop','$concept_pops$')] who [Concept('concept_privately_owned','$concept_privately_owns$')] [Concept('concept_building','$concept_buildings$')].[AddLocalizationIf(GetPlayer.IsValid,'concept_bankruptcy_desc_added')] "
 concept_bankruptcy_desc_added:0 "\n\nIn addition, the following effects are applied for #v [GetDefine('NEconomy','DECLARE_BANKRUPTCY_PENALTY_DURATION_YEARS')|0] years#!:\n[GetStaticModifier('declared_bankruptcy').GetDesc]"

 concept_market_owner:1 "Market Owner"
 concept_market_owners: "Market Owners"
 concept_market_owner_possessive:2 "Market Owner’s"
 concept_market_owner_desc:4 "The [concept_country] that owns the market, either because it is the only participant or the [concept_senior_partner] in a [concept_customs_union]. Only the $concept_market_owner$ may sign [Concept('concept_trade_privilege','$concept_trade_privileges$')] and issue [Concept('concept_embargo','$concept_embargoes$')]."

 concept_embargo:0 "Embargo"
 concept_embargoed:1 "Embargoed"
 concept_embargoes:0 "Embargoes"
 concept_embargoing:1 "Embargoing"
 concept_embargo_desc:6 "An [concept_ongoing_diplomatic_action] established by one [concept_country] targeting another, which reduces the [concept_trade_advantage] of the target $concept_country$ for exporting [Concept('concept_good','$concept_goods$')] to the country enforcing the embargo via the [concept_world_market]. $concept_countries$ that are at [concept_war] will automatically Embargo each other."

 concept_encourage_consumption:1 "Encourage Consumption"
 concept_encouraging_consumption:1 "Encouraging Consumption"
 concept_encourage_consumption_desc:3 "$concept_encouraging_consumption$ of a [concept_good] will increase the tendency for [Concept('concept_pop','$concept_pops$')] to buy it as part of their [concept_pop_needs], and will favor it over its [Concept('concept_goods_substitution','$concept_goods_substitutes_short$')]. $concept_encouraging_consumption$ costs [concept_authority]."

 concept_discourage_consumption:1 "Discourage Consumption"
 concept_discouraging_consumption:1 "Discouraging Consumption"
 concept_discourage_consumption_desc:2 "$concept_discourage_consumption$ of a [concept_good] will decrease the tendency for [Concept('concept_pop','$concept_pops$')] to buy it as part of their [concept_pop_needs], and will favor [Concept('concept_goods_substitution','$concept_goods_substitutes_short$')] instead. $concept_discouraging_consumption$ costs [concept_authority]."

 concept_consumption_tax:0 "Consumption Tax"
 concept_consumption_taxes:1 "Consumption Taxes"
 concept_consumption_tax_desc:3 "A [Concept('concept_taxes','$concept_tax$')] collected on specific [Concept('concept_good','$concept_goods$')] purchased by [Concept('concept_pop','$concept_pop$')] to meet their [concept_pop_needs]. Each $concept_good$ subject to $concept_consumption_taxes$ costs a certain amount of [concept_authority]. When applied to a $concept_good$, its [concept_market_price] increases by the $concept_consumption_tax$ rate at point of sale to $concept_pops$ only, with all [concept_buy_orders] generated in this manner resulting in the surcharge being collected by the [concept_treasury]. Since the surcharge is applied on the [concept_market] level, the $concept_tax$ is ineffective in [Concept('concept_state','$concept_states$')] with low [concept_market_access]."

 concept_loyalist:0 "Loyalist"
 concept_loyal:0 "Loyal"
 concept_loyalists:1 "Loyalists"
 concept_loyalism: "Loyalism"
 concept_loyalist_desc:3 "$concept_loyalist$ [Concept('concept_individual','$concept_individuals$')] within a [concept_pop] are pleased with the state of their [concept_country] and are willing to defend it from dissident elements, both verbally and with violence if necessary. The [concept_approval] of [Concept('concept_interest_group','$concept_interest_groups$')] supported by $concept_loyalist$ $concept_pops$ is improved.\n\n$concept_loyalists$ are created whenever a $concept_pop$'s [concept_sol] increases and due to decisions made during special events.\n\nThe opposite of a $concept_loyalist$ is a [concept_radical]. Whenever a $concept_radical$ would be created in a $concept_pop$ that already has $concept_loyalists$, one $concept_loyalist$ becomes [concept_neutral] instead."

 concept_radical:0 "Radical"
 concept_radicals:1 "Radicals"
 concept_radicalism:0 "Radicalism"
 concept_radicalize:0 "Radicalize"
 concept_radicalized:0 "Radicalized"
 concept_radicalization: "Radicalization"
 concept_radical_desc: "$concept_radical$ [Concept('concept_individual','$concept_individuals$')] within a [concept_pop] are disillusioned with the state of their [concept_country]. The presence of $concept_radicals$ in a [concept_state] contributes to [concept_turmoil], and the $concept_radicalism$ of $concept_pops$ contributes to [concept_activism]. The [concept_approval] of [Concept('concept_interest_group','$concept_interest_groups$')] supported by $concept_radical$ $concept_pops$ will also be impacted.\n\n$concept_radicals$ are created when a $concept_pop_possessive$ [concept_sol] falls below their [concept_expected_sol], whenever a $concept_pop_possessive$ [concept_sol] decreases, and due to decisions made during special events. $concept_pops$ suffering from a low [concept_acceptance_status] increase these negative effects further. $concept_radicals$ are also created in $concept_pops$ that support $concept_political_movements$ whose demands go unfulfilled, and when $concept_pops$ are fired from a [Concept('concept_building','$concept_building_possessive$')] [concept_workforce] (particularly if they had a large [concept_ownership_share]).\n\nThe opposite of a $concept_radical$ is a [concept_loyalist]. Whenever a $concept_loyalist$ would be created in a $concept_pop$ that already has $concept_radicals$, one $concept_radical$ becomes [concept_neutral] instead."

 concept_neutral: "Neutral"
 concept_neutrals: "Neutrals"
 concept_neutral_desc: "$concept_neutral$ [Concept('concept_individual','$concept_individuals$')] within a [concept_pop] are neither [concept_radical] or [Concept('concept_loyalist','$concept_loyal$')] towards their [concept_country]. However, they are only one negative or positive step away from becoming $concept_radical$ or $concept_loyal$.\n\nWhenever a $concept_radical$ would be created in a $concept_pop$ that already has $concept_loyalists$, one $concept_loyalist$ becomes $concept_neutral$ instead. All $concept_individuals$ in a $concept_pop$ needs to be either $concept_neutral$ or already $concept_radical$ for a $concept_radical$ to be created. Vice versa when a $concept_loyalist$ would be created."

 concept_rivalry:0 "Rivalry"
 concept_rivals:1 "Rivals"
 concept_rival:1 "Rival"
 concept_rivalries:1 "Rivalries"
 concept_rivaling: "Rivaling"
 concept_rivalry_desc:3 "A [concept_diplomatic_pact] established by one [concept_country] targeting another of similar [concept_rank], and which generates @inf! [concept_influence] for the [concept_country] declaring the rivalry. The two $concept_countries$ must have overlapping [Concept('concept_interest','$concept_interests$')] to be valid rivals. The $concept_diplomatic_pact_short$ will also limit the range of [concept_relations] that can be established between the two $concept_countries$ for as long as the $concept_diplomatic_pact_short$ is active."

 concept_colonial_growth:0 "Colonial Growth"
 concept_colonial_growth_desc:2 "A measure of how rapidly a [concept_country] can push the [Concept('concept_colony','$concept_colonial$')] frontier forward. $concept_colonial_growth$ is generated by the [SelectLocalization(GetPlayer.IsValid,'concept_colonial_growth_ingame_added_2','Institution Colonial Affairs')] [concept_institution] in combination with the total [Concept('concept_pop','$concept_population$')] across [Concept('concept_incorporated_state','$concept_incorporated_states$')]. The total amount of $concept_colonial_growth$ generated is split up across all $concept_colonies$ a $concept_country$ is actively growing, up to a maximum.[AddLocalizationIf(GetPlayer.IsValid,'concept_colonial_growth_ingame_added')]"
 concept_colonial_growth_ingame_added:0 "\n\n[GetPlayer.GetColonialGrowthDetails]"
 concept_colonial_growth_ingame_added_2:0 "[GetInstitutionType('institution_colonial_affairs').GetName]"

 concept_colony:0 "Colony"
 concept_colonies:1 "Colonies"
 concept_colonize:0 "Colonize"
 concept_colonial:0 "Colonial"
 concept_colonized:0 "Colonized"
 concept_colonizes:1 "Colonizes"
 concept_colonizing:0 "Colonizing"
 concept_colonization:0 "Colonization"
 concept_colony_desc:2 "Settlement efforts initiated by a colonizing [concept_country] in the lands of a [concept_decentralized_nation]. A would-be colonizer must have the [SelectLocalization(GetPlayer.IsValid,'concept_colony_desc_added','Institution Colonial Affairs')] [concept_institution] and an [concept_interest] in the [concept_strategic_region]. At first, a single [concept_province] will be taken. Adjacent $concept_provinces$ will be $concept_colonized$ at a rate depending on the $concept_country$'s [concept_colonial_growth], generating [concept_tension] as they do."
 concept_colony_desc_added:0 "[GetInstitutionType('institution_colonial_affairs').GetName]"

 concept_escalation:0 "Escalation"
 concept_escalate:0 "Escalate"
 concept_escalating:0 "Escalating"
 concept_escalates:0 "Escalates"
 concept_escalation_desc:2 "Once a [concept_diplomatic_play] has been initiated, it steadily $concept_escalates$ through three distinct phases: [concept_opening_moves], [concept_diplomatic_maneuvers], and [concept_countdown_to_war]. The phase limits which actions are available to participants. If the $concept_diplomatic_play_short$ does not resolve prior to $concept_escalation$ progressing all the way through the $concept_countdown_to_war$, [concept_war] will break out."

 concept_revenue:0 "Revenue"
 concept_revenue_desc:0 "After a [concept_building] has [Concept('concept_good_production','$concept_good_produced$')] [Concept('concept_good','$concept_goods$')], they are sold at the [concept_local_price]. The amount of [concept_money] made in the sale is the $concept_building$'s $concept_revenue$, the positive factor of its [concept_building_balance]."

 concept_combat_width:0 "Combat Width"
 concept_combat_width_desc:1 "The $concept_combat_width$ of a particular [concept_terrain] type influences the potential numeric advantage the larger side can have over the smaller side in [concept_battle]. A smaller force can hold out for longer against a larger force if $concept_combat_width$ is relatively low, and vice versa."

 concept_infamy:0 "Infamy"
 concept_infamy_desc:1 "$concept_infamy$ reflects the degree by which the international community, particularly the reigning [Concept('concept_great_power','$concept_great_powers$')], see you as a threat to be contained in light of your past actions. It is accrued primarily from causing [Concept('concept_diplomatic_incident','$concept_diplomatic_incidents$')] and claiming [Concept('concept_war_goal','$concept_war_goals$')] in a [concept_peace_deal]. Your $concept_infamy$ affects $concept_countries$' [concept_attitude] towards you and increases the [concept_influence] cost of [Concept('concept_diplomatic_pact','$concept_diplomatic_pacts$')]. If it reaches the level of #b $infamy_pariah$#!, $concept_great_powers$ will be able to start the [GetDiplomaticPlayType('dp_contain_threat').GetName] [concept_diplomatic_play] against you."

 concept_diplomatic_incident:0 "Diplomatic Incident"
 concept_diplomatic_incident_short:0 "Incident"
 concept_diplomatic_incidents:0 "Diplomatic Incidents"
 concept_diplomatic_incident_desc:1 "A $concept_diplomatic_incident$ is typically the result of a [concept_country] starting a [concept_diplomatic_play]. $concept_diplomatic_incidents$ generate [concept_infamy] for the $concept_country$ who started it, and will cause [concept_relations] to fall with all $concept_countries$ with an [concept_interest] in the [concept_strategic_region], particularly the target of the $concept_diplomatic_play_short$. $concept_diplomatic_incidents$ can also be the result of other actions, for example decisions made during special events."

 concept_tension:0 "Tension"
 concept_tensions:1 "Tensions"
 concept_tension_desc:3 "How strained the relationship is between a [Concept('concept_colony', '$concept_colonizing$')] [concept_country] and nearby [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')]. $concept_tensions$ rise with all nearby $concept_decentralized_nations$ whenever a [concept_province] is taken over, and decreases over time as long as no new land is taken.\n\nIf the tension level rises to #b $tension_volatile$#!, continued colonization may trigger a [concept_native_uprising]."

 concept_relations: "Relations"
 concept_relations_desc: "A mutual rating of the diplomatic stance between two [Concept('concept_country', '$concept_countries$')], ranging from [GetDefine('NDiplomacy','MIN_RELATIONS')|+=] to [GetDefine('NDiplomacy','MAX_RELATIONS')|+=].\n\nBoth sides can influence $concept_relations$ by spending [concept_influence] on the [GetDiplomaticActionType('increase_relations').GetName], [GetDiplomaticActionType('damage_relations').GetName], and [GetDiplomaticActionType('expel_diplomats').GetName] [Concept('concept_diplomatic_action','$concept_diplomatic_actions$')]\n\n$concept_relations$ impact which $concept_diplomatic_actions$ and [Concept('concept_diplomatic_pact','$concept_diplomatic_pacts_short$')] are valid for the two $concept_countries$, and also impact the likelihood they will accept diplomatic overtures or take your side in a [concept_diplomatic_play]"

 concept_ai_strategy:0 "Strategy"
 concept_ai_strategies:0 "Strategies"
 concept_ai_strategy_desc:1 "AI-controlled [Concept('concept_country','$concept_countries$')] have a set of three $concept_ai_strategies$ in areas corresponding with the [Concept('concept_capacity','$concept_capacities$')] which govern their long- and short-term goals, and how they will proceed when making decisions in regards to other $concept_countries$. Which $concept_ai_strategies$ are selected is influenced by a number of factors such as the $concept_country$'s size and [concept_rank], as well as its current [concept_government]."

 concept_strategic_desire:0 "Strategic Desire"
 concept_strategic_desire_desc:2 "AI-controlled [Concept('concept_country', '$concept_countries$')] will have a $concept_strategic_desire$ towards $concept_countries$ they deem geopolitically relevant. Their $concept_strategic_desire$ represents their overarching diplomatic ambitions towards a $concept_country$ and is the most important factor in determining their [concept_attitude]."

 concept_attitude:0 "Attitude"
 concept_attitude_desc:2 "An indication of how another [concept_country] feels about you.\n\n$concept_attitude$ affects what sorts of actions a $concept_country$ is likely to take towards you, and what role you play in their plans.\n\n$concept_attitude$ may change whenever a [concept_diplomatic_catalyst] occurs, and is based on:\n$EFFECT_LIST_BULLET$[concept_relations]\n$EFFECT_LIST_BULLET$[concept_infamy]\n$EFFECT_LIST_BULLET$[concept_strategic_desire]\n$EFFECT_LIST_BULLET$Size of your military\n$EFFECT_LIST_BULLET$Which $concept_countries$ you have [Concept('concept_diplomatic_pact','$concept_diplomatic_pacts$')] with"

 concept_instant_diplomatic_action:0 "Instant Diplomatic Action"
 concept_instant_diplomatic_actions:0 "Instant Diplomatic Actions"
 concept_instant_diplomatic_action_desc:2 "An action with an instant effect on the [Concept('concept_country','$concept_countries$')] involved. They typically require a certain condition to be true in order to be taken but do not cost any [concept_influence]."

 concept_ongoing_diplomatic_action:0 "Ongoing Diplomatic Action"
 concept_ongoing_diplomatic_actions:0 "Ongoing Diplomatic Actions"
 concept_ongoing_diplomatic_action_desc:2 "A type of [concept_diplomatic_pact] that can be both initiated and ended at will, with no approval required nor costs incurred by the target [concept_country]."

 concept_diplomatic_pact:0 "Diplomatic Pact"
 concept_diplomatic_pacts:0 "Diplomatic Pacts"
 concept_diplomatic_pact_short:0 "Pact"
 concept_diplomatic_pacts_short:0 "Pacts"
 concept_diplomatic_pact_desc:3 "Unilateral or bilateral understandings between two [Concept('concept_country', '$concept_countries$')]. They may have a maintenance cost in [concept_influence] for one or both parties, and can have a wide range of effects including [concept_subject] relationships. $concept_diplomatic_pacts_short$ can break for a number of different reasons, including [concept_relations] deviating too far in either direction, one side or another explicitly breaking it, or a time limit running out."

 concept_truce: "Truce"
 concept_truces: "Truces"
 concept_truce_desc: "A $concept_truce$ is a diplomatic status where one [concept_country] is prevented from making a [concept_diplomatic_demand] or joining in an offensive [concept_diplomatic_play] against another $concept_country$. $concept_truces$ may be unilateral or bilateral, and are created in a variety of ways, such as when a [concept_peace_deal] is signed or an [concept_alliance] is broken."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED MAY 1, 2022

 concept_war_reparations:0 "War Reparations"
 concept_war_reparations_desc: "A secondary [concept_war_goal] that can be added onto a [concept_diplomatic_play] by choosing a specific [concept_article] to accompany it and claimed as part of a [concept_peace_deal]. If enforced, a new [concept_treaty] will be created containing all [Concept('concept_article','$concept_articles$')] that were selected as war reparations by the other [concept_country] with a minimum binding period that lasts for the duration of the [concept_truce]."

 concept_colonization_rights:0 "Colonization Rights"
 concept_colonization_rights_desc: "A [concept_diplomatic_pact] that is created when a [concept_decentralized_nation] is defeated in a [concept_native_uprising]. It increases the speed at which the country granted $concept_colonization_rights$ colonizes their territory, and lasts for the duration of the truce."


 concept_foreign_investment: "Foreign Investment"
 concept_foreign_investments: "Foreign Investments"
 concept_foreign_investment_desc: "A [concept_country] constructing and owning [Concept('concept_building_level','$concept_building_levels$')] in another $concept_country$.\n\n$concept_foreign_investments$ can be made by an [concept_overlord] in its [Concept('concept_subject','$concept_subjects$')], or between two sovereign $concept_countries$ by signing a [concept_foreign_investment_rights] [concept_treaty].\n\nBoth [concept_government_construction] and [concept_private_construction] are allowed via $concept_foreign_investment$.\n\nWhile the foreign owner constructs the $concept_building_levels$ and gains [concept_dividends], the [concept_workforce] comes from the local [concept_state], and [concept_taxes] are paid to the $concept_country$ controlling that $concept_state$. Any [Concept('concept_good','$concept_goods$')] used by the [concept_building] remains in the local [concept_market]."

 concept_foreign_investment_rights: "Foreign Investment Rights"
 concept_foreign_investment_rights_short: "Investment Rights"
 concept_foreign_investment_rights_desc: "Permits one [concept_country] to do [concept_foreign_investment] in another for the duration of the [concept_treaty]. Additionally the $concept_treaty$ allows [Concept('concept_company','$concept_companies$')] to construct a [concept_regional_company_hq] if they are given the $investment_charter$ [concept_company_charter]."

 concept_exiled_army: "Exiled Army"
 concept_exiled_armies: "Exiled Armies"
 concept_exiled_army_short: "Exiled"
 concept_exiled_army_exile: "Exile"
 concept_exiled_army_desc: "[Concept('concept_army','$concept_armies$')] can become $concept_exiled_army_short$ when their [concept_front] cannot be reached any longer and they cannot find a valid alternative. This can happen for example when they are fully surrounded. An $concept_exiled_army$ will move to the nearest [concept_hq] before it can be sent to another $concept_front$ or be given other [Concept('concept_order','$concept_orders$')] again. While doing so, the $concept_army$ will suffer from [concept_attrition]."

 concept_military_access: "Military Access"
 concept_military_access_desc: "$concept_military_access$ can be used to attack an enemy through the lands of other neutral [Concept('concept_country','$concept_countries$')]. It is secured by establishing an [concept_ongoing_diplomatic_action] with the neutral $concept_country$."

 concept_military_assistance: "Military Assistance"
 concept_military_assistance_desc: "An [concept_ongoing_diplomatic_action] established by one [concept_country] targeting another, where the first $concept_country$ improves the fighting ability of the second's [Concept('concept_military_formation','$concept_military_formations$')]"

 concept_social_hierarchy: "Social Hierarchy"
 concept_social_hierarchies: "Social Hierarchies"
 concept_social_hierarchy_possessive: "Social Hierarchy's"
 concept_social_hierarchy_short: "Hierarchy"
 concept_social_hierarchy_desc: "A $concept_social_hierarchy$ is comprised of two or more [Concept('concept_social_class','$concept_social_classes$')]. All [Concept('concept_pop','$concept_pops$')] belong to a $concept_social_hierarchy$.\n\nAny [Concept('concept_pop','$concept_pops$')] not targeted by a country-specific $concept_social_hierarchy$ are organized into the $default_social_hierarchy$'s $lower_class$, $middle_class$, and $upper_class$ based on [concept_profession] and which correspond to the [concept_lower_strata], [concept_middle_strata], and [concept_upper_strata] respectively.\n\n$concept_social_classes$ for country-specific $concept_social_hierarchies$ may be determined by factors such as [concept_profession], [concept_culture], and [concept_religion]."

 concept_social_class: "Social Class"
 concept_social_classes: "Social Classes"
 concept_social_class_short: "Class"
 concept_social_class_possessive: "Social Class's"
 concept_social_class_desc: "Each [concept_pop] belongs to a $concept_social_class$, and each $concept_social_class$ belongs to the [concept_lower_strata], [concept_middle_strata], or [concept_upper_strata]. A [Concept('concept_pop','$concept_pop_possessive$')] $concept_social_class$ is determined by the [Concept('concept_country','$concept_country_possessive$')] [concept_social_hierarchy]."

 concept_open_market:0 "Market Opening"
 concept_open_market_short:0 "Open"
 concept_open_market_desc:3 "A [concept_war_goal] that can be claimed in a [concept_diplomatic_play] or as part of a [concept_peace_deal]. A [concept_country] forced to $concept_open_market_short$ its [concept_market] immediately changes its [SelectLocalization(GetPlayer.IsValid,'concept_open_market_desc_added','Trade Policy')] to [SelectLocalization(GetPlayer.IsValid,'concept_open_market_desc_added_2','Free Trade')] and may not change it again for #v [GetDefine('NDiplomacy','WAR_GOAL_OPEN_MARKET_MONTHS')|0] months#!. [ConcatIfNeitherEmpty('\n\n', AddLocalizationIf(GetPlayer.IsValid,'concept_open_market_desc_added_3'))]"
 concept_open_market_desc_added:0 "[GetLawGroup('lawgroup_trade_policy').GetName]"
 concept_open_market_desc_added_2:0 "[GetLawType('law_free_trade').GetName]"
 concept_open_market_desc_added_3: "#title Additional effects during these [GetDefine('NDiplomacy','WAR_GOAL_OPEN_MARKET_MONTHS')|0] months#!:#!#indent_newline:3\n[GetStaticModifier('forced_market_opening').GetDesc]#!"

 concept_humiliation:0 "Humiliation"
 concept_humiliated:1 "Humiliated"
 concept_humiliate:1 "Humiliate"
 concept_humiliation_desc:2 "A [concept_war_goal] that can be claimed in a [concept_diplomatic_play] or as part of a [concept_peace_deal]. A $concept_humiliated$ [concept_country] is unable to launch any $concept_diplomatic_plays$ of their own against the $concept_country$ they were $concept_humiliated$ by for a duration of #v [GetDefine('NDiplomacy','WAR_GOAL_HUMILIATION_MONTHS')|0] months#!.[ConcatIfNeitherEmpty('\n\n', AddLocalizationIf(GetPlayer.IsValid, 'concept_humiliation_desc_added'))]"
 concept_humiliation_desc_added: "#title Additional effects during these #v [GetDefine('NDiplomacy','WAR_GOAL_HUMILIATION_MONTHS')|0] months#!:#!#indent_newline:3 \n[GetStaticModifier('country_humiliated').GetDesc]#!"

 concept_customs_union:0 "Customs Union"
 concept_customs_union_desc:1 "An enforced pact between a [concept_senior_partner] and one or several [Concept('concept_junior_partner','$concept_junior_partners$')] to share a single [concept_market], under the leadership of the $concept_senior_partner$. Usually enforced via a [concept_power_bloc] [concept_power_bloc_principle]. Additionally, all [concept_subject] $concept_diplomatic_pacts_short$ also act as a $concept_customs_union$."

 concept_senior_partner:0 "Senior Partner"
 concept_senior_partner_desc:2 "A $concept_senior_partner$ in a [concept_customs_union] gains control of their [Concept('concept_junior_partner','$concept_junior_partners_possessive$')] [Concept('concept_market','$concept_markets$')]. While the $concept_junior_partners$ may continue to [concept_trade] with other $concept_markets$, only the $concept_senior_partner$ may issue [Concept('concept_embargo','$concept_embargoes$')] and control [Concept('concept_tariffs','$concept_tariff$')] levels. In exchange the $concept_senior_partner$ shares a minor portion of the $concept_market$'s $concept_tariff$ income, while both [Concept('concept_country','$concept_countries_possessive$')] [Concept('concept_building','$concept_building_industries$')] benefit from participating in a more powerful and mature $concept_market$."

 concept_junior_partner:0 "Junior Partner"
 concept_junior_partners:0 "Junior Partners"
 concept_junior_partners_possessive:0 "Junior Partners’"
 concept_junior_partner_desc:2 "A $concept_junior_partner$ in a [concept_customs_union] yields control of their [concept_market] to the [concept_senior_partner]. While the $concept_junior_partner$ may continue to [concept_trade] with other $concept_markets$, they may not issue [Concept('concept_embargo','$concept_embargoes$')] or control [Concept('concept_tariffs','$concept_tariff$')] levels. In exchange they collect a minor portion of the $concept_market$'s $concept_tariff$ income and their [Concept('concept_building','$concept_building_industries$')] benefit from participating in a more powerful and mature $concept_market$."

 concept_regime_change: "Regime Change"
 concept_regime_change_desc: "Forces the target to change their [concept_government] to one similar to the enforcer, and to immediately enact up to #v [GetDefine('NPolitics','NUM_REVOLUTIONARY_LAW_CHANGES')]#! [Concept('concept_law', '$concept_laws$')] favored by the new regime."

 concept_alliance:0 "Alliance"
 concept_alliances:1 "Alliances"
 concept_alliance_desc: "A [concept_treaty] [concept_article] between two [Concept('concept_country','$concept_countries$')]. $concept_countries$ engaged in an $concept_alliance$ may always side with each other in [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] regardless of if the other side maintains an [concept_interest] in the affected [concept_strategic_region]. This applies no matter if the other $concept_country$ is the initiator or target of the $concept_diplomatic_play_short$."

 concept_defensive_pact:0 "Defensive Pact"
 concept_defensive_pacts:0 "Defensive Pacts"
 concept_defensive_pact_desc: "A [concept_treaty] [concept_article] that is a limited [concept_alliance] between two [Concept('concept_country','$concept_countries$')], which only comes into effect in [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] where one of the two is the [concept_target] of the $concept_diplomatic_play_short$."

 concept_guarantee_independence: "Guarantee Independence"
 concept_guarantee_of_independence: "Guarantee of Independence"
 concept_guarantee_independence_desc: "A [concept_treaty] [concept_article] established by one [concept_country] targeting another, where the second $concept_country$ is able to call the first to aid it in any [concept_diplomatic_play] where they are the defender."

 concept_ally: "Ally"
 concept_allies: "Allies"
 concept_allied: "Allied"
 concept_ally_desc: "An $concept_ally$ is a [concept_country] which maintains an [concept_alliance] or [concept_defensive_pact] with another country and can be called to support them in [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]. For the [concept_initiator], only [Concept('concept_country','$concept_countries$')] with a full [concept_alliance] are considered to be $concept_allies$ in that [concept_diplomatic_play]."

 concept_supply: "Supply"
 concept_supplies: "Supplies"
 concept_supply_desc: "The $concept_supply$ of a [concept_military_formation] determines how quickly [Concept('concept_unit','$concept_units$')] regain [concept_organization].\n\n#indent_newline:3 $concept_supply$ is usually #v 100%#!, but can be lower if an $concept_army$ is:\n- Overseas and supplied by a compromised [concept_shipping_lane]\n- Contain $concept_units$ whose [concept_building] is subject to [Concept('concept_shortage','$concept_input_goods_shortages$')]\n- Will be zero if the $concept_army$ is completely cut off from its $concept_hq$#!\n\n[Concept('concept_modifier','$concept_modifiers$')] can also apply in some cases."

 concept_manpower: "Manpower"
 concept_manpower_desc: "The amount of [SelectLocalization(GetPlayer.IsValid,'concept_manpower_desc_added','Soldiers')] and [SelectLocalization(GetPlayer.IsValid,'concept_manpower_desc_added_2','Officers')] in a [concept_unit]. The greater the $concept_manpower$ the more [concept_casualties] the $concept_unit$ will be able to deal and take."
 concept_manpower_desc_added: "[GetPopType('soldiers').GetName]"
 concept_manpower_desc_added_2: "[GetPopType('officers').GetName]"

 concept_morale:0 "Morale"
 concept_morale_demoralized:0 "Demoralized"
 concept_morale_demoralized_desc:0 "$concept_morale_desc$"
 concept_morale_desc: "A [Concept('concept_unit','$concept_unit_possessive$')] $concept_morale$ measures how much of its remaining [concept_manpower] is ready for [concept_battle]. In each round of combat, some of the remaining $concept_manpower$ will become $concept_morale_demoralized$ for the remainder of the $concept_battle$ and unable to take offensive action. As all $concept_units$ reach a critical threshold of low $concept_morale$ the [concept_commander] will retreat, leaving the other side victorious.\n\nAfter a $concept_battle$, $concept_units$ will regain their $concept_morale$ at a steady rate depending on the [concept_supply] of their [concept_military_formation]."

 concept_morale_damage: "Morale Damage"
 concept_morale_damage_desc: "$unit_morale_damage_mult_desc$"

 concept_rank:0 "Rank"
 concept_ranks:0 "Ranks"
 concept_rank_desc:3 "A [Concept('concept_country','$concept_country_possessive$')] $concept_rank$ is determined by measuring its [concept_prestige] relative to other $concept_countries$ worldwide. It determines what sorts of international activities you are permitted to engage in, what your people and the world expects of you, and where you stand in the global pecking order.[ConcatIfNeitherEmpty('\n', AddLocalizationIf( GetPlayer.IsValid, 'concept_rank_ingame_added' ))]"
 concept_rank_ingame_added:1 "#title Your current $concept_rank$ of [GetPlayer.GetRank] gives you the following benefits:#!#indent_newline:3 \n[GetPlayer.GetRankModifier.GetDesc]#!"

 concept_migration:0 "Migration"
 concept_migration_internal: "Internal Migration"
 concept_weekly_migration: "Weekly Migration"
 concept_migrating:1 "Migrating"
 concept_migrate:0 "Migrate"
 concept_immigration:1 "Immigration"
 concept_immigrating:1 "Immigrating"
 concept_emigrate:0 "Emigrate"
 concept_emigration:1 "Emigration"
 concept_emigrating:1 "Emigrating"
 concept_migration_desc: "The movement of [Concept('concept_pop','$concept_pops$')] between [Concept('concept_state','$concept_states$')]. Generally, $concept_migration$ happens between [Concept('concept_state','$concept_states$')] in the same [concept_market], but it can also happen between [Concept('concept_country','$concept_countries$')] in different $concept_markets$ in the case of [Concept('concept_mass_migration','$concept_mass_migrations$')].\n\n$concept_migration$ flows from $concept_states$ with lower to higher [concept_migration_pull], with more people moving the higher the difference is. The $concept_migration$ rate is also affected by factors like the available [concept_infrastructure] in a $concept_state$.\n\nMigration can only happen if there are $concept_pops$ able and willing to $concept_emigrate$. $concept_pops$ will only consider $concept_emigrating$ if they are sufficiently [Concept('concept_job_satisfaction', '$concept_job_satisfaction_dissatisfied$')]. For instance if their [concept_sol] is lower than the average in their $concept_market$ or if they are [concept_unemployed].\n\n$concept_pops$ who arrive to a $concept_state$ with no other $concept_pops$ of the same [concept_culture], will form a [concept_cultural_community] and get a temporary penalty to their [concept_acceptance]."
 concept_mass_migration_pull: "Mass Migration Attraction"
 concept_mass_migration_pull_desc: "A [concept_country]'s $concept_mass_migration_pull$ indicates how likely it is to receive a [Concept('concept_migration_target', '$concept_mass_migration$')] compared to other $concept_countries$. It is largely based on the average [concept_migration_pull] of [Concept('concept_migration_target', '$concept_mass_migration_eligible$')] [Concept('concept_state', '$concept_states$')] in the $concept_country$.\n\nIf a $concept_country$ has fewer than #b [GetDefine('NPops','MASS_MIGRATION_NUM_TARGET_STATES_FOR_NO_PENALTY')]#! $concept_mass_migration_eligible$ $concept_states$ it will receive an increasing penalty to its $concept_mass_migration_pull$ depending on how many $concept_mass_migration_eligible$ $concept_states$ it has."

 concept_mass_migration: "Mass Migration"
 concept_mass_migrations: "Mass Migrations"
 concept_mass_migration_migrating: "Mass Migrating"
 concept_mass_migration_desc: "A $concept_mass_migration$ is the movement of [Concept('concept_pop', '$concept_pops$')] of a specific [concept_culture] in large numbers between two [Concept('concept_country', '$concept_countries$')]. A [Concept('concept_migration_target', '$concept_mass_migration_target$')] may appear if there is a [concept_trade] connection between two [Concept('concept_market', '$concept_markets$')] and the [concept_cultural_turmoil] of a specific $concept_culture$ in the origin $concept_country$ is at least [GetDefine('NPops','MASS_MIGRATION_ORIGIN_MIN_TURMOIL')|v%0]. A $concept_country$ is more likely to have one of its $concept_states$ be selected as a $concept_migration_target$ if it has a high [concept_mass_migration_pull]."

 concept_migration_target:0 "Migration Target"
 concept_mass_migration_target: "Mass Migration Target"
 concept_migration_targets:0 "Migration Targets"
 concept_mass_migration_targets: "Mass Migration Targets"
 concept_mass_migration_eligible: "Eligible"
 concept_migration_target_desc:1 "A [concept_state] selected as a suitable target for a [concept_mass_migration]. Surrounding $concept_states$ may also see some degree of $concept_immigration$ from a $concept_mass_migration$.\n\nTo be $concept_mass_migration_eligible$ for $concept_mass_migrations$ a state needs to be [Concept('concept_incorporated_state', '$concept_incorporated$')], have at least #b [GetDefine('NPops','MASS_MIGRATION_TARGET_MIN_ARABLE_LAND')]#! [concept_arable_land] and #b [GetDefine('NPops','MASS_MIGRATION_STATE_MIN_MARKET_ACCESS')|0%]#! [concept_market_access]. Additionally, the $concept_state$ cannot already be the target of a different $concept_mass_migration$ and the $concept_country$'s [GetLawGroup('lawgroup_migration').GetName] and [GetLawGroup('lawgroup_citizenship').GetName] [Concept('concept_law', '$concept_laws$')] need to allow $concept_migration$ to happen."

 concept_base_price:0 "Base Price"
 concept_base_price_desc:1 "The price of a [concept_good] when its [Concept('concept_sell_orders','$concept_sell_orders_supply$')] exactly equal its [Concept('concept_buy_orders','$concept_buy_orders_demand$')]."

 concept_market_impact:0 "Market Impact"
 concept_market_impact_short:0 "Impact"
 concept_market_impacts_short:0 "Impacts"
 concept_market_impact_desc:0 "Market Impact is how much of an effect the current balance of a [concept_good] ([concept_buy_orders] - [concept_sell_orders]) has on a [concept_market]. It is not determined solely by [concept_market_price] of a $concept_good$ (being either cheap or expensive), but also takes into consideration the volume of that $concept_good$ which circulates through the $concept_market$, affecting [Concept('concept_pop', '$concept_pops$')] and Industries."

 concept_capital_state:0 "Capital State"
 concept_capital_state_short:0 "Capital"
 concept_capital_state_desc:3 "The site of a [Concept('concept_country','$concept_country_possessive$')] central [concept_government]. Controlling the $concept_capital_state_short$ is of great importance during wartime, and [Concept('concept_pop','$concept_pops$')] who live there have a greater degree of [concept_political_strength] by which to influence politics.[ConcatIfNeitherEmpty('\n', AddLocalizationIf( GetPlayer.IsValid, 'concept_capital_state_desc_added' ))]"
 concept_capital_state_desc_added: "[GetStaticModifier('capital_state').GetDesc]"

 concept_treaty_port:0 "Treaty Port"
 concept_treaty_ports:0 "Treaty Ports"
 concept_treaty_port_desc:4 "A coastal [concept_split_state] held under a [concept_treaty] for the purpose of opening [concept_trade] with another [concept_country]. A $concept_treaty_port$ is part of the [concept_market] of the $concept_country$ that ceded the $concept_province$, and can freely [concept_trade] with the [concept_world_market].\n\n[concept_tariffs], [concept_subventions] and [Concept('concept_embargo','$concept_embargoes$')] do not affect $concept_treaty_ports$, and the owner gets [concept_trade_advantage] when importing [Concept('concept_good','$concept_goods$')] exported by the $concept_treaty_port$ (and vice versa). If the $concept_treaty$ ceding the $concept_treaty_port$, is broken, it ceases to be a $concept_treaty_port$ and becomes a regular [concept_state]."

 concept_treaty: "Treaty"
 concept_treaties: "Treaties"
 concept_treaty_desc: "A $concept_treaty$ is a type of bilateral agreement between two [Concept('concept_country', '$concept_countries$')] and is made up of individual [Concept('concept_article', '$concept_articles$')] that define the rights, duties and @inf![concept_influence] cost of each $concept_country$. $concept_treaties$ remain in effect until either side breaks the agreement or withdraws from it after the initial [concept_binding_period] has passed.\n\n$concept_treaties$ may also be [Concept('concept_enforced_treaty', '$concept_enforced_treaty_forced_short$')] upon a $concept_country$ in the form of [concept_war_reparations] as a result of a [concept_diplomatic_play]."

 concept_enforced_treaty: "Enforced Treaty"
 concept_enforced_treaties: "Enforced Treaties"
 concept_enforced_treaty_short: "Enforced"
 concept_enforced_treaty_forced_short: "Forced"
 concept_enforced_treaty_enforce: "Enforce Treaty"
 concept_enforced_treaty_enforce_short: "Enforce"
 concept_enforced_treaty_desc: "An $concept_enforced_treaty$ is a [concept_treaty] forced upon a [concept_country] from backing down in a [concept_diplomatic_play] or capitulating in a [concept_war]. Some [Concept('concept_diplomatic_demand', '$concept_diplomatic_demands$')] can also turn into an $concept_enforced_treaty$.\n\nIt is made up of [concept_war_reparations] or $concept_diplomatic_demands$ containing individual [Concept('concept_article', '$concept_articles$')] that define the rights, duties and @inf![concept_influence] cost for the capitulating $concept_country$. $concept_enforced_treaties$ remain in effect until the demanding side breaks the agreement or either side withdraws from it after the initial [concept_binding_period] has passed."

 concept_article: "Article"
 concept_articles: "Articles"
 concept_article_desc: "$concept_articles$ are the components that make up a [concept_treaty] and can take many shapes.\n\nAn $concept_article$ can apply several effects upon one or both [Concept('concept_country','$concept_countries$')] involved and will usually incur an @inf![concept_influence] cost for as long as the $concept_treaty$ is upheld, alternatively an $concept_article$ may also apply specific one-time effects or impart certain duties upon the responsible $concept_country$ that may negatively affect the $concept_treaty$ if [Concept('concept_contravention', '$concept_contravened$')] where the $concept_treaty$ may eventually become [Concept('concept_non_fulfillment', '$concept_non_fulfilled$')].\n\nEach $concept_article$ falls under one of two categories:#indent_newline:3 \n$EFFECT_LIST_BULLET$#bold Mutual#!: Mutual $concept_articles$ extend all of their effects and duties to both $concept_countries$ equally.\n$EFFECT_LIST_BULLET$#bold Directional#!: Directional $concept_articles$ have different effects and duties towards one or the other $concept_country$ depending one whether they are the offering or receiving side respectively.#!"

 concept_contravention: "Contravention"
 concept_contraventions: "Contraventions"
 concept_contravening: "Contravening"
 concept_contravene: "Contravene"
 concept_contravened: "Contravened"
 concept_contravention_desc: "[Concept('concept_article', '$concept_articles$')] in [Concept('concept_treaty', '$concept_treaties$')] that have [concept_non_fulfillment] conditions can be $concept_contravened$. For an $concept_article$ to be considered $concept_contravened$, the responsible [concept_country] must have failed to meet the requirements of that $concept_article$. Whether the responsible $concept_country$ is $concept_contravening$ to an $concept_article$ is checked weekly, monthly, yearly, or any combination thereof, depending on the $concept_article$.\n\nFor example, in the [GetArticleType('law_commitment').GetName] $concept_article$, if the specified [concept_law] has not been [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')] or is not actively $concept_enactment_of_laws_enacting$ for #v 3#! consecutive weeks, the $concept_article$ is considered to be $concept_non_fulfilled$ until the $concept_law$ is being $concept_enactment_of_laws_enacted$ again.\n\nThe number of consecutive $concept_contraventions$ before $concept_non_fulfillment$ may differ between $concept_articles$."

 concept_binding_period: "Binding Period"
 concept_binding_period_binding: "Binding"
 concept_binding_period_bound: "Bound"
 concept_binding_period_desc: "A [concept_treaty] usually has a $concept_binding_period$ where any withdrawal from the $concept_treaty$ by either [concept_country] will result in penalties for the withdrawing [concept_country]. When the $concept_binding_period$ has passed, withdrawal does not apply penalties anymore."

 concept_non_fulfillment: "Non-Fulfillment"
 concept_non_fulfilled: "Non-Fulfilled"
 concept_non_fulfillment_desc: "Some [Concept('concept_article','$concept_articles$')] may come with specific duties attached that will adversely affect the [concept_treaty] if [Concept('concept_contravention', '$concept_contravened$')]. An $concept_article$ is considered $concept_non_fulfilled$ if consecutively $concept_contravened$ up to the maximum number of allowed $concept_contraventions$ for that $concept_article$.\n\nConsequences of $concept_non_fulfillment$ may include subjecting the $concept_contravening$ [concept_country] to #bold compensation payments#!, as well as #bold freezing#! or outright #bold breaking#! the $concept_treaty$.\n\nIf a $concept_treaty$ is #b frozen#!, the $concept_contravening$ $concept_country$ still pays and fulfills whatever they can from their $concept_articles$, but receives #b nothing#! in return."

 concept_prestige:0 "Prestige"
 concept_prestige_desc:3 "Your [concept_rank] is determined by comparing your $concept_prestige$ to all other [Concept('concept_country','$concept_countries$')] in the world. $concept_prestige$ originates primarily from how impressive your economy is as measured by your [concept_gdp], how much [concept_power_projection] your military forces generate, and your [concept_country_tier]. It can also be affected by other factors such as your [SelectLocalization(GetPlayer.IsValid,'concept_prestige_desc_gamestate','Arts Academy')] and [Concept('concept_monument','$concept_monuments$')], and if you are a world leader in the production of a certain [concept_good]."
 concept_prestige_desc_gamestate:0 "[GetBuildingType('building_art_academy').GetName]"

 concept_power_projection:0 "Power Projection"
 concept_power_projection_desc:3 "The total capability of a [Concept('concept_country','$concept_country_possessive$')] military forces, based on an average of the [concept_offense] and [concept_defense] of all their [Concept('concept_unit', '$concept_units$')]. It forms the basis for the amount of [concept_prestige] that a [concept_country] gains from its army and navy, and also affects how powerful other $concept_countries$ perceive them to be when deciding to start or take sides in a [concept_diplomatic_play]."

 concept_army_power_projection: "Army Power Projection"
 concept_army_power_projection_desc: "The [concept_power_projection] derived from a [Concept('concept_country','$concept_country_possessive$')] army."

 concept_naval_power_projection: "Naval Power Projection"
 concept_naval_power_projection_desc: "The [concept_power_projection] derived from a [Concept('concept_country','$concept_country_possessive$')] navy."

 concept_dividends:0 "Dividends"
 concept_dividends_desc:7 "While [concept_privately_owned] [Concept('concept_building','$concept_buildings$')] have a positive [concept_building_balance], some of this profit is paid out to the owning [Concept('concept_pop', '$concept_pops$')] as $concept_dividends$, which are subject to [concept_budget_dividends_taxes].\n\nDepending on the [Concept('concept_country','$concept_country_possessive$')] current $ECONOMIC_SYSTEM_GC_LINK$, a portion of [concept_pop] $concept_dividends$ may be invested back into the economy through [concept_reinvestment], while the remainder goes towards [concept_pop_needs] and [concept_wealth].\n\nIf a $concept_building$ is fully or partially [concept_nationally_owned], profits can be payed out as [concept_government_dividends] instead."

 concept_government_dividends:0 "Government Dividends"
 concept_government_dividends_desc:4 "While [concept_nationally_owned] [Concept('concept_building','$concept_buildings$')] have a positive [concept_building_balance], some of these profits are paid directly to the [concept_treasury] as $concept_government_dividends$.\n\nThe amount paid depends on the proportion of [concept_privately_owned] to $concept_nationally_owned$ [Concept('concept_building_level','$concept_building_levels$')].\n\nIn large economies with a high [concept_gdp], inefficiencies will also result in some of the profits being wasted. Additionally, [concept_loans] against [concept_cash_reserves] held by $concept_nationally_owned$ $concept_buildings$ will reduce the amount of $concept_government_dividends$ that [Concept('concept_building','$concept_buildings$')] pay out."

 concept_credit:0 "Credit"
 concept_credit_debt:0 "Debt"
 concept_credit_limit:0 "Credit Limit"
 concept_credit_desc:2 "The national $concept_credit$ is the amount of [concept_money] the [concept_treasury] can borrow from its economy, equal to the sum of all domestic [concept_cash_reserves] plus a base value determined by [concept_gdp]. If the [concept_principal] exceeds the $concept_credit_limit$ the [concept_country] goes into [concept_default]."

 concept_principal:0 "Principal"
 concept_principal_desc:2 "The total size of [concept_loans] the [concept_treasury] has accrued, not including the [concept_budget_interest] it owes. If the [concept_principal] exceeds your [concept_credit] you will go into [concept_default]."

 concept_loans:0 "Loans"
 concept_loans_desc:1 "Funds that the [concept_treasury] owes to the [Concept('concept_country','$concept_country_possessive$')] [concept_building_owners].\n\nWhenever the $concept_treasury$ is running a negative balance, it will automatically increase its $concept_loans$ unless it has sufficient [concept_gold_reserves] to cover it.\n\n[concept_budget_interest] is accrued on the [concept_principal] weekly. If the $concept_principal$ ever exceeds the $concept_country_possessive$ [concept_credit], it goes into [concept_default]."

 concept_war_support:0 "War Support"
 concept_war_support_desc:2 "A measure of how eager your [Concept('concept_country','$concept_country_possessive$')] population is to remain in a [concept_war]. Positive values indicate a desire to stay in the $concept_war$ while negative values indicate a general opposition to it. Once $concept_war_support$ reaches [GetDefine('NWar','AUTO_CAPITULATE_WAR_SUPPORT')|v0] the $concept_country$ will immediately capitulate, allowing all [Concept('concept_war_goal','$concept_war_goals$')] to be pressed on them. $concept_war_support$ can only drop below #v 0#! if the opposing side [Concept('concept_controlled_war_goal','$concept_controls_war_goal_short$')] all their $concept_war_goals$."

 concept_occupation:0 "Occupation"
 concept_occupied:0 "Occupied"
 concept_occupying:0 "Occupying"
 concept_occupy: "Occupy"
 concept_occupies: "Occupies"
 concept_occupation_desc:1 "Any [Concept('concept_province','$concept_provinces$')] the [concept_country] owns that are currently part of an enemy [concept_theater] are considered $concept_occupied$. $concept_occupation$ contributes to [concept_war_exhaustion]. $concept_occupying$ a [concept_war_goal] you hold on an enemy is usually required to bring their [concept_war_support] into the negatives."

 concept_war_exhaustion:0 "War Exhaustion"
 concept_war_exhaustion_exhausted:0 "Exhausted"
 concept_war_exhaustion_desc:1 "A [Concept('concept_pop','$concept_population$')] tends to suffer while their [concept_country] is at [concept_war]. The following factors contribute to $concept_war_exhaustion$:\n\n* how much [Concept('concept_province','$concept_province_land$')] has been [Concept('concept_occupation','$concept_occupied$')]\n* how many [Concept('concept_war_goal','$concept_war_goals$')] the enemy controls\n* how many [concept_casualties] have been taken\n* how much the $concept_country$ is suffering from [concept_turmoil]\n\n$concept_war_exhaustion$ reduces [concept_war_support] each week, bringing the $concept_country$ closer to agreeing to a [concept_peace_deal]."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED APRIL 30, 2022

 concept_theater:0 "Theater"
 concept_theaters:0 "Theaters"
 concept_theater_desc:1 "A region of adjacent [Concept('concept_province','$concept_provinces$')] under the control of a single [concept_country]. [Concept('concept_front','$concept_fronts$')] are created on the border between two $concept_theaters$ controlled by $concept_countries$ hostile to each other in a [concept_war] or [concept_diplomatic_play]."

 concept_literacy:0 "Literacy"
 concept_literate:0 "Literate"
 concept_literacy_desc:2 "The percentage or absolute number of individuals in a [concept_pop] who can read and write. Certain [Concept('concept_profession', '$concept_professions$')] demand higher $concept_literacy$ than others, limiting the [concept_pop_qualifications] for $concept_pops$ in other $concept_professions$ unless their $concept_literacy$ is high enough. You can invest in your [SelectLocalization(GetPlayer.IsValid,'concept_literacy_desc_added','Education')] in order to develop higher $concept_literacy$ in your $concept_population$ over time.\n\n$concept_pops$ will face an increasing penalty to $concept_pop_growth_birthrate$ proportional to their $concept_literacy$, up to the following:\n[GetStaticModifier('literacy_penalty').GetDesc]#!"
 concept_literacy_desc_added:0 "[GetInstitutionType('institution_schools').GetName]"

 concept_turmoil:0 "Turmoil"
 concept_turmoil_desc:2 "[Concept('concept_state', '$concept_states$')] and [Concept('concept_culture', '$concept_cultures$')] with $concept_turmoil$ contain [Concept('concept_radical', '$concept_radicals$')] that are unhappy with their current circumstances. The amount of $concept_turmoil$ is equal to the fraction of the $concept_state$'s or $concept_culture$'s [concept_workforce] that are $concept_radical$.\n\n$concept_turmoil$ can inflict a number of negative local status effects on a $concept_state$ if it gets high enough. [concept_cultural_turmoil] can impact a whole [concept_country] in very disruptive ways."

 concept_unemployed:0 "Unemployed"
 concept_unemployment:0 "Unemployment"
 concept_unemployed_desc:3 "An $concept_unemployed$ [concept_pop] does not work in any of its [Concept('concept_state','$concept_state_possessive$')] [Concept('concept_building','$concept_buildings$')] and therefore does not collect a [concept_building_wage]. They are likely to take the next best job that comes along, and will likely [Concept('concept_migration','$concept_emigrate$')] if nothing comes along.\n\n$concept_pops$ living in a state will face an increasing penalty to $concept_pop_growth_birthrate$ proportional to the unemployement rate in that state, up to the following:\n[GetStaticModifier('unemployment_birth_penalty_state').GetDesc]#!"

 concept_cultural_turmoil:0 "Cultural Turmoil"
 concept_cultural_turmoil_desc: "The [concept_turmoil] generated by [Concept('concept_pop','$concept_pops$')] of a specific [concept_culture], generally from its proportion of [Concept('concept_radical','$concept_radicals$')]. If its value in a [concept_country] is at least [GetDefine('NPops','MASS_MIGRATION_ORIGIN_MIN_TURMOIL')|v%0], it might trigger a [concept_mass_migration] of that $concept_culture$ to another $concept_country$. Alternatively, at high enough values, those $concept_pops$ may instead attempt to separate their [Concept('concept_homeland','$concept_homelands$')] in a [concept_secession]."

 concept_commander_rank:0 "Commander Rank"
 concept_commander_rank_short:0 "Rank"
 concept_commander_ranks: "Commander Ranks"
 concept_commander_rank_desc:0 "A [Concept('concept_commander','$concept_commander_possessive$')] $concept_commander_rank_short$ determines their [concept_command_limit], as well as how much [concept_clout] they confer to their [concept_interest_group]. Retiring a $concept_commander$ will cause their $concept_interest_group$'s [concept_approval] to fall by a factor depending on their $concept_commander_rank_short$."

 concept_commander:0 "Commander"
 concept_commanders:1 "Commanders"
 concept_commander_possessive:0 "Commander’s"
 concept_commander_desc:2 "A [concept_character] in command of a [Concept('concept_country','$concept_country_possessive$')] [concept_military_formation]. A $concept_commander$ can be either a [concept_general] or an [concept_admiral] depending on the type of $concept_military_formation$ they are leading. Their [concept_commander_rank] contributes to the [concept_command_limit] of the $concept_military_formation$ they are in, and also impacts the amount of troops that they are able to bring with them into battle. $commander_coup_loc$"
 commander_coup_loc: "[Concept('concept_popularity', '$concept_popular$')] $concept_commanders$ belonging to an [concept_interest_group] with low [concept_approval] may initiate a [concept_coup]."

 concept_general:0 "General"
 concept_generals:1 "Generals"
 concept_general_possessive:0 "General’s"
 concept_general_plural_singular:0 "General(s)"
 concept_general_desc:2 "An [Concept('concept_army','$concept_army_possessive$')] [concept_commander] is called a $concept_general$ who leads the $concept_army$'s [Concept('concept_battalion','$concept_battalions$')] into [concept_battle]. You can change any $concept_general$'s [concept_order] on the $concept_army$ [concept_military_formation] panel or by right-clicking the $concept_general$ at any time. What $concept_orders$ you may give a $concept_general$ depends on his [Concept('concept_character_trait','$concept_character_traits$')], but there will always be the basic #b Advance#! and #b Defend#! $concept_orders$. Any other military effects from a $concept_general$'s $concept_character_traits$ may affect his $concept_army$ as a whole or are applied onto $concept_battalions$ under his direct command when in a [concept_battle]."

 concept_admiral:0 "Admiral"
 concept_admirals:1 "Admirals"
 concept_admiral_possessive:0 "Admiral’s"
 concept_admiral_desc:2 "A naval [concept_commander] [concept_character] who leads a [Concept('concept_country','$concept_country_possessive$')] [Concept('concept_ship','$concept_ships$')]. Effects from an $concept_admiral$'s [Concept('concept_character_trait','$concept_character_traits$')] are conferred onto $concept_ships$ under their command."

 concept_admiral_defeated: "Defeated"
 concept_admiral_defeated_desc: "An [concept_admiral] is $concept_admiral_defeated$ when he loses a [concept_battle] at sea. A [concept_fleet] is $concept_admiral_defeated$ when all its [Concept('concept_admiral','$concept_admirals$')] are $concept_admiral_defeated$. $concept_admirals$ and $concept_fleets$ will only repair and regroup once they are back at their home [concept_hq] and their [Concept('concept_ship','$concept_ships$')] have regained at least [GetDefine('NMilitary','MANPOWER_RATIO_REQUIRED_TO_CLEAR_DEFEATED_ADMIRALS')|v0%] of their total [concept_manpower]."

 concept_military_formation: "Formation"
 concept_military_formations: "Formations"
 concept_military_formation_possessive: "Formation’s"
 concept_military_formation_desc: "A $concept_military_formation$ is an [concept_army] or [concept_fleet] that is used in [Concept('concept_war','$concept_wars$')] to achieve military objectives. They may have assigned [Concept('concept_unit','$concept_units$')] and a [concept_commander] and can be ordered to [Concept('concept_front','$concept_fronts$')] to fight the enemy forces there."

 concept_political_strength:0 "Political Strength"
 concept_political_strength_desc:3 "The degree of power a [concept_pop], and consequently the [Concept('concept_interest_group','$concept_interest_groups$')] it supports, have over the [Concept('concept_country','$concept_country_possessive$')] politics. It is derived from its supporting $concept_pops$' [concept_wealth]. $concept_pops$ who live in [Concept('concept_unincorporated_state','$concept_unincorporated_states$')] have much less $concept_political_strength$, while $concept_pops$ in the [concept_capital_state] have more.\n\n$concept_pops$ distribute their $concept_political_strength$ to the $concept_interest_groups$ it supports proportionate to how many of its members support it. If an $concept_interest_group$ is a member of a [concept_party], they also gain $concept_political_strength$ from the [concept_votes] that $concept_party$ received in the last [concept_election]. An $concept_interest_group$'s [concept_clout] is equal to their share of the $concept_country$'s total $concept_political_strength$."

 concept_invasion: "Invasion"
 concept_invade: "Invade"
 concept_invaded: "Invaded"
 concept_invading: "Invading"
 concept_invasion_desc: "An [concept_army] attacking a [concept_state] via land or sea, the latter also being referred to as [concept_naval_invasion]."

 concept_naval_invasion: "Naval Invasion"
 concept_naval_invasions: "Naval Invasions"
 concept_naval_invaded: "Naval Invaded"
 concept_naval_invasion_desc: "A maritime invasion of a coastal [concept_state], coordinated between a [concept_fleet] and an [concept_army]. The $concept_fleet$ keeps the waters off the coast clear to ensure the $concept_army$ can land safely, while the $concept_army$ executes a series of land [Concept('concept_battle','$concept_battles$')] to win [concept_occupation] in the targeted $concept_state$.\n\nThe controller of the targeted $concept_state$ can defend against the $concept_naval_invasion$ by positioning their own [Concept('concept_fleet','$concept_fleets$')] in the affected [concept_sea_node] or stationing a [Concept('concept_mobilize_army','$concept_mobilize_army_mobilized$')] $concept_army$ in the invaded $concept_state$."

 concept_working_adults:0 "Working Adults"
 concept_working_adult:1 "Working Adult"
 concept_working_adults_desc:1 "The part of a [concept_pop] that make up the [concept_workforce] that work in [Concept('concept_building', '$concept_buildings$')] for [Concept('concept_building_wage', '$concept_building_wages$')]. They are the main source of a $concept_pop$'s [Concept('concept_pop_income','$concept_pop_income_short$')] and [concept_political_strength]."

 concept_dependents:0 "Dependents"
 concept_dependent:0 "Dependent"
 concept_dependents_desc:2 "The part of a [concept_pop] not considered part of the [concept_workforce]. They represent the families of the [concept_working_adults] and normally constitute the majority of the population. $concept_dependents$ usually generate [concept_dependent_income] that is typically smaller than the [Concept('concept_building_wage','$concept_building_wages$')] collected by $concept_working_adults$, but they also have lower [concept_pop_needs]. While they are able to support [Concept('concept_interest_group','$concept_interest_groups$')] their [concept_political_strength] typically count for less. They are only granted [Concept('concept_votes','$concept_voting_rights$')] under very specific [Concept('concept_law', '$concept_laws$')].\n\nEnacting different $concept_laws$ or maintaining certain [Concept('concept_institution', '$concept_institutions$')] may convert $concept_dependents$ into $concept_working_adults$ over time, increase their [concept_political_strength], or supplement their $concept_dependent_income$."

 concept_disenfranchised:0 "Disenfranchised"
 concept_disenfranchised_desc:1 "A $concept_disenfranchised$ [concept_pop] is prohibited from participating in the [Concept('concept_country','$concept_country_possessive$')] politics. As a result they cannot support any [Concept('concept_interest_group','$concept_interest_groups$')]. The most common reason for a $concept_pop$ to be $concept_disenfranchised$ is low [concept_acceptance]."

 concept_input_mult:1 "Goods Input"
 concept_input_mult_desc:2 "An adjustment to the amount of [Concept('concept_good','$concept_goods$')] [Concept('concept_good_consumption','$concept_good_consumed$')] by a [concept_building]."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED APRIL 29, 2022

 concept_throughput:0 "Throughput"
 concept_throughput_desc:1 "The effectiveness of the [concept_workforce] of a [concept_building]. $concept_throughput$ increases both the [Concept('concept_good_consumption','$concept_input_goods$')] and the [Concept('concept_good_production','$concept_output_goods$')] or other effects. It can increase as a result of [concept_economy_of_scale], and might be adjusted up or down due to [Concept('concept_modifier','$concept_modifiers$')]."

 concept_native_uprising:0 "Native Uprising"
 concept_native_uprising_desc:3 "A type of [concept_diplomatic_play] that can occur if the [concept_tension] between a colonizer and a [concept_decentralized_nation] rises to #b $tension_volatile$#! level. In this $concept_diplomatic_play_short$, the $concept_decentralized_nation$ will mobilize its warriors and attempt to seize the [concept_colony] from the colonizer."

 concept_discrimination:0 "Discrimination"
 concept_discriminated:1 "Discriminated"
 concept_discriminated_against:0 "Discriminated Against"
 concept_discrimination_desc:3 "[Concept('concept_pop', '$concept_pops$')] can be $concept_discriminated_against$ if their [concept_culture] and/or [concept_religion] have a low [concept_acceptance] value in their [concept_country]. Typically, $concept_pops$ in the lower three $concept_acceptance$ statuses are considered to be $concept_discriminated$. $concept_discriminated$ $concept_pops$:\n- get paid less than their peers\n- have less [concept_political_strength]\n- are less likely to develop [concept_pop_qualifications] for certain [concept_profession]\n- naturally become [concept_radical] over time\n- and are more likely to [Concept('concept_migration','$concept_emigrate$')].\n\nIn addition, certain [Concept('concept_law', '$concept_laws$')] limit or expand national acceptance of $concept_culture$ and $concept_religions$."

 concept_approval:0 "Approval"
 concept_approval_disapproval:0 "Disapproval"
 concept_approval_indifferent:0 "Indifferent"
 concept_approval_desc:1 "An [Concept('concept_interest_group','$concept_interest_group_possessive$')] $concept_approval$ depends on two main factors: how much of their [concept_political_strength] comes from [Concept('concept_radical','$concept_radicals$')] compared to [Concept('concept_loyalist','$concept_loyalists$')], and how well the [Concept('concept_country','$concept_country_possessive$')] current [Concept('concept_law','$concept_laws$')] match with the $concept_interest_group$'s [Concept('concept_ideology','$concept_ideologies$')]. In addition, if a new $concept_law$ is currently being [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')], $concept_approval$ will be affected by a larger temporary adjustment which will linger while [Concept('concept_decay','$concept_decaying$')] for up to #v [GetDefine('NPolitics','CHANGED_LAW_APPROVAL_MONTHS')|0] months#! after it has passed.\n\nAn $concept_interest_group$'s $concept_approval$ impacts which [Concept('concept_interest_group_trait','$concept_interest_group_traits$')] they activate. [GetApprovalRatingFromValue(GetDefine('NPolitics','APPROVAL_THRESHOLD_ANGRY'))] $concept_interest_groups$ contribute to the [Concept('concept_activism','$concept_activism_short$')] of [Concept('concept_political_movement','$concept_political_movements$')], while $concept_interest_groups$ that are at least [GetApprovalRatingFromValue(GetDefine('NPolitics','APPROVAL_THRESHOLD_HAPPY'))] will refrain from joining $concept_political_movements_short$ in the first place. $ig_approval_coup_loc$"
 ig_approval_coup_loc: "An $concept_interest_group$ with $concept_approval$ at or below [GetApprovalRatingFromValue(GetDefine('NPolitics','APPROVAL_THRESHOLD_ANGRY'))] may launch a [concept_coup] against the sitting [concept_government]."

 concept_insurrection: "Insurrection"
 concept_insurrections: "Insurrections"
 concept_insurrectionary: "Insurrectionary"
 concept_insurrection_desc: "An $concept_insurrection$ is either a [Concept('concept_secession', '$concept_secessionist$')] or a [Concept('concept_revolution', '$concept_revolutionary$')] [concept_political_movement]. This means the $concept_political_movement_short$ is on the brink of turning into a [concept_civil_war]. Any [Concept('concept_pop','$concept_pops$')] or [Concept('concept_interest_group','$concept_interest_groups$')] that are part of a $concept_insurrectionary$ $concept_political_movement_short$ are also labeled #italic $concept_insurrectionary$#!."
 concept_revolt: "Revolt"

 concept_revolution: "Revolution"
 concept_revolutions: "Revolutions"
 concept_revolutionary: "Revolutionary"
 concept_revolution_desc: "Contrary to [Concept('concept_secession','$concept_secessions$')], a $concept_revolution$ will try to annex the entire [concept_country], reshaping it according to their [concept_core_movement_ideology]. A $concept_revolution$ is the result of a [concept_political_movement] that has grown too [concept_radical] with high [Concept('concept_political_movement_support', '$concept_political_movement_support_short$')] and [Concept('concept_activism','$concept_activism_short$')]. If the $concept_political_movement_short$ starts an uprising, [Concept('concept_state','$concept_states$')] in which its $concept_political_movement_supporting$ [Concept('concept_pop','$concept_pops$')] are relatively strong will separate from the rest of the $concept_country$ and start a [concept_diplomatic_play] to annex the [Concept('concept_loyalist','$concept_loyalists$')].\n\nYou can lower the $concept_political_movement_possessive_short$ [Concept('concept_activism','$concept_activism_short$')] by reducing the number of [Concept('concept_radical','$concept_radicals$')] in the $concept_political_movement_supporting$ $concept_pops$ and increasing the [concept_approval] of their [Concept('concept_interest_group','$concept_interest_groups$')]. You can also weaken and slow a $concept_revolution$ down using the [SelectLocalization(GetPlayer.IsValid,'concept_revolution_desc_added','Home Affairs')] [concept_institution]."
 concept_revolution_desc_added: "[GetInstitutionType('institution_home_affairs').GetName]"

 concept_secession: "Secession"
 concept_secessions: "Secessions"
 concept_secessionist: "Secessionist"
 concept_secessionists: "Secessionists"
 concept_seceding: "Seceding"
 concept_secession_desc: "Contrary to [Concept('concept_revolution','$concept_revolutions$')], a $concept_secession$ will split the [concept_country] in two where the $concept_secessionists$ will fight to break loose and form a new nation. A $concept_secession$ is the result of a [concept_political_movement] that has grown too [concept_radical] with high [Concept('concept_political_movement_support', '$concept_political_movement_support_short$')] and [Concept('concept_activism','$concept_activism_short$')]. If the $concept_political_movement_short$ starts an uprising, [Concept('concept_state','$concept_states$')] in which its $concept_political_movement_supporting$ [Concept('concept_pop','$concept_pops$')] are relatively strong will separate from the rest of the $concept_country$ and start a [concept_diplomatic_play] to break loose.\n\nYou can lower the $concept_political_movement_possessive_short$ [Concept('concept_activism','$concept_activism_short$')] by reducing the number of [Concept('concept_radical','$concept_radicals$')] in the $concept_political_movement_supporting$ $concept_pops$ and increasing the [concept_approval] of their $concept_interest_groups$. You can also weaken and slow a $concept_secession$ down using the [SelectLocalization(GetPlayer.IsValid,'concept_revolution_desc_added','Home Affairs')] [concept_institution]."
 concept_secession_desc_added: "[GetInstitutionType('institution_home_affairs').GetName]"

 concept_civil_war: "Civil War"
 concept_civil_wars: "Civil Wars"
 concept_civil_war_desc: "A [concept_war] where a [concept_country] has split into two opposing sides. It can either be a [concept_revolution] or a [concept_secession] stemming from a [concept_political_movement]."

 concept_political_movement_support:0 "Political Movement Support"
 concept_political_movement_support_short:1 "Support"
 concept_political_movement_supporting: "Supporting"
 concept_political_movement_support_desc: "The $concept_political_movement_support_short$ of a [concept_political_movement] is based on the [concept_political_strength] of its supporting [Concept('concept_pop','$concept_pops$')] as well as the [concept_popularity] and [Concept('concept_character_trait','$concept_character_traits$')] of any supporting [Concept('concept_agitator','$concept_agitators$')]. A $concept_political_movement$ with at least [LabelingHelper.GetLabelForRadicalism(GetDefine('NPolitics', 'MOVEMENT_MIN_RADICALISM_FOR_LAW_ENACTMENT_IMPACT'))] (#v [GetDefine('NPolitics', 'MOVEMENT_MIN_RADICALISM_FOR_LAW_ENACTMENT_IMPACT')|%0]#!) [Concept('concept_activism','$concept_activism_short$')] increases the [concept_enactment_success] chance if you pursue a [concept_law] they desire, or increases the [Concept('concept_enactment_stall','$concept_enactment_stall_short$')] chance if they oppose it. This increased chance is directly based on the $concept_political_movement_support_short$. Should the $concept_political_movement$ lead to a [concept_insurrection], $concept_political_movement_support$ will determine how many [Concept('concept_state','$concept_states$')] it will start with.\n\n#title $concept_political_movement_support_short$ thresholds:#! #indent_newline:3 \n[GetSupportLabelsDesc]"

 concept_political_movement:0 "Political Movement"
 concept_political_movement_short:0 "Movement"
 concept_political_movements_short:0 "Movements"
 concept_political_movements:1 "Political Movements"
 concept_political_movement_possessive: "Political Movement’s"
 concept_political_movement_possessive_short: "Movement’s"
 concept_political_movement_desc: "A $concept_political_movement$ is driven by [Concept('concept_pop','$concept_pops$')] [Concept('concept_political_movement_support','$concept_political_movement_supporting$')] it based on its [concept_core_movement_ideology]. Their $concept_political_movement_support_short$ comes in varying degrees of [concept_activism] dependent on how many $concept_pops$ are engaged or angry enough on the matter. [Concept('concept_agitator','$concept_agitators$')] can also join and $concept_political_movement_support_short$ a $concept_political_movement_short$, increasing the $concept_activism_short$ based on their [concept_popularity]. If enough $concept_pops$ are $concept_political_movement_supporting$ and the $concept_activism_short$ is high enough, the $concept_political_movement_short$ may become [Concept('concept_insurrection', '$concept_insurrectionary$')], depending on the [Concept('concept_law','$concept_laws$')] in the $concept_core_movement_ideology$ and the type of $concept_political_movement_short$. An [Concept('concept_insurrection', '$concept_insurrectionary$')] $concept_political_movement_short$ may in turn lead to a [concept_civil_war] breaking out.\n\n$concept_political_movements$ will exert [concept_political_movement_pressure] on [Concept('concept_interest_group','$concept_interest_groups$')] based on the percentage of [concept_political_strength] from $concept_political_movement_supporting$ $concept_pops$.\n\n$concept_political_movements_short$ both affect $concept_laws$ and vice versa. If the $concept_activism$ is at least [LabelingHelper.GetLabelForRadicalism(GetDefine('NPolitics', 'MOVEMENT_MIN_RADICALISM_FOR_LAW_ENACTMENT_IMPACT'))] (#v [GetDefine('NPolitics', 'MOVEMENT_MIN_RADICALISM_FOR_LAW_ENACTMENT_IMPACT')|%0]#!), the $concept_political_movement_short$ will increase the [concept_enactment_success] and [Concept('concept_enactment_stall','$concept_enactment_stall_short$')] chances of the [Concept('concept_endorse_oppose','$concept_endorsed$')] and [Concept('concept_endorse_oppose','$concept_opposed$')] $concept_laws$ in the $concept_core_movement_ideology_short$ based on the $concept_political_movement_support_short$. Similarly, if a $concept_political_movement_short$ is at least [LabelingHelper.GetLabelForRadicalism(GetDefine('NPolitics', 'MOVEMENT_MIN_RADICALISM_FOR_LAW_ENACTMENT_IMPACT'))] (#v [GetDefine('NPolitics', 'MOVEMENT_MIN_RADICALISM_FOR_LAW_ENACTMENT_IMPACT')|%0]#!) and a $concept_law$, either $concept_endorsed$ or $concept_opposed$ by the $concept_core_movement_ideology_short$, is being [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')], the $concept_activism_short$ #b cannot#! drop below [LabelingHelper.GetLabelForRadicalism(GetDefine('NPolitics', 'MOVEMENT_MIN_RADICALISM_FOR_LAW_ENACTMENT_IMPACT'))] (#v [GetDefine('NPolitics', 'MOVEMENT_MIN_RADICALISM_FOR_LAW_ENACTMENT_IMPACT')|%0]#!)."

 concept_activism:0 "Movement Activism"
 concept_activism_short:1 "Activism"
 concept_activism_desc: "$concept_activism$ is the percentage of [Concept('concept_political_movement_support','$concept_political_movement_supporting$')] [Concept('concept_pop','$concept_pops$')] willing to actively push for a [Concept('concept_political_movement','$concept_political_movement_possessive$')] agenda. It determines how many [Concept('concept_radical','$concept_radicals$')] are generated by the $concept_political_movement_short$ each week and how close the $concept_political_movement_short$ is to becoming [Concept('concept_insurrection', '$concept_insurrectionary$')]. If it is already $concept_insurrectionary$, it determines the max progress the $concept_revolution$ can reach.\n\nLuckily, we are able to predict how a $concept_political_movement_possessive$ $concept_activism_short$ will shift. If the prediction is @activism_red! $RADICALISM_PROTESTING$ (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!) or above, the $concept_political_movement_short$ has a high risk of becoming $concept_insurrectionary$. If the prediction is @activism_red! $RADICALISM_MILITANT$ (#r 100%#!) and the $concept_political_movement_support_short$ is enough, a [concept_civil_war] is imminent since the progress of the [concept_revolution] or [concept_secession] can now reach #v 100%#!.\n\nIf the $concept_activism_short$ is at least [LabelingHelper.GetLabelForRadicalism(GetDefine('NPolitics', 'MOVEMENT_MIN_RADICALISM_FOR_LAW_ENACTMENT_IMPACT'))] (#v [GetDefine('NPolitics', 'MOVEMENT_MIN_RADICALISM_FOR_LAW_ENACTMENT_IMPACT')|%0]#!), the $concept_political_movement_short$ will increase the [concept_enactment_success] and [Concept('concept_enactment_stall','$concept_enactment_stall_short$')] chances of the [Concept('concept_endorse_oppose','$concept_endorsed$')] and [Concept('concept_endorse_oppose','$concept_opposed$')] $concept_laws$ in the [concept_core_movement_ideology] based on the $concept_political_movement_support_short$.\n\nIf the $concept_activism_short$ is at least [LabelingHelper.GetLabelForRadicalism(GetDefine('NPolitics', 'MOVEMENT_MONTHLY_RADICALS_THRESHOLD'))] (#v [GetDefine('NPolitics', 'MOVEMENT_MONTHLY_RADICALS_THRESHOLD')|%0]#!), a number of $concept_political_movement_supporting$ $concept_pops$ will become $concept_radicalized$ each month, and certain $concept_political_movements_short$ will begin to generate [concept_obstinance] in $concept_states$ with $concept_political_movement_supporting$ $concept_pops$.\n\n#title $concept_activism_short$ thresholds:#! #indent_newline:3 \n[GetActivismLabelsDesc]"

 concept_political_movement_pressure: "Movement Pressure"
 concept_political_movement_pressure_short: "Pressure"
 concept_political_movement_pressured_short: "Pressured"
 concept_political_movement_pressure_desc: "[Concept('concept_political_movement','$concept_political_movements$')] will $concept_political_movement_pressure_short$ [Concept('concept_interest_group','$concept_interest_groups$')] based on the percentage of [concept_political_strength] from [Concept('concept_political_movement_support','$concept_political_movement_supporting$')] [Concept('concept_pop','$concept_pops$')]. The $concept_interest_group$ is considered #b $concept_political_movement_pressured_short$#! if the $concept_political_movement_pressure_short$ is above #v [GetDefine('NPolitics', 'IG_INFLUENCING_MOVEMENT_MIN_SUPPORTING_CLOUT')|%0]#!. Then the $concept_political_movement_possessive$ [concept_character] [Concept('concept_ideology','$concept_ideologies$')] will become possible for new [Concept('concept_leader', '$concept_leaders$')] of that $concept_interest_group$.\n\nAll $concept_pops$ in an $concept_interest_group$ have varying $concept_political_strength$ which sums up to the $concept_interest_group_possessive$ total $concept_political_strength$. The percentage of this total $concept_political_strength$, represented by $concept_pops$ who are $concept_political_movement_supporting$ a $concept_political_movement$, is what defines the $concept_political_movement_pressure$. $concept_pops$ with high $concept_political_strength$ will have higher leverage to influence their $concept_interest_groups$ with their $concept_political_movement_possessive$ $concept_ideologies$ and beliefs."

 concept_core_movement_ideology: "Core Movement Ideology"
 concept_core_movement_ideology_short: "Core Ideology"
 concept_core_movement_ideology_extra_short: "Ideology"
 concept_core_movement_ideology_desc: "This [concept_ideology] is what the [Concept('concept_political_movement_support','$concept_political_movement_supporting$')] [Concept('concept_pop','$concept_pops$')] and [Concept('concept_agitator','$concept_agitators$')] care about and what the [concept_political_movement] as a whole will be pushing for. Passing [Concept('concept_law','$concept_laws$')] [Concept('concept_endorse_oppose','$concept_endorsed$')] by this $concept_ideology$ will create [Concept('concept_loyalist','$concept_loyalists$')] from $concept_political_movement_supporting$ $concept_pops$. If any [Concept('concept_interest_group','$concept_interest_groups$')] are [Concept('concept_political_movement_pressure','$concept_political_movement_pressured_short$')], this is guranteed to be one of the [concept_character] $concept_ideologies$ to become possible for new [Concept('concept_leader', '$concept_leaders$')] of those $concept_interest_groups$."

 concept_peace_deal:0 "Peace Deal"
 concept_peace_deals:0 "Peace Deals"
 concept_peace_deal_desc:0 "When a [concept_war_leader] wish to end a [concept_war] they may offer a $concept_peace_deal$. The deal must be agreed to by all negotiating $concept_countries$ remaining in the $concept_war$ to take effect. To increase the chance the $concept_peace_deal$ will be agreed to, the $concept_war_leader$ is allowed to include or exclude proposed [Concept('concept_war_goal','$concept_war_goals$')] from both sides."

 concept_war:0 "War"
 concept_wars:1 "Wars"
 concept_war_desc:1 "An active armed conflict between two sides of co-belligerent [Concept('concept_country','$concept_countries$')] as a result of the failure to peacefully resolve a [concept_diplomatic_play]. During $concept_wars$, [Concept('concept_commander','$concept_commanders$')] on land and at sea will follow [Concept('concept_order','$concept_orders$')] to complete certain objectives, often resulting in [Concept('concept_battle','$concept_battles$')] between the two sides."

 concept_war_goal:0 "War Goal"
 concept_war_goals:1 "War Goals"
 concept_war_goal_desc:2 "$concept_war_goals$ are the objectives a [concept_country] is fighting a [concept_war] over. They are determined during the [concept_diplomatic_play] and are fixed after the $concept_war$ has begun. Each $concept_war_goal$ claimed in a [concept_peace_deal] decreases the chance the opponent will accept it, and increases the degree by which their [concept_war_support] must be [Concept('concept_war_exhaustion','$concept_war_exhaustion_exhausted$')] before they will agree. $concept_war_support$ can only drop below #v 0#! if the opposing side [Concept('concept_controlled_war_goal','$concept_controls_war_goal_short$')] all their $concept_war_goals$.\n\nThe first $concept_war_goal$ claimed as part of the $concept_diplomatic_play$ is considered your $concept_primary_demand$, and some $concept_diplomatic_plays$ require it to be included in all $concept_peace_deals$."

 concept_controlled_war_goal: "Controlled War Goal"
 concept_controlled_war_goals: "Controlled War Goals"
 concept_control_war_goal: "Control War Goal"
 concept_control_war_goals: "Control War Goals"
 concept_controlling_a_war_goal: "Controlling a War Goal"
 concept_controlling_war_goals: "Controlling War Goals"
 concept_controlled_war_goal_short: "Controlled"
 concept_controlling_war_goal_short: "Controlling"
 concept_control_war_goal_short: "Control"
 concept_controls_war_goal_short: "Controls"
 concept_controlled_war_goal_desc: "If the holder of a [concept_war_goal], or their [Concept('concept_ally','$concept_allies$')], [Concept('concept_occupation','$concept_occupy$')] at least [GetDefine('NWar','STATE_PARTIAL_OCCUPATION_THRESHOLD')|%v] of the required [concept_state] or [Concept('concept_state','$concept_states$')], they are considered to have $concept_control_war_goal_short$ of this [concept_war_goal]. [concept_war_support] can only drop below #v 0#! if the opposing side $concept_controls_war_goal_short$ all their $concept_war_goals$."

 concept_primary_demand:0 "Primary Demand"
 concept_primary_demand_short:0 "Primary"
 concept_primary_demands:0 "Primary Demands"
 concept_primary_demand_desc:0 "$concept_primary_demands$ are [Concept('concept_war_goal','$concept_war_goals$')] that will be enforced on the opposing side of a [concept_diplomatic_play] if they decide to back down. The first [concept_war_goal] added on each side is always a $concept_primary_demand$, as are any [Concept('concept_war_goal','$concept_war_goals$')] added against the leader of the opposing side through [Concept('concept_sway','$concept_swaying$')]."

 concept_secondary_demand:0 "Secondary Demand"
 concept_secondary_demand_short: "Secondary"
 concept_secondary_demands:0 "Secondary Demands"
 concept_secondary_demand_desc:0 "$concept_secondary_demands$ are [Concept('concept_war_goal','$concept_war_goals$')] that will NOT be enforced in a [concept_diplomatic_play] if they decide to back down, but can be taken in a [concept_peace_deal] or through capitulation if the play escalates into a [concept_war]. A $concept_secondary_demand$ that is targeting the leader of the opposing side can be turned into a $concept_primary_demand$ by spending [concept_diplomatic_maneuvers], though doing so might result in a [concept_diplomatic_incident]."

 concept_resource_potential:0 "Resource Potential"
 concept_resource_potentials:1 "Resource Potentials"
 concept_resource_potentials_short:0 "Potentials"
 concept_resource_potential_desc:3 "A $concept_resource_potential$ grants the ability to construct and expand a specific [concept_building] type in the state, usually a resource industry such as fisheries, mines, or plantations. The maximum [concept_building_level] you can expand the $concept_building$ to is limited either to a fixed amount per resources, or by the $concept_state$'s amount of [concept_arable_land]."

 concept_government:0 "Government"
 concept_governments:0 "Governments"
 concept_government_possessive:0 "Government’s"
 concept_government_desc:1 "A [Concept('concept_country','$concept_country_possessive$')] $concept_government$ consists of one or several [Concept('concept_interest_group','$concept_interest_groups$')]. If the $concept_country$ has [Concept('concept_votes','$concept_voting_rights$')] these $concept_interest_groups$ may be organized into [Concept('concept_party','$concept_parties$')]. Depending on the $concept_country$'s [Concept('concept_law','$concept_laws$')], this mix of $concept_interest_groups$ will result in higher or lower $concept_government$ [concept_legitimacy].\n\nAny new $concept_law$ you wish to [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enact$')] must have some support among $concept_interest_groups$ that make up the $concept_government$, unless it is supported by an active [concept_political_movement]. The ability to quickly and painlessly push the $concept_law$ through the legislature depends on how unified the $concept_government$'s support of it is."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED APRIL 28, 2022

 concept_interest: "Interest"
 concept_interests: "Interests"
 concept_interest_desc: "A [concept_country] maintaining an $concept_interest$ in a [concept_strategic_region] signals to the rest of the world that they might get involved in [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] taking place there. Having a high enough [concept_interest_tier] in a $concept_strategic_region$ is a requirement the ability to start or join $concept_diplomatic_plays$, and you cannot [Concept('concept_colony', '$concept_colonize$')] [Concept('concept_state_region','$concept_state_regions$')] where you do not maintain a high enough $concept_interest_tier$."

 concept_involvement: "Involvement"
 concept_involved: "Involved"
 concept_involvement_desc: "A [Concept('concept_country', '$concept_country_possessive$')] $concept_involvement$ in a [concept_strategic_region] measures how strong their [concept_interest] is in the region.\n\n$HOW_TO_INCREASE_INVOLVEMENT$"

 concept_local_country: "Local Country"
 concept_local_countries: "Local Countries"
 concept_local_country_short: "Local"
 concept_local_country_desc: "A [concept_country] is $concept_local_country_short$ to a [concept_strategic_region] if it satisfies any of the following conditions:\n$TAB$• Has its [concept_capital_state] in the $concept_strategic_region_short$\n$TAB$• Has [GetDefine('NDiplomacy', 'REGION_LOCALITY_SHARE_THRESHOLD')|0v%] or more [concept_locality] in the $concept_strategic_region_short$\n$TAB$• Has [GetDefine('NDiplomacy', 'REGION_LOCALITY_COUNTRY_INCORPORATED_SHARE_THRESHOLD')|0v%] or more of its [Concept('concept_incorporated_state', '$concept_incorporated_states$')] in the $concept_strategic_region_short$"

 concept_locality: "Locality"
 concept_locality_desc: "A measure of how local a country is in a [concept_strategic_region], which builds on a combination of the share of owned [Concept('concept_state', '$concept_states$')], [Concept('concept_pop', '$concept_population$')], and [concept_gdp] in a $concept_strategic_region_short$"

 concept_interest_tier: "Interest Tier"
 concept_interest_tiers: "Interest Tiers"
 concept_interest_tier_short: "Tier"
 concept_interest_tier_desc: "An [concept_interest_tier] signifies the level of presence that a [concept_country] has in a [concept_strategic_region] and can be upgraded by increasing [concept_involvement] in a given $concept_strategic_region_short$.\nHigher tiers unlock new interactions and benefits."

 concept_diplomatic_relevancy: "Diplomatic Relevancy"
 concept_diplomatically_relevant: "Diplomatically Relevant"
 concept_diplomatically_irrelevant: "Diplomatically Irrelevant"
 concept_diplomatic_relevancy_desc: "Having $concept_diplomatic_relevancy$ is required for a [concept_country] to engage in certain interactions like signing [Concept('concept_treaty', '$concept_treaties$')]. A $concept_country$ is considered $concept_diplomatically_relevant$ for another if one of the following conditions is fulfilled:\n$EFFECT_LIST_BULLET$They share a direct border\n$EFFECT_LIST_BULLET$They share a direct border with only one [concept_sea_node] between them\n$EFFECT_LIST_BULLET$One $concept_country$ is bordering a [concept_subject] of the other\n$EFFECT_LIST_BULLET$One $concept_country_possessive$ $concept_subject$ is bordering the other $concept_country_possessive$ $concept_subject$\n$EFFECT_LIST_BULLET$An existing $concept_treaty$ between the two $concept_countries$\n$EFFECT_LIST_BULLET$Both $concept_countries$ being [Concept('concept_great_power','$concept_great_powers$')]\n$EFFECT_LIST_BULLET$One of the $concept_countries$ declaring a [concept_rivalry] towards the other\n$EFFECT_LIST_BULLET$One of the $concept_countries$ conducting [concept_piracy] targetting the other\n$EFFECT_LIST_BULLET$Both $concept_countries$ having overlapping [Concept('concept_interest', '$concept_interests$')]"

 concept_strategic_adjacency: "Strategic Adjacency"
 concept_strategically_adjacent: "Strategically Adjacent"
 concept_strategic_adjacency_desc: "$concept_strategic_adjacency$ is an adjacency check for two [Concept('concept_country', '$concept_countries$')] that is used to allow certain interactions between them if they fulfill the conditions. Two $concept_countries$ count as $concept_strategically_adjacent$ if one of these conditions is fulfilled:\n$EFFECT_LIST_BULLET$They share a direct border\n$EFFECT_LIST_BULLET$They share a direct border with only one [concept_sea_node] between them\n$EFFECT_LIST_BULLET$One $concept_country$ is bordering a [concept_subject] of the other\n$EFFECT_LIST_BULLET$One $concept_country_possessive$ $concept_subject$ is bordering the other $concept_country_possessive$ $concept_subject$\n$EFFECT_LIST_BULLET$One $concept_country$ is bordering an unpressed [concept_war_goal]"

 concept_obligation: "Obligation"
 concept_obligations: "Obligations"
 concept_obligated: "Obligated"
 concept_obligation_desc: "One [concept_country] can become $concept_obligated$ to another as a result of agreements made during [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] or when one $concept_country$ buys out another's [concept_loans]. While $concept_obligated$ to a $concept_country$ you are unable to start $concept_diplomatic_plays$ against them or even join a $concept_diplomatic_play_short$ on the other side as them. The other $concept_country$ may use an $concept_obligation$ they hold over you to force you into a [concept_diplomatic_pact] or [concept_treaty], or may absolve it to [concept_sway] you into supporting them in a $concept_diplomatic_play$ or increase [concept_relations] with you."

 concept_gdp: "Gross Domestic Product"
 concept_gdp_short: "GDP"
 concept_gdp_desc: "Each unit of [Concept('concept_good','$concept_goods$')] [Concept('concept_good_production', '$concept_good_produced$')|l] in your [concept_country] contributes to your [concept_gdp]. The [concept_market_price] value of your national production is reduced by the value of $concept_goods$ used as inputs into the process.\n\n$concept_gdp_short$ affects [concept_prestige] and [concept_budget_minting]."

 concept_gdp_per_capita: "Gross Domestic Product per Capita"
 concept_gdp_per_capita_short: "GDP per Capita"
 concept_gdp_per_capita_desc: "Your country's [concept_gdp] divided by its total [Concept('concept_pop','$concept_population$')]."

 concept_gdp_ownership: "GDP Ownership"
 concept_gdp_ownership_desc: "A [Concept('concept_country','$concept_country_possessive$')] [concept_gdp] can be both domestically owned by the $concept_country$ itself and foreignly owned by other $concept_countries$. If another $concept_country$ has [Concept('concept_foreign_investment_rights','$concept_foreign_investment_rights_short$')], they may foreignly own [Concept('concept_building_level','$concept_building_levels$')] in the initial $concept_country$. The $concept_gdp_short$ generated from those $concept_building_levels$ then contribute to the foreign $concept_country_possessive$ $concept_gdp_short$. Only domestically owned $concept_gdp_short$ contributes to the domestic $concept_country_possessive$ [concept_prestige] and [concept_budget_minting]."

 concept_education_access:0 "Education Access"
 concept_education_access_desc:1 "The degree by which a [concept_pop] is able to access education for their children. As new generations are born and raised, the $concept_pop$'s [concept_literacy] will move towards its level of $concept_education_access$."

 concept_isolated_state:0 "Isolated State Region"
 concept_isolated_states:1 "Isolated State Regions"
 concept_isolated_state_short:1 "Isolated"
 concept_isolated_state_desc:2 "A [concept_state_region] is considered $concept_isolated_state_short$ from its [concept_market] if it is not connected by land to its [concept_market_capital], and is not connected by land to a [SelectLocalization(GetPlayer.IsValid,'concept_isolated_state_desc_added','Port')] that can make a [concept_port_connection] to its $concept_market_capital$. $concept_isolated_states$ do not generate any [concept_buy_orders] and [concept_sell_orders], nor is the [concept_local_price] of [Concept('concept_good', '$concept_goods$')] affected by their [concept_market_price]."
 concept_isolated_state_desc_added:0 "[GetBuildingType('building_port').GetName]"

 concept_shortage: "Shortage"
 concept_shortages: "Shortages"
 concept_input_goods_shortage: "Input Goods Shortage"
 concept_input_goods_shortages: "Input Goods Shortages"
 concept_shortage_desc: "If the supply for a [concept_good] is less than [GetDefine('NEconomy', 'GOODS_SHORTAGE_PENALTY_THRESHOLD')|v%0] of its demand, that $concept_good$ is considered to be in $concept_shortage$. While in $concept_shortage$, different penalties might apply depending on how the $concept_good$ is used.\n\n$concept_goods$ used as [Concept('concept_good_consumption','$concept_input_goods$')] in [Concept('concept_building','$concept_buildings$')] will result in an increasing output penalty depending on the severity of the $concept_input_goods_shortage$.\n\nIn the case of the [GetPopNeed('popneed_basic_food').GetName] [Concept('concept_pop_needs','$concept_pop_need_short$')], a $concept_shortage$ will affect the [concept_food_security] in that [concept_state], potentially leading to [concept_starvation] and even [concept_famine]. [GetPopNeed('popneed_basic_food').GetName] $concept_shortages$ are based on the $concept_shortage$ level for each of the individual $concept_goods$ that fulfill it.\n\n$concept_shortages$ are usually caused by insufficient availability of the $concept_good$ in the [concept_market] in question, but may also be a result of low [concept_market_access] in the relevant $concept_state$."

 concept_market: "Market"
 concept_markets: "Markets"
 concept_market_possessive: "Market’s"
 concept_market_desc: "All [Concept('concept_state', '$concept_states$')] in the same $concept_market$ will trade [Concept('concept_good', '$concept_goods$')] with each other, unless they are [Concept('concept_isolated_state','$concept_isolated_state_short$')]. How well connected these $concept_states$ are with each other is measured by their [concept_market_access]. $concept_markets$ may also trade with each other through the [concept_world_market].\n\nEach [concept_country] either controls its own $concept_market$ or participates in a different one via a [concept_customs_union] or [concept_subject] relationship. "

 concept_world_market: "World Market"
 concept_world_market_desc: "The $concept_world_market$ serves as the place to conduct autonomous [concept_trade]. The price of [Concept('concept_good', '$concept_goods$')] is determined by the number of $concept_imports$ and $concept_exports$. [Concept('concept_state', '$concept_states$')] need [concept_market_access] in order to conduct $concept_trade$ via their [GetBuildingType('building_trade_center').GetName]. Landlocked [Concept('concept_country', '$concept_countries$')] can get Transit Rights from other $concept_countries$ to secure access to the $concept_world_market$."

 concept_market_access:0 "Market Access"
 concept_market_access_desc: "A measure of how well-connected a [concept_state] is to the rest of its [concept_market]. It starts at 100% and is reduced proportionally whenever the $concept_state$'s [concept_infrastructure_usage] exceeds its [concept_infrastructure]. It impacts both how many [concept_sell_orders] and [concept_buy_orders] are generated due to the $concept_state$'s [concept_good_production] and [concept_good_consumption], and also how much the [concept_market_price] affects the [concept_local_price] of [Concept('concept_good','$concept_goods$')]."

 concept_world_market_access: "World Market Access"
 concept_world_market_access_desc: "$concept_world_market_access$ exists if a [concept_state] is connected to the [concept_world_market] via a [concept_world_market_hub]. Its value is impacted by the $concept_state_possessive$ [concept_market_access]."

 concept_world_market_hub: "World Market Hub"
 concept_world_market_hubs: "World Market Hubs"
 concept_world_market_hub_short: "Hub"
 concept_world_market_hubs_short: "Hubs"
 concept_world_market_hub_desc: "A $concept_world_market_hub$ is the place from which [concept_trade] via the [concept_world_market] is conducted. It is created if a [concept_market_area] has at least one [GetBuildingType('building_port').GetName]. The location of a $concept_world_market_hub$ can change depending on [GetBuildingType('building_port').GetName] levels and [Concept('concept_state', '$concept_state_possessive$')] [concept_gdp]."

 concept_infrastructure:0 "Infrastructure"
 concept_infrastructure_desc:2 "$concept_infrastructure$ is provided by [Concept('concept_building','$concept_buildings$')] like [SelectLocalization(GetPlayer.IsValid,'concept_infrastructure_desc_added','Railway')] and [SelectLocalization(GetPlayer.IsValid,'concept_infrastructure_desc_added_2','Port')]. It influences how well connected a [concept_state] is to its [concept_market], and how rapidly [Concept('concept_battalion', '$concept_battalions$')] [Concept('concept_mobilize_battalion','$concept_mobilize_battalion_mobilize$')]."
 concept_infrastructure_desc_added:0 "[GetBuildingType('building_railway').GetName]"
 concept_infrastructure_desc_added_2:0 "[GetBuildingType('building_port').GetName]"

 concept_infrastructure_usage:0 "Infrastructure Usage"
 concept_infrastructure_usage_desc:1 "[Concept('concept_building','$concept_buildings$')] use a certain amount of [concept_infrastructure] depending on how technologically advanced or demanding they are. The total $concept_infrastructure_usage$ in the [concept_state] is compared to the $concept_infrastructure$ to determine the $concept_state$'s [concept_market_access]. $concept_infrastructure_usage$ also increases the cost of [Concept('concept_port_connection','$concept_port_connections$')]."

 concept_good:0 "Good"
 concept_goods:0 "Goods"
 concept_good_possessive:0 "Good’s"
 concept_goods_input:0 "Input Goods"
 concept_goods_output:0 "Output Goods"
 concept_good_desc:2 "$concept_goods$ are [Concept('concept_good_production','$concept_good_produced$')] in [Concept('concept_building','$concept_buildings$')] and are [Concept('concept_good_consumption','$concept_good_consumed$')] by $concept_buildings$ and [Concept('concept_pop','$concept_pops$')]. $concept_goods$ have both a [concept_local_price] and a [concept_market_price]."

 concept_prestige_good: "Prestige Good"
 concept_prestige_good_short: "Prestige"
 concept_prestige_goods: "Prestige Goods"
 concept_prestige_good_desc: "A [concept_good] that is considered prestigious and to be of superior quality. $concept_prestige_goods$ are produced by some [Concept('concept_company','$concept_companies$')] that have a high enough [concept_prosperity]. Being a top producer of $concept_prestige_goods$ grants significant [concept_prestige].\n\nAdditionally, $concept_prestige_goods$ grant the following benefits:\n$EFFECT_LIST_BULLET$Increased [concept_good_consumption] by [Concept('concept_pop','$concept_pops$')] relative to other $concept_goods$\n$EFFECT_LIST_BULLET$Increased [concept_trade_advantage] for [Concept('concept_trade','$concept_exports$')]\n$EFFECT_LIST_BULLET$Increased [concept_throughput] for [Concept('concept_building','$concept_building_industries$')] which use them as $concept_input_goods$\n$EFFECT_LIST_BULLET$Increased [concept_offense] and [concept_defense] for [Concept('concept_unit', '$concept_units$')] that consume them as supplies"

 concept_government_good:0 "Government Good"
 concept_government_goods:1 "Government Goods"
 concept_government_good_desc:1 "[Concept('concept_good', '$concept_goods$')] [Concept('concept_good_consumption','$concept_good_consumed$')] by [Concept('concept_government_building', '$concept_government_buildings$')] using funds from the [concept_treasury]."

 concept_military_good:0 "Military Good"
 concept_military_goods:1 "Military Goods"
 concept_military_good_desc:1 "[Concept('concept_good', '$concept_goods$')] [Concept('concept_good_consumption','$concept_good_consumed$')] by [Concept('concept_military_building', '$concept_military_buildings$')] using funds from the [concept_treasury]."

 concept_state:0 "State"
 concept_states:0 "States"
 concept_state_or_states:0 "State(s)"
 concept_state_possessive:1 "State’s"
 concept_state_desc:2 "A geographic region controlled by a [concept_country]. [Concept('concept_pop', '$concept_pops$')] live and work in the [Concept('concept_building', '$concept_buildings$')] in the $concept_state$. Unless it is a [concept_split_state] its territory is equivalent to a [concept_state_region]. Unless it is [Concept('concept_isolated_state', '$concept_isolated_state_short$')], it will trade any [Concept('concept_good','$concept_goods$')] locally [Concept('concept_good_consumption','$concept_good_consumed$')] and [Concept('concept_good_production','$concept_good_produced$')] with other $concept_states$ in the same [concept_market] in to a degree based on its [concept_market_access]."

 concept_home_state: "Home State"
 concept_home_state_desc: "A [Concept('concept_character','$concept_character_possessive$')] $concept_home_state$ is the [concept_state] that they originate from. This is usually, but not always, a part of the [concept_country] the $concept_character$ lives in. [Concept('concept_magnate','$concept_magnates$')] $concept_magnate_holding_desc$."

 concept_pop:0 "Pop"
 concept_pops:0 "Pops"
 concept_pop_possessive:1 "Pop’s"
 concept_pops_possessive:0 "Pops’"
 concept_population:0 "Population"
 concept_pop_desc:3 "The world's population are organized into $concept_pops$, groups of individuals who work in the same [concept_building] as a certain [concept_profession], and share the same [concept_culture] and [concept_religion]. They use the [Concept('concept_pop_income','$concept_pop_income_short$')] they earn to buy [Concept('concept_good', '$concept_goods$')] to satisfy their [Concept('concept_pop_needs','$concept_pop_needs_short$')], which decides their [concept_wealth] and [concept_sol]. They can support [Concept('concept_interest_group', '$concept_interest_groups$')] and [Concept('concept_political_movement','$concept_political_movements$')], or be [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')]. A $concept_pop$ has a number of [concept_working_adults] and a number of [concept_dependents]. Some number of them are [Concept('concept_literacy','$concept_literate$')], and they might have a number of either [Concept('concept_loyalist','$concept_loyalists$')] or [Concept('concept_radical','$concept_radicals$')]."

 concept_profession:0 "Profession"
 concept_profession_jobs:0 "Jobs"
 concept_professions:0 "Professions"
 concept_profession_desc:2 "A [Concept('concept_pop','$concept_pop_possessive$')] $concept_profession$ determines which role they perform in their [concept_building], how large of a [concept_building_wage] they collect from it, and whether or not they get [Concept('concept_ownership_share','$concept_ownership_shares$')] in it. It also impacts which [Concept('concept_interest_group','$concept_interest_group$')] they're likely to support, how likely they are to remain [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')], and whether they are considered [concept_lower_strata], [concept_middle_strata], or [concept_upper_strata]. To switch $concept_professions$, a $concept_pop$ must have the appropriate [concept_pop_qualifications]."

 concept_production_method:0 "Production Method"
 concept_production_methods:0 "Production Methods"
 concept_production_method_desc:3 "$concept_production_methods$ determine how [Concept('concept_building','$concept_buildings$')] operate. They impact\n\n- The [Concept('concept_good_consumption','$concept_input_goods$')] the $concept_building$ must purchase to operate\n- The [Concept('concept_good_production','$concept_output_goods$')] the $concept_building$ produces and sells\n- The distribution of [Concept('concept_profession','$concept_professions$')] among its [concept_workforce]\n\n$concept_production_methods$ can also have other effects, such as the generation of [Concept('concept_modifier','$concept_modifiers$')]. $concept_production_methods$ are organized in groups, in which only one can be active at a time. You can switch which $concept_production_method$ is active in each group as long as you meet the [concept_technology] and [concept_law] requirement for it."

 concept_nation_formation:0 "Nation Formation"
 concept_nation_formations: "Nation Formations"
 concept_nation_formation_short_past: "Formed"
 concept_nation_formation_short_present: "Form"
 concept_nation_formation_desc:1 "If a [concept_country] meets certain requirements, such as owning land in specific [Concept('concept_state_region','$concept_state_regions$')] and/or having discovered a certain $SOCIETY$ [concept_technology], they may be able to form a new $concept_country$ of a higher [concept_country_tier]. The possible $concept_countries$ are listed in the #b $NATION_FORMATION$#! tab in the #b Journal#! panel."

 concept_culture:0 "Culture"
 concept_cultures:1 "Cultures"
 concept_culture_possessive:1 "Culture’s"
 concept_cultural: "Cultural"
 concept_culture_desc:2 "All [Concept('concept_pop', '$concept_pops$')] have a $concept_culture$, which can only change through [concept_assimilation]. Their $concept_culture$ determines which [Concept('concept_state_region','$concept_state_regions$')] they consider their [Concept('concept_homeland','$concept_homelands$')] and affects their [concept_acceptance_status] in their [concept_country]."

 concept_accepted_culture:0 "Accepted Culture"
 concept_accepted_cultures:0 "Accepted Cultures"
 concept_accepted_culture_short:0 "Accepted"
 concept_accepted_culture_desc:2 "A [Concept('concept_country','$concept_country_possessive$')] $concept_accepted_cultures$ consist of its [concept_primary_cultures], plus any other [Concept('concept_culture','$concept_cultures$')] considered $concept_accepted_culture_short$ due to the $concept_country$'s current [SelectLocalization(GetPlayer.IsValid, 'concept_accepted_culture_desc_added','Citizenship')] [concept_law]. Usually, the two highest statuses of [concept_acceptance] are considered to be $concept_accepted_culture_short$."
 concept_accepted_culture_desc_added:0 " [GetLawType('law_national_supremacy').GetGroup.GetName]"

 concept_primary_cultures:0 "Primary Cultures"
 concept_primary_culture:0 "Primary Culture"
 concept_primary_cultures_desc:4 "The [concept_culture] or $concept_cultures$ a [Concept('concept_country','$concept_country_nation_state$')] is primarily associated with. If a $concept_country$ [Concept('concept_nation_formation','forms a different')] $concept_country$ its $concept_primary_cultures$ may change, but will otherwise remain the same.[ConcatIfNeitherEmpty('\n\n', AddLocalizationIf(GetPlayer.IsValid,'concept_primary_cultures_ingame_added'))]"
 concept_primary_cultures_ingame_added:1 "The $concept_primary_cultures$ in [GetPlayer.GetName] are [GetPlayer.GetPrimaryCulturesDesc]."

 concept_discrimination_trait: "Discrimination Trait"
 concept_discrimination_traits: "Discrimination Traits"
 concept_discrimination_trait_short: "Trait"
 concept_discrimination_traits_short: "Traits"
 concept_cultural_trait: "Cultural Trait"
 concept_cultural_traits: "Cultural Traits"
 concept_religious_trait: "Religious Trait"
 concept_religious_traits: "Religious Traits"
 concept_discrimination_trait_desc: "Aspects of a [concept_culture] or [concept_religion] that determine how [Concept('concept_acceptance_status','$concept_accepted_status_short$')] [Concept('concept_pop', '$concept_pops$')] of that $concept_culture$ or $concept_religion$ are depending on how similar they are to the $concept_country$'s [Concept('concept_primary_cultures','$concept_primary_culture$')] and [concept_state_religion] and what [GetLawType('law_national_supremacy').GetGroup.GetName] [concept_law] the $concept_country$ currently has.\n\nFor a $concept_culture$, these aspects are its [Concept('concept_heritage_trait','$concept_heritage_trait_short$')], [Concept('concept_language_trait','$concept_language_trait_short$')] and any [Concept('concept_tradition_trait','$concept_tradition_traits_short$')] it might have. A $concept_religion$ only has a $concept_heritage_trait$.\n\n$concept_heritage_trait_short$ and $concept_language_traits$ also belong to broader [Concept('concept_discrimination_trait_group','$concept_discrimination_trait_groups_short_short$')] of similar $concept_discrimination_traits_short$."

 concept_discrimination_trait_group: "Discrimination Trait Group"
 concept_discrimination_trait_groups: "Discrimination Trait Groups"
 concept_discrimination_trait_group_short: "Trait Group"
 concept_discrimination_trait_groups_short: "Trait Groups"
 concept_discrimination_trait_group_short_short: "Group"
 concept_discrimination_trait_groups_short_short: "Groups"
 concept_discrimination_trait_group_desc: "A $concept_discrimination_trait_group$ is a broader collection of [Concept('concept_discrimination_trait','$concept_discrimination_traits$')] that share a common origin somehow, making them more recognizable to and accepted by [Concept('concept_pop', '$concept_pops$')] of the same $concept_discrimination_trait_group_short$."

 concept_heritage_trait: "Heritage Trait"
 concept_heritage_traits: "Heritage Traits"
 concept_heritage_trait_short: "Heritage"
 concept_heritage_traits_short: "Heritages"
 concept_heritage_trait_group: "Heritage Trait Group"
 concept_heritage_trait_groups: "Heritage Trait Groups"
 concept_heritage_trait_group_short: "Heritage Group"
 concept_heritage_trait_groups_short: "Heritage Groups"
 concept_heritage_trait_desc: "$concept_heritage_trait_short$ [Concept('concept_discrimination_trait','$concept_discrimination_traits_short$')] represent the ancestry or foundation of a [concept_culture] or [concept_religion]. They also belong to a [Concept('concept_discrimination_trait_group','$concept_discrimination_trait_group_short$')], a broader family of similar $concept_heritage_traits_short$."

 concept_language_trait: "Language Trait"
 concept_language_traits: "Language Traits"
 concept_language_trait_short: "Language"
 concept_language_traits_short: "Languages"
 concept_language_trait_group: "Language Trait Group"
 concept_language_trait_groups: "Language Trait Groups"
 concept_language_trait_group_short: "Language Group"
 concept_language_trait_groups_short: "Language Groups"
 concept_language_trait_desc: "$concept_language_trait_short$ [Concept('concept_discrimination_trait','$concept_discrimination_traits_short$')] represent $concept_language_traits_short$ deeply associated with a [concept_culture]. They also belong to a [Concept('concept_discrimination_trait_group','$concept_discrimination_trait_group_short$')], a broader family of similar $concept_language_traits_short$."

 concept_tradition_trait: "Tradition Trait"
 concept_tradition_traits: "Tradition Traits"
 concept_tradition_trait_short: "Tradition"
 concept_tradition_traits_short: "Traditions"
 concept_tradition_trait_desc: "$concept_tradition_trait_short$ [Concept('concept_discrimination_trait','$concept_discrimination_traits_short$')] are rites, ideas and customs that [Concept('concept_culture','$concept_cultures$')] might hold or pick up on over time that can be recognizable despite very distinct [Concept('concept_heritage_trait','$concept_heritage_traits_short$')] or [Concept('concept_language_trait','$concept_language_traits_short$')]. Contrary to [Concept('concept_heritage_trait','$concept_heritage_trait_short$')] and [Concept('concept_language_trait','$concept_language_traits$')], $concept_tradition_traits_short$ do not belong to any [Concept('concept_discrimination_trait_group','$concept_discrimination_trait_group_short$')]."

 concept_religion:0 "Religion"
 concept_religions:1 "Religions"
 concept_religious: "Religious"
 concept_religion_desc:1 "All [Concept('concept_pop', '$concept_pops$')] have a $concept_religion$, which can only change through [concept_conversion]. Their $concept_religion$ affects their [concept_acceptance_status] in their [concept_country]."

 concept_accepted_religion:0 "Accepted Religion"
 concept_accepted_religions:0 "Accepted Religions"
 concept_accepted_religion_short:0 "Accepted"
 concept_accepted_religion_desc:2 "A [Concept('concept_country','$concept_country_possessive$')] $concept_accepted_religions$ consist of its [concept_state_religion], plus any other [Concept('concept_religion','$concept_religions$')] considered $concept_accepted_religion_short$ due to the $concept_country$'s current [SelectLocalization(GetPlayer.IsValid,'concept_accepted_religion_desc_added','Church and State')] [concept_law]."
 concept_accepted_religion_desc_added:0 "[GetLawType('law_state_religion').GetGroup.GetName]"

 concept_state_religion:0 "State Religion"
 concept_state_religions: "State Religions"
 concept_state_religion_desc:2 "The [concept_religion] most associated with a [concept_country]. It is typically the dominant [concept_religion] adhered to by most of its [Concept('concept_pop', '$concept_pops$')], but can sometimes be legally declared or simply the $concept_religion$ preferred by its [concept_ruler]. It does not typically change.[AddLocalizationIf(GetPlayer.IsValid, 'concept_state_religion_ingame_added')]"
 concept_state_religion_ingame_added:2 "\n\nThe $concept_state_religion$ in [GetPlayer.GetName] is [GetPlayer.GetStateReligion.GetName]."

 concept_investment_pool:0 "Investment Pool"
 concept_investment_pool_desc:6 "[concept_reinvestment] from [Concept('concept_pop','$concept_pops$')] with [concept_privately_owned] [Concept('concept_building','$concept_buildings$')] is deposited into the $concept_investment_pool$, where $concept_pops$ use it for [concept_private_construction] and purchasing [Concept('concept_building_level','$concept_building_levels$')] marked for [Concept('concept_privatize', '$concept_privatization$')].\n\nUsually, $ARISTOCRATS_GC_LINK$ and $CAPITALISTS_GC_LINK$ in $MANOR_HOUSES_GC_LINK$ and $FINANCIAL_DISTRICTS_GC_LINK$ use the $concept_investment_pool$, but depending on your $ECONOMIC_SYSTEM_GC_LINK$, the [concept_workforce] can use it to expand their own $concept_building$.\n\nA [Concept('concept_country','$concept_country_possessive$')] $ECONOMIC_SYSTEM_GC_LINK$ restricts which $concept_buildings$ can be built using the $concept_investment_pool$.\n\nAs $concept_construction$ of such $concept_buildings$ take place, the funds required to build them are deducted from the $concept_investment_pool$ and deposited in the [concept_treasury] as an [concept_budget_investment_income]."

 concept_reinvestment:0 "Reinvestment"
 concept_reinvestment_desc:1 "A portion of the [concept_dividends] collected by certain [Concept('concept_profession','$concept_professions$')] is reinvested into the economy, adding [concept_money] to the [concept_investment_pool]. The amount added depends on factors such as the [Concept('concept_country','$concept_country_possessive$')] current $ECONOMIC_SYSTEM_GC_LINK$ as well as its [concept_gdp], with inefficiencies in large economies resulting in some of the investment being wasted."


 concept_pop_income:0 "Pop Income"
 concept_pop_income_short:0 "Income"
 concept_pop_income_expenses:0 "Pop Expenses"
 concept_pop_income_expenses_short:0 "Expenses"
 concept_pop_income_desc:0 "At the end of each week, [Concept('concept_pop','$concept_pops$')] receive an $concept_pop_income_short$ based on the size of their [concept_workforce] and the current [concept_building_wage] offered to them, plus the size of their [concept_dependents] and the amount of [concept_dependent_income] they collect. This $concept_pop_income_short$ is spent on [concept_pop_needs] which impact the $concept_pop$'s [concept_wealth]."

 concept_dependent_income:0 "Dependent Income"
 concept_dependent_income_desc:1 "At the end of each week, [Concept('concept_pop','$concept_pops$')] receive a $concept_dependent_income$ based on their number of [concept_dependents] and the amount of income they qualify for. Most $concept_dependents$ receive a base amount from odd jobs depending on the $concept_pop$'s [concept_profession], which can be supplemented by the [SelectLocalization(GetPlayer.IsValid,'concept_dependent_income_desc_added','Social Security')] [concept_institution]."
 concept_dependent_income_desc_added:0 "[GetInstitutionType('institution_social_security').GetName]"

 concept_wealth:0 "Wealth"
 concept_wealthy:0 "Wealthy"
 concept_wealth_desc:1 "A measure of a [Concept('concept_pop','$concept_pop_possessive$')] material assets. To sustain a certain level of $concept_wealth$ the $concept_pop$ has a set of [Concept('concept_pop_needs','$concept_pop_needs_short$')] it must satisfy each week. If their [Concept('concept_pop_income','$concept_pop_income_short$')] does not cover the cost of these $concept_pop_needs_short$, their $concept_wealth$ will eventually decrease. If they have [concept_money] left over after purchasing the necessary $concept_goods$, $concept_wealth$ will soon increase.\n\n$concept_wealth$ is the main factor contributing to a $concept_pop$'s [concept_sol], and under certain [Concept('concept_law','$concept_laws$')] it may affect other aspects of their life such as [concept_literacy] and [Concept('concept_votes','$concept_voting_rights$')]."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED APRIL 27, 2022

 concept_innovation:2 "Innovation"
 concept_innovation_desc:3 "@innovation!$concept_innovation$ is produced by [SelectLocalization(GetPlayer.IsValid,'concept_innovation_desc_added','University')] $concept_buildings$ and contributes to active research progress for [Concept('concept_technology', '$concept_technologies$')]. Unspent @innovation!$concept_innovation$ will increase the [concept_technology_spread] you're currently benefiting from, if any."
 concept_innovation_desc_added:0 "[GetBuildingType('building_university').GetName]"

 concept_technology_spread:0 "Technology Spread"
 concept_technology_spread_desc:2 "One [concept_technology] that you have not yet acquired from each category ($PRODUCTION_NO_CONCEPT$, $MILITARY$, and $SOCIETY$) is always spreading to you from [Concept('concept_country','$concept_countries$')] that have acquired them. The progress you get in spreading $concept_technologies$ is randomized each week around a base value depending on your $concept_country$'s [concept_literacy]. If no $concept_country$ has invented a certain $concept_technology$ yet it cannot spread to you, so you are more likely to acquire early [Concept('concept_technology_era','$concept_technology_era_short$')] $concept_technologies$ from $concept_technology_spread$ than later ones."

 concept_technology_era:0 "Technology Era"
 concept_technology_era_short:0 "Era"
 concept_technology_eras_short:0 "Eras"
 concept_technology_era_ahead_of_time_penalty_desc:0 "If you have not yet acquired all $concept_technologies$ from previous $concept_technology_eras_short$, the amount required will increase further."
 concept_technology_era_desc:1 "[concept_technology] $concept_technology_eras_short$ are a rough classification of which time period a certain idea was first discovered or developed.\n\n$concept_technology_era_short$ I inventions were well-known in many parts of the world prior to 1836.\n$concept_technology_era_short$ II inventions are associated with the First Industrial Revolution (1836 to mid-19th century).\n$concept_technology_era_short$ III is a period of evolution, stabilization, and standardization that runs until late 19th century.\n$concept_technology_era_short$ IV corresponds with the Second Industrial Revolution around the turn of the century.\n$concept_technology_era_short$ V inventions are transformative, modern ideas.\n\n$concept_technologies$ require more [concept_innovation] to discover the later $concept_technology_era_short$ it appears in. $concept_technology_era_ahead_of_time_penalty_desc$"

 concept_technology:0 "Technology"
 concept_technologies:0 "Technologies"
 concept_technology_desc:3 "$concept_technology$ covers all innovation in the fields of $PRODUCTION_NO_CONCEPT$, $MILITARY$, and $SOCIETY$. $concept_technologies$ have nation-wide effects, which can range from changing the [Concept('concept_country','$concept_country_possessive$')] operating parameters via [Concept('concept_modifier','$concept_modifiers$')] to unlocking new [Concept('concept_production_method','$concept_production_methods$')], [Concept('concept_building','$concept_buildings$')], [Concept('concept_law','$concept_laws$')], [Concept('concept_decree','$concept_decrees$')], and [Concept('concept_diplomatic_pact','$concept_diplomatic_pacts$')].\n\nProgress is made towards new $concept_technologies$ through [concept_innovation], which is primarily produced by [SelectLocalization(GetPlayer.IsValid,'concept_technology_desc_added','University')] $concept_buildings$. In addition to progress from $concept_innovation$, $concept_technologies$ may propagate from $concept_countries$ who already have them to those who do not via [concept_technology_spread].\n\nThe amount of progress required in a $concept_technology$ to acquire it depends on its [Concept('concept_technology_era','$concept_technology_era_short$')]. $concept_technology_era_ahead_of_time_penalty_desc$"
 concept_technology_desc_added:0 " [GetBuildingType('building_university').GetName]"

 concept_canal:0 "Canal"
 concept_canals:1 "Canals"
 concept_canal_desc:1 "A $concept_canal$ is a [concept_building] that also includes the construction of an artificial connection between two sea nodes across a landmass. $concept_canals$ can only be constructed in particular places and typically require the completion of some sort of survey or other expedition first. $concept_canals$ can drastically shorten the distance [GetGoods('merchant_marine').GetName] need to travel when establishing [Concept('concept_shipping_lane','$concept_shipping_lanes$')], making trade with distant lands more affordable."

 concept_monument:0 "Monument"
 concept_monuments:1 "Monuments"
 concept_monument_desc:1 "[Concept('concept_building','$concept_buildings$')] unique to a certain [concept_state] that can perform a variety of functions, often conferring [concept_prestige]."

 concept_productivity:1 "Productivity"
 concept_productivity_long:0 "Yearly Productivity / Employee"
 concept_productive:0 "Productive"
 concept_unproductive:0 "Unproductive"
 concept_productivity_desc:2 "$concept_productivity$ is a relative measure of how much economic value a [concept_building] generates per employee per year. It is calculated by taking the current weekly [concept_revenue] generated from [concept_good_production], subtracting the expenses incurred from [concept_good_consumption], dividing by the total [concept_workforce], and multiplying by 52 (weeks / year).\n\n( Revenue - Material Expenses ) / Total Employees\n\nThe difference between $concept_productivity$ and [concept_average_wage] is the $concept_building$'s weekly [concept_building_balance], also known as $concept_building_balance_profit$.\n\n$COMPANIES$ also have a $concept_productivity$ rating, which is equal to the average $concept_productivity$ of all their associated $concept_building$ levels."

 concept_law_group:1 "Law Group"
 concept_law_groups: "Law Groups"
 concept_law_group_desc:3 "A $concept_law_group$ contains several [Concept('concept_law', '$concept_laws$')] that affect aspects of the [concept_country] in different ways. Each $concept_law_group$ can only have one $concept_law$ active at a time."

 concept_government_reform:0 "Government Reform"
 concept_government_reform_short:0 "Reform"
 concept_government_reform_desc:0 "During a $concept_government_reform$ you may alter the composition of your [concept_government] freely by granting or removing [Concept('concept_interest_group','$concept_interest_groups$')] and/or [Concept('concept_party','$concept_parties$')] from power. $concept_interest_groups$ removed from power during such a $concept_government_reform_short$ will gain [Concept('concept_radical','$concept_radicals$')], unless the $concept_government_reform_short$ is performed shortly after a concluded $concept_election$."

 concept_election:0 "Election"
 concept_elections:0 "Elections"
 concept_election_possessive:0 "Election’s"
 concept_election_voting_franchise:0 "Voting Franchise"
 concept_elect:0 "Elect"
 concept_elected:0 "Elected"
 concept_election_desc:2 "[Concept('concept_country','$concept_countries$')] with a $concept_election_voting_franchise$ will hold $concept_elections$ every #v [GetDefine('NPolitics','ELECTION_INTERVAL_YEARS')|0] years#!. An $concept_election$ campaign period will commence #v [GetDefine('NPolitics','CAMPAIGN_PERIOD_MONTHS')|0] months#! prior to the date, during which [Concept('concept_party','$concept_parties$')] will vie for [concept_momentum] and [concept_votes].\n\nOn $concept_election$ day the final $concept_votes$ will be tallied, which will affect the [concept_political_strength] of the member [Concept('concept_interest_group','$concept_interest_groups$')] of each $concept_party$. Under certain [Concept('concept_government_type','$concept_government_types$')] a new [concept_head_of_state] may also be selected as a result of the $concept_election$'s outcome. Finally, a single [concept_government_reform] may be performed where any $concept_interest_groups$ may be removed from [concept_government] without generating any new [Concept('concept_radical','$concept_radicals$')]."

 concept_budget_minting:0 "Minting"
 concept_budget_minted:0 "Minted"
 concept_budget_minting_desc:2 "A form of income that all [Concept('concept_country', '$concept_countries$')] generate through the printing or casting of new [concept_money]. The greater a [Concept('concept_country','$concept_country_possessive$')] [concept_gdp], the more $concept_money$ can be $concept_budget_minted$ without compromising the economy."

 concept_budget_poll_taxes:0 "Poll Taxes"
 concept_budget_poll_tax:1 "Poll Tax"
 concept_budget_poll_taxes_desc:2 "A flat [Concept('concept_taxes','$concept_tax$')] collected on every [Concept('concept_working_adults', '$concept_working_adult$')] it applies to. Since $concept_budget_poll_taxes$ do not scale with the $concept_pop$'s income it tends to impact the [concept_lower_strata] the most."

 concept_budget_land_taxes:0 "Land Taxes"
 concept_budget_land_taxes_desc:4 "A type of [Concept('concept_budget_poll_taxes', '$concept_budget_poll_tax$')] collected from [SelectLocalization(GetPlayer.IsValid,'concept_budget_land_taxes_desc_added','Peasants')] and [SelectLocalization(GetPlayer.IsValid,'concept_budget_land_taxes_desc_farmers','Farmers')] employed in agricultural [Concept('concept_building','$concept_buildings$')]. $concept_pops$ that pay $concept_budget_land_taxes$ do not pay [concept_budget_per_capita_taxes]."
 concept_budget_land_taxes_desc_added:0 "[GetPopType('peasants').GetName]"
 concept_budget_land_taxes_desc_farmers: "[GetPopType('farmers').GetName]"

 concept_budget_heathen_taxes:0 "Heathen Taxes"
 concept_budget_heathen_taxes_desc:1 "A type of [Concept('concept_budget_poll_taxes', '$concept_budget_poll_tax$')] collected from all [Concept('concept_pop', '$concept_pops$')] whose [concept_religion] have low [concept_acceptance] ín their [concept_country]."

 concept_budget_per_capita_taxes:0 "Per Capita Taxes"
 concept_budget_per_capita_taxes_desc:4 "A type of [Concept('concept_budget_poll_taxes', '$concept_budget_poll_tax$')] collected from all [Concept('concept_pop', '$concept_pops$')] except [SelectLocalization(GetPlayer.IsValid,'concept_budget_per_capita_taxes_desc_added','Peasants')]."
 concept_budget_per_capita_taxes_desc_added:0 "[GetPopType('peasants').GetName]"

 concept_budget_income_taxes:0 "Income Taxes"
 concept_budget_income_taxes_desc:1 "A [Concept('concept_taxes','$concept_tax$')] collected on the [Concept('concept_building_wage','$concept_building_wages$')] paid to the [concept_workforce]."

 concept_budget_investment_income:1 "Investment Pool Transfer"
 concept_budget_investment_income_desc:2 "When [concept_money] from the [concept_treasury] is used in the [concept_construction] of [Concept('concept_building','$concept_buildings$')] that may be funded by the [concept_investment_pool] under the [Concept('concept_country','$concept_country_possessive$')] current $ECONOMIC_SYSTEM_GC_LINK$, the $concept_treasury$ is compensated by an equal transfer of funds from the $concept_investment_pool$."

 concept_budget_consumption_taxes:0 "Consumption Taxes"
 concept_budget_consumption_tax:0 "Consumption Tax"
 concept_budget_consumption_tax_rate:0 "$concept_budget_consumption_tax$ Rate"
 concept_budget_consumption_taxes_desc:2 "A [Concept('concept_taxes','$concept_tax$')] collected on the [Concept('concept_good_consumption','$concept_good_consumption$')] of [Concept('concept_good','$concept_goods$')]. $concept_goods$ subject to $concept_budget_consumption_taxes$ will have its [concept_market_price] increased by the $concept_budget_consumption_tax_rate$, and whenever [Concept('concept_pop','$concept_pops$')] buy it this increase will be collected by the [concept_treasury]. [Concept('concept_building','$concept_buildings$')] are exempt from paying $concept_budget_consumption_taxes$."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED APRIL 26, 2022

 concept_budget_dividends_taxes:0 "Dividends Taxes"
 concept_budget_dividends_taxes_desc:1 "A [Concept('concept_taxes','$concept_tax$')] applied to the [concept_dividends] earned by [Concept('concept_pop','$concept_pops$')] with [concept_privately_owned] [Concept('concept_building','$concept_buildings$')]."

 concept_taxes:0 "Taxes"
 concept_tax:0 "Tax"
 concept_taxing:0 "Taxing"
 concept_taxation:0 "Taxation"
 concept_tax_rate:0 "Tax Rate"
 concept_tax_level:0 "Taxation Level"
 concept_tax_revenue: "Taxation Revenue"
 concept_taxes_desc:1 "[Concept('concept_country', '$concept_countries$')] can tap into their market economies in various ways. The most common is to tax its populace's private sector incomes, or charge duties on the sales, purchase, or trade of [Concept('concept_good', '$concept_goods$')]."

 concept_unrealized_taxes:0 "Unrealized Taxes"
 concept_unrealized_taxes_desc:0 "Unrealized Taxes is the amount of [concept_taxes] that the [concept_country] is failing to collect due to various reasons, including but not limited to insufficient [concept_tax_capacity] and [concept_tax_waste]."

 concept_budget_additional_income:0 "Additional Income"
 concept_budget_additional_income_desc:2 "Income that doesn't fit into another category, often gained from the outcome of special events."

 concept_budget_additional_expenses:0 "Additional Expenses"
 concept_budget_additional_expenses_desc:2 "Expenses that don't fit into another category, often incurred due to the outcome of special events."

 concept_budget_diplomatic_pacts: "Diplomatic Pacts"
 concept_budget_diplomatic_pacts_desc: "[concept_money] collected from or remitted to the other [concept_country] in a [concept_diplomatic_pact]."

 concept_budget_treaties: "Treaties"
 concept_budget_treaties_desc: "[concept_money] collected from or remitted to the other [concept_country] in a [concept_treaty]."

 concept_budget_power_bloc: "Power Bloc Budget"
 concept_budget_power_bloc_desc: "[concept_money] collected from a [concept_power_bloc_member] or remitted to the [concept_power_bloc_leader]"

 concept_piracy: "Piracy"
 concept_pirated: "Pirated"
 concept_piracy_desc: "[concept_money] collected from the proactive redistribution of [Concept('concept_good','$concept_goods$')] on the high seas by Piracy or Privateer [Concept('concept_naval_mission', '$concept_naval_missions$')]."

 concept_construction:2 "Construction"
 concept_constructions: "Constructions"
 concept_construct:0 "Construct"
 concept_constructed: "Constructed"
 concept_construction_desc:3 "@construction! $concept_construction$ is produced by the [SelectLocalization(GetPlayer.IsValid,'concept_construction_desc_added','Construction Sector')] and is used to construct [Concept('concept_building', '$concept_buildings$')]."
 concept_construction_desc_added:0 "[GetBuildingType('building_construction_sector').GetName]"

 concept_budget_construction_goods:0 "Construction Goods"
 concept_budget_construction_goods_desc:2 "[Concept('concept_good','$concept_goods$')] [Concept('concept_good_consumption','$concept_good_consumed$')] by [SelectLocalization(GetPlayer.IsValid,'concept_budget_construction_goods_desc_added','Construction Sector')] [Concept('concept_building','$concept_buildings$')] in order to [Concept('concept_construction','$concept_construct$')] new $concept_buildings$."
 concept_budget_construction_goods_desc_added:0 "[GetBuildingType('building_construction_sector').GetName]"

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED APRIL 25, 2022

 concept_budget_government_wages:0 "Government Wages"
 concept_budget_government_wages_desc:1 "[Concept('concept_building_wage','$concept_building_wages$')] paid to [Concept('concept_pop','$concept_pops$')] by [Concept('concept_government_building','$concept_government_buildings$')]. The rate is based on the [Concept('concept_country','$concept_country_possessive$')] [concept_normal_wage]. You can adjust it up and down in the $BUDGET_PANEL_TITLE$ panel."

 concept_budget_wages:0 "Wages"
 concept_budget_wage:0 "Wage"
 concept_budget_wages_desc:1 "[Concept('concept_pop','$concept_pops$')] in the employ of a [Concept('concept_country', '$concept_country_possessive$')] [Concept('concept_government_building','$concept_government_buildings$')] and [Concept('concept_military_building','$concept_military_buildings$')] get paid $concept_budget_wages$ from the [concept_treasury] each week, according to the [concept_government_wage] and [concept_military_wage] respectively."

 concept_budget_goods_for_government_buildings:1 "$concept_goods$ for $concept_government_buildings$"
 concept_budget_goods_for_government_buildings_desc:1 "[Concept('concept_good','$concept_goods$')] [Concept('concept_good_consumption','$concept_good_consumed$')] by a [Concept('concept_country','$concept_country_possessive$')] [Concept('concept_government_building','$concept_government_buildings$')]."

 concept_budget_government_slaves:0 "Government Slaves"
 concept_budget_government_slaves_desc:2 "The upkeep of [Concept('concept_slavery','$concept_slaves$')] laboring directly for a [Concept('concept_country','$concept_country_possessive$')] government."

 concept_budget_military_wages:2 "Military $concept_building_wages$"
 concept_budget_military_wages_desc:1 "[Concept('concept_building_wage','$concept_building_wages$')] paid to [Concept('concept_pop','$concept_pops$')] by [Concept('concept_military_building','$concept_military_buildings$')]. The rate is based on the [Concept('concept_country','$concept_country_possessive$')] [concept_normal_wage]. You can adjust it up and down in the $BUDGET_PANEL_TITLE$ panel."

 concept_budget_goods_for_military_upkeep: "$concept_goods$ for Military Upkeep"
 concept_budget_goods_for_military_upkeep_desc: "[Concept('concept_good','$concept_goods$')] [Concept('concept_good_consumption','$concept_good_consumed$')] by [Concept('concept_military_building','$concept_military_buildings$')] and [concept_ship] upkeep."

 concept_slavery:2 "Slavery"
 concept_slaves:1 "Slaves"
 concept_enslaved:2 "Enslaved"
 concept_slavery_desc:3 "A practice where one person is permitted legal ownership over another. [SelectLocalization(GetPlayer.IsValid,'concept_slavery_desc_added', 'Slaves')] will be substituted for other [Concept('concept_pop','$concept_pops$')] in different [concept_building] types based on the [Concept('concept_country','$concept_country_possessive$')] [Concept('concept_law','$concept_laws$')]. $concept_laws$ also determine how existing $concept_pops$ become $concept_enslaved$ and how $concept_slaves$ are uprooted and transported to the $concept_country$."
 concept_slavery_desc_added:0 "[GetPopType('slaves').GetName]"

 concept_budget_military_slaves:0 "Military Slaves"
 concept_budget_military_slaves_desc:3 "The upkeep of [Concept('concept_slavery','$concept_slaves$')] in the service of a [Concept('concept_country','$concept_country_possessive$')] military."

 concept_good_production:0 "Production"
 concept_good_produced:0 "Produced"
 concept_good_produce:1 "Produce"
 concept_good_produces:0 "Produces"
 concept_output_goods:0 "Output Goods"
 concept_good_production_desc:1 "The amount of a [concept_good] produced by a [concept_building] to be sold for [concept_revenue]."

 concept_good_consumption:0 "Consumption"
 concept_good_consumed:0 "Consumed"
 concept_good_consumes: "Consumes"
 concept_input_goods:0 "Input Goods"
 concept_good_consumption_desc:1 "The amount of a [concept_good] consumed by a [concept_building] or [concept_pop] in the process of maintaining its [concept_throughput] or [concept_wealth]."

 concept_subsidies:0 "Subsidies"
 concept_subsidize:1 "Subsidize"
 concept_subsidized:1 "Subsidized"
 concept_subsidizing:1 "Subsidizing"
 concept_subsidies_desc:2 "A $concept_subsidized$ [concept_building] is guaranteed by the [Concept('concept_country','$concept_country_possessive$')] [concept_government] to be funded enough to always by able to pay at least the [concept_subsidized_wage]. If the building cannot pay its employees according to this rate or higher, and/or if its cost of buying [Concept('concept_good_consumption','$concept_input_goods$')] exceeds its [concept_revenue] from selling [Concept('concept_good_production','$concept_output_goods$')], the [concept_treasury] will cover the difference. This guarantees the $concept_building$ can hire as many employees as it wants in order to maximize [concept_throughput] without concern for how financially viable that is."

 concept_budget_interest:0 "Interest"
 concept_budget_interest_rate:0 "Interest Rate"
 concept_budget_interest_rates:1 "Interest Rates"
 concept_budget_interest_desc:0 "The $concept_budget_interest$ paid by a [concept_country] on its [concept_loans]. It is calculated by multiplying the [concept_principal] with the annual $concept_budget_interest_rate$.\n\n$concept_budget_interest$ is payed out to the [Concept('concept_pop','$concept_pops$')] whose [concept_privately_owned] [concept_cash_reserves] are the basis for the $concept_loans$. [concept_nationally_owned] [Concept('concept_building','$concept_buildings$')] instead provide less [concept_government_dividends].\n\nThe $concept_budget_interest_rate$ paid is affected primarily by [concept_technology]."

 concept_country_tier:0 "Country Tier"
 concept_country_tier_short:0 "Tier"
 concept_country_tier_possessive:1 "$concept_country_possessive$ $concept_country_tier_short$"
 concept_country_tier_desc:3 "A [Concept('concept_country','$concept_country_possessive$')] $concept_country_tier_short$ is the inherent status and [concept_prestige] it is granted based on its history and significance. Forming a new $concept_country$ is only possible if its $concept_country_tier_short$ is higher than the $concept_country$'s current one."

 concept_claim:0 "Claim"
 concept_claims:1 "Claims"
 concept_claimed:1 "Claimed"
 concept_claim_desc:1 "A territorial $concept_claim$ that a [concept_country] has on a [concept_state_region], usually because it once belonged to them. Having a $concept_claim$ permits use of the #v $war_goal_return_state_type_name$#! [concept_war_goal] which does not generate as much [concept_infamy] as the #v $war_goal_conquer_state_type_name$#! $concept_war_goal$ does.\n\nConquering an [concept_incorporated_state] will give the previous owner a $concept_claim$ on the $concept_state_region$."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED APRIL 22, 2022

 concept_devastation:0 "Devastation"
 concept_pollution_impact: "Pollution Impact"
 concept_pollution_impact_desc: "The $concept_pollution_impact$ on a [concept_state_region] indicates how severe the effects of the total [concept_generated_pollution] by buildings in that State Region are. The more [concept_arable_land] a State Region has, the lower the impact of the $concept_generated_pollution$.\n\nA highly polluted $concept_state_region$ will also affect its neighboring states, although at a reduced rate. If a neighboring state already has a higher $concept_pollution_impact$ due to its own buildings or other neighboring states, only the highest $concept_pollution_impact$ has an effect.\n\nThe effects of $concept_pollution_impact$ can increase up to:\n[GetStaticModifier('state_region_pollution_general').GetDesc]\n[GetStaticModifier('state_region_pollution_health').GetDesc]#!"
 concept_generated_pollution: "Generated Pollution"
 concept_generated_pollution_desc: "$concept_generated_pollution$ is how much total pollution the buildings in a [concept_state_region] produce. How much [concept_pollution_impact] a $concept_state_region$ has is also dependent on the amount of [concept_arable_land] in that $concept_state_region$.\n\nA $concept_state_region$ with a lot of $concept_arable_land$ will see $concept_generated_pollution$ increase $concept_pollution_impact$ by a smaller amount than a $concept_state_region$ with little $concept_arable_land$."
 concept_devastated: "Devastated"
 concept_devastation_desc:2 "$concept_devastation$ is the damage done to a [concept_state_region] as a result of war or natural disasters. It increases from [Concept('concept_battle','$concept_battles$')] and when under hostile [concept_occupation]. It will decrease over time if no part of the $concept_state_region$ is at war.\n\n$concept_devastation$ has a negative impact on [concept_infrastructure], [Concept('concept_pop_growth','$concept_pop_growth_mortality$')], [concept_throughput], and [concept_migration_pull]."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED APRIL 5, 2022

 concept_command_limit:0 "Command Limit"
 concept_command_limit_desc:5 "$concept_command_limit$ determines how many [Concept('concept_battalion', '$concept_battalions$')] or [Concept('concept_ship','$concept_ships$')] can be effectively [Concept('concept_organization','$concept_organization_organized$')] under a [concept_military_formation]. You can increase $concept_command_limit$ by promoting your [concept_commander] to a higher [concept_commander_rank].\n\n#indent_newline:3 For an [concept_army], whichever is higher of your regular [Concept('concept_battalion','$concept_battalions$')] or raised [Concept('concept_conscript_battalion','$concept_conscript_battalions$')] is compared against the $concept_command_limit$. This means raising $concept_conscript_battalions$ will only strain the $concept_command_limit$ if there are more of them than your regular $concept_battalions$.\n\n#indent_newline:3 Having more [Concept('concept_unit','$concept_units$')] in a $concept_military_formation$ than its $concept_command_limit$ reduces the maximum $concept_organization$ a $concept_military_formation$ can reach, and additionally confers the following effects:\n[GetStaticModifier('low_command_limit').GetDesc]#!"
 concept_command: "Command"
 concept_commanded: "Commanded"

 concept_pop_qualifications: "Qualifications"
 concept_qualifying: "Qualifying"
 concept_qualified: "Qualified"
 concept_qualify: "Qualify"
 concept_pop_qualifications_desc: "[Concept('concept_pop','$concept_pops$')] develop the $concept_pop_qualifications$ necessary to change into another [concept_profession] over time. If their current attributes match those of the $concept_profession$, or if they currently work in a related field, they will develop $concept_pop_qualifications$ for it sooner. [concept_literacy], [concept_wealth], and [concept_acceptance_status] are common deciding factors."

 concept_hq:1 "HQ"
 concept_hqs:0 "HQs"
 concept_hq_possessive:0 "HQ’s"
 concept_hq_long:0 "Headquarter"
 concept_hq_desc:5 "An $concept_hq$ ($concept_hq_long$) is the territory owned by a [concept_country] in a particular [concept_strategic_region]. All [Concept('concept_military_formation','$concept_military_formations$')] have a home $concept_hq$ and can be stationed in $concept_hqs$."

 concept_tax_waste:0 "Tax Waste"
 concept_tax_waste_desc:1 "The amount of [concept_taxes] collected that are wasted, due to inefficiencies or corruption, prior to entering the government coffers. This is often caused by a [concept_bureaucracy] deficit."

 concept_tax_capacity:0 "Taxation Capacity"
 concept_tax_capacity_desc:2 "Each point of Taxation Capacity in a [concept_state] allows for the efficient taxation of [GetDefine('NPops','INDIVIDUALS_TAXED_PER_TAX_CAPACITY')|vK] [Concept('concept_pop','$concept_pops$')]. If the population of a [concept_state] outgrows its Taxation Capacity, the efficiency of all forms of taxation will be reduced. Taxation Capacity can be increased through researching certain $SOCIETY$ $concept_technologies$ or constructing [SelectLocalization(GetPlayer.IsValid, 'concept_tax_capacity_desc_added','Government Administration')] [Concept('concept_building','$concept_buildings$')] in the [concept_state]."
 concept_tax_capacity_desc_added:0 "[GetBuildingType('building_government_administration').GetName]"

 concept_assimilation:0 "Assimilation"
 concept_assimilating:1 "Assimilating"
 concept_assimilate:1 "Assimilate"
 concept_assimilation_desc:4 "Foreign [Concept('concept_pop','$concept_pops$')] whose [concept_culture] has high enough [concept_acceptance] in the [concept_country] they live in, and who do not live in one of their [Concept('concept_homeland','$concept_homelands$')], may $concept_assimilate$ into a more $concept_accepted$ $concept_culture$. $concept_pops$ that contain [Concept('concept_radical', '$concept_radicals$')] will assimilate at a reduced rate, and $concept_assimilation$ is much slower in [Concept('concept_unincorporated_state','$concept_unincorporated_states$')]."

 concept_conversion:0 "Conversion"
 concept_converting:1 "Converting"
 concept_convert:0 "Convert"
 concept_conversion_desc:3 "[Concept('concept_pop','$concept_pops$')] whose [concept_religion] has low [concept_acceptance] in the [concept_country] they live in may instead $concept_convert$ to one with higher $concept_acceptance$. $concept_pops$ that contain [Concept('concept_radical', '$concept_radicals$')] will convert at a reduced rate, and conversion is much slower in [Concept('concept_unincorporated_state','$concept_unincorporated_states$')]."

 concept_life_experience:0 "Life Experience"
 concept_life_experience_desc:2 "[Concept('concept_character', '$concept_characters$')] gain $concept_life_experience$ over time and through special events. $concept_life_experience$ influences the possibility of acquiring new [Concept('concept_character_trait', '$concept_character_traits$')]."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED APRIL 1, 2022

 concept_supply_network: "Supply Network"
 concept_supply_network_short: "Network"
 concept_supply_networks: "Supply Networks"
 concept_supply_networks_short: "Networks"
 concept_supply_network_desc:3 "Every seafaring [concept_country] requires [GetGoods('merchant_marine').GetName] on the [concept_market] to maintain the transportation needs of their [Concept('concept_shipping_lane','$concept_shipping_lanes$')]. The total strength of your $concept_supply_network$ is determined by comparing the [GetGoods('merchant_marine').GetName] supply to the total demand across all your $concept_shipping_lanes$. This strength is the baseline [Concept('concept_shipping_lane_effectiveness','$concept_shipping_lane_effectiveness_short$')] of all your $concept_shipping_lanes$."



 concept_ship: "Ship"
 concept_ships: "Ships"
 concept_military_ship: "Military Ship"
 concept_military_ships: "Military Ships"
 concept_ship_possessive: "Ship’s"
 concept_ship_desc: "A $concept_ship$ is constructed in a shipyard using [concept_ship_construction]. They are organized by their [concept_ship_type] in [Concept('concept_ship_group','$concept_ship_groups$')]. $concept_ships$ are used to build [Concept('concept_interest','$concept_interests$')] across the globe and conduct various [Concept('concept_naval_mission','$concept_naval_missions$')] in a [concept_fleet]."

 concept_ship_group: "Ship Group"
 concept_ship_groups: "Ship Groups"
 concept_ship_group_desc: "There are three $concept_ship_groups$ that consist of [Concept('concept_ship_type','$concept_ship_types$')] that fill a similar role. The groups are: $ship_group_capital_ships$, $ship_group_cruisers$ and $ship_group_torpedo_craft$."

 concept_ship_type: "Ship Type"
 concept_ship_types: "Ship Types"
 concept_ship_type_short: "Type"
 concept_ship_types_short: "Types"
 concept_ship_type_desc: "Every [concept_ship] has a $concept_ship_type$ that has certain attributes and functions, which make it better or worse for certain [Concept('concept_naval_mission','$concept_naval_missions$')]."

 concept_ship_template: "Ship Template"
 concept_ship_templates: "Ship Templates"
 concept_ship_template_short: "Template"
 concept_ship_templates_short: "Templates"
 concept_ship_template_desc: "A [concept_ship_template] determines the strategic setup for [Concept('concept_ship','$concept_ships$')] of a certain [concept_ship_type]. [Concept('concept_ship_modification','$concept_ship_modifications$')] modify and govern what values a $ship$ ends up having."

 concept_base_template: "Base Template"
 concept_base_templates: "Base Templates"
 concept_base_template_desc: "The original design of a [concept_ship_type]. The $concept_base_template$ unlocks with the $concept_ship_type$ and will always be available."

 concept_sailor: "Sailor"
 concept_sailors: "Sailors"
 concept_sailor_desc: "A type of [GetPopType('soldiers').GetName] that form the [concept_ship_crew] of a [concept_ship]."

 concept_ship_construction: "Ship Construction"
 concept_ship_construction_short: "Construction"
 concept_ship_construct: "Construct"
 concept_ship_construction_desc: "@ship_construction! $concept_ship_construction$ is produced by [GetBuildingType('building_shipyard').GetName] and is used to build and repair ships."

 concept_ship_construction_capacity: "Ship Construction Capacity"
 concept_ship_construction_capacity_short: "Construction Capacity"
 concept_ship_construction_capacity_desc: "The maximum amount of @ship_construction! [concept_ship_construction] that can be applied to a single ship per week."

 concept_ship_construction_queue: "Ship Construction Queue"
 concept_ship_construction_queue_short: "Queue"
 concept_ship_construction_queue_desc: "Any [Concept('concept_ship', '$concept_ships$')] that have been set to be built, but are currently not using any @ship_construction! [concept_ship_construction], are placed in the $concept_ship_construction_queue_short$. Whenever any @ship_construction! $concept_ship_construction$ becomes available, the first $concept_ship$ in the $concept_ship_construction_queue_short$ will start using that @ship_construction! $concept_ship_construction_short$ and then switch to being [concept_ship_under_construction]."

 concept_ship_retrofit: "Ship Retrofit"
 concept_ship_retrofit_short: "Retrofit"
 concept_ship_retrofitted_short: "Retrofitted"
 concept_ship_retrofit_desc: "Upgrades the [Concept('concept_ship_modification', '$concept_ship_modifications$')] of a [concept_ship] to match the latest version of it's [concept_ship_template]."

 concept_ship_complexity: "Ship Complexity"
 concept_ship_complexity_short: "Complexity"
 concept_ship_complexity_desc: "The $concept_ship_complexity$ of a [concept_ship] is determined by the amount of different [Concept('concept_ship_modification', '$concept_ship_modifications$')] it has. The more $concept_ship_modifications$ a $concept_ship$ has, the higher its $concept_ship_complexity$ and the more @ship_construction! [concept_ship_construction] it will require to be built or repaired."

 concept_ship_modification: "Ship Modification"
 concept_ship_modification_short: "Modification"
 concept_ship_modifications: "Ship Modifications"
 concept_ship_utility_modifications_short: "Utility Modifications"
 concept_ship_modification_desc: "A $concept_ship_modification$ is an upgrade that can be applied to a [concept_ship] to enhance its capabilities. However, adding more $concept_ship_modifications$ also increases the [concept_ship_complexity] of the $concept_ship$, which in turn requires more @ship_construction! [concept_ship_construction] to build or repair the $concept_ship$."

 concept_ship_under_construction: "Ship Under Construction"
 concept_ship_under_construction_short: "Under Construction"
 concept_ship_under_construction_desc: "When a [concept_ship] is using @ship_construction! [concept_ship_construction] it is considered being $concept_ship_under_construction_short$."

 concept_flagship: "Flagship"
 concept_flagship_desc: "A $concept_flagship$ is the lead [concept_ship] of the [concept_country]'s Navy. Only one $concept_flagship$ can exist at a time. Winning battles involving the $concept_flagship$ will provide additional [concept_prestige] to the [concept_country] that owns it, whereas losing them will harm the $concept_prestige$."

 concept_ship_crew: "Ship Crew"
 concept_ship_crew_short: "Crew"
 concept_ship_crew_desc: "The amount of [Concept('concept_sailor', '$concept_sailors$')] and [SelectLocalization(GetPlayer.IsValid,'concept_ship_crew_desc_added','Officers')] on a [concept_ship]. The greater the $concept_ship_crew_short$ the more [concept_casualties] the $concept_ship$ will be able to deal and take."
 concept_ship_crew_desc_added: "[GetPopType('officers').GetName]"

 concept_ship_hit_points: "Ship Hit Points"
 concept_ship_hit_points_short: "Hit Points"
 concept_ship_hit_points_desc: "The total $concept_ship_hit_points_short$ of a [concept_ship] represent its durability and ability to withstand damage in naval combat."

 concept_fleet_hit_points: "Fleet Hit Points"
 concept_fleet_hit_points_short: "Hit Points"
 concept_fleet_hit_points_desc: "The average $concept_fleet_hit_points_short$ of all [Concept('concept_ship', '$concept_ships$')] in a [concept_fleet] represent the $concept_fleet_possessive$ average durability and ability to withstand damage in naval combat."

 concept_ship_armor: "Ship Armor"
 concept_ship_armor_short: "Armor"
 concept_ship_armor_desc: "Reduces any damage that a [concept_ship] would receive from an opponent by this value."

 concept_ship_upkeep: "Ship Upkeep"
 concept_ship_upkeep_short: "Upkeep"
 concept_ship_upkeep_desc: "The weekly $concept_ship_upkeep$ represents the cost of [Concept('concept_good','$concept_goods$')] required for maintaining a [concept_ship]. $concept_ship_upkeep_short$ is changed by [GetDefine('NMilitary','SHIP_UPKEEP_GOODS_DOCKED_MULT')|-1%] if the $concept_ship$ is docked at an [concept_hq]."

 concept_ship_speed: "Ship Speed"
 concept_ship_speed_short: "Speed"
 concept_ship_speed_desc: "$ship_movement_speed_add_desc$"

 concept_attack_damage: "Attack Damage"
 concept_attack_damage_short: "Damage"
 concept_attack_damage_desc: "$ship_hull_damage_add_desc$"

 concept_hull_attack_damage: "Hull Attack Damage"
 concept_hull_attack_damage_short: "Hull Damage"
 concept_hull_attack_damage_desc: "$ship_hull_damage_add_desc$"

 concept_crew_attack_damage: "Crew Attack Damage"
 concept_crew_attack_damage_short: "Crew Damage"
 concept_crew_attack_damage_desc: "$ship_crew_damage_add_desc$"

 concept_carrying_capacity: "Carrying Capacity"
 concept_carrying_capacity_desc: "$ship_carrying_capacity_add_desc$"

 concept_marine_capacity: "Marine Capacity"
 concept_marine_capacity_desc: "$ship_marine_capacity_add_desc$"

 concept_supply_capacity: "Supply Capacity"
 concept_supply_capacity_desc: "$ship_supply_capacity_add_desc$"

 concept_supply_efficiency: "Supply Efficiency"
 concept_supply_efficiency_desc: "How efficiently a ship uses its supplies. Higher efficiency means lower supply consumption."

 concept_supply_priority: "Supply Priority"
 concept_supply_priority_short: "Priority"
 concept_supply_priority_desc: "A [Concept('concept_military_formation','$concept_military_formation_possessive$')] $concept_supply_priority$ determines the order in which it receives [Concept('concept_supply_ship','$concept_supply_ships$')].\n\n$concept_supply_ships$ will be distributed until all highest level $concept_supply_priority_short$ [Concept('concept_fleet','$concept_fleets$')] and [Concept('concept_army','$concept_armies$')] have their demand met, after which the distribution will continue on to lower $concept_supply_priority_short$ $concept_fleets$ and $concept_armies$."

 concept_supply_ship: "Supply Ship"
 concept_supply_ships: "Supply Ships"
 concept_supply_ship_construction: "Supply Ship Construction"
 concept_supply_ship_desc: "$concept_supply_ships$ are used to deliver supplies, rations and ammo to [Concept('concept_fleet','$concept_fleets$')] that are at sea and [Concept('concept_army','$concept_armies$')] that are overseas.\n\nThey are constructed in a $building_shipyard$ much like regular [Concept('concept_ship','$concept_ships$')] and are retained in a pool unless currently needed."

 concept_critical_hit_chance: "Critical Chance"
 concept_critical_hit_chance_desc: "$ship_critical_hit_chance_add_desc$. \nCritical hits ignore [GetDefine('NBattle','NAVAL_BATTLE_CRIT_ARMOR_REDUCTION')|v0%] of the targets [concept_ship_armor]."

 concept_critical_hit_multiplier: "Critical Damage"
 concept_critical_hit_multiplier_desc: "$ship_critical_hit_multiplier_add_desc$"

 concept_vulnerability: "Vulnerability"
 concept_vulnerability_desc: "Higher $concept_vulnerability$ $concept_ships$ are more likely to be chosen as a target by enemy $concept_ships$ unless the [concept_fleet] has sufficient [concept_screening] to protect all of its $concept_ships$."

 concept_screening: "Screening"
 concept_screening_desc: "$concept_screening$ is used to counteract the effects of [concept_vulnerability], a higher $concept_screening$ value ensures that $concept_ships$ with higher $concept_vulnerability$ are less likely to be chosen as a target."

 concept_readiness: "Readiness"
 concept_readiness_desc: "$ship_readiness_gain_add_desc$"

 concept_accuracy: "Accuracy"
 concept_accuracy_desc: "$ship_accuracy_add_desc$"

 concept_detection: "Detection"
 concept_detection_desc: "$ship_detection_add_desc$\n\nA $concept_fleet_possessive$ $concept_detection$ and the enemies [concept_visibility] are used in conjunction to determine the chance to spawn a [concept_naval_battle] and how many $concept_ships$ will be involved."

 concept_visibility: "Visibility"
 concept_visibility_desc: "$ship_visibility_add_desc$\n\nA $concept_fleet_possessive$ $concept_detection$ and the enemies [concept_visibility] are used in conjunction to determine the chance to spawn a [concept_naval_battle] and how many $concept_ships$ will be involved."

 concept_withdrawn_ships: "Withdrawn Ships"
 concept_withdrawn_ships_short: "Withdrawn"
 concept_withdrawn_ships_desc: "How many $concept_ships$ have $concept_withdrawn_ships_short$ from the battle."

 concept_sunk_ships: "Sunken Ships"
 concept_sunk_ships_short: "Sunk"
 concept_sunk_ships_desc: "How many $concept_sunk_ships$ a [concept_fleet] has suffered in battle."

 concept_crew_casualties: "Crew Casualties"
 concept_crew_casualties_short: "Casualties"
 concept_crew_casualties_desc: "How many $concept_crew_casualties_short$ a [concept_fleet] has taken in battle."

 concept_shipping_lane:0 "Shipping Lane"
 concept_shipping_lanes:0 "Shipping Lanes"
 concept_shipping_lane_desc: "A $concept_shipping_lane$ is a naval connection of [GetGoods('merchant_marine').GetName] between two coastal [Concept('concept_state','$concept_states$')] that is established to either move [Concept('concept_good','$concept_goods$')] from place to place as part of a [concept_treaty] or to [concept_supply] [Concept('concept_military_formation','$concept_military_formations$')] overseas.\n\nA $concept_shipping_lane$ can be either a [concept_supply_route], a [concept_port_connection] or a [GetArticleType('goods_transfer').GetNameNoIcon] $concept_treaty$ and is reliant on its [concept_shipping_lane_effectiveness] to work, provided that its shipping cost is sufficiently covered."

 concept_tolls: "Tolls"
 concept_toll: "Toll"
 concept_toll_rate: "Toll Rate"
 concept_tolls_desc: "$concept_tolls$ can be raised by [Concept('concept_country', '$concept_countries$')] that [Concept('concept_strait_control', '$concept_strait_control_short$')] a [concept_strait]. They add a cost that is a share of the [concept_trade] going through them. This cost is covered by the affected [GetBuildingType('building_trade_center').GetName] and reduces their profitability, while the $concept_country$ controlling the $concept_strait$ gains additional income from this. $concept_tolls$ can be raised individually by both controllers of a $concept_strait$ and are summed up."

 concept_strait: "Strait"
 concept_straits: "Straits"
 concept_strait_desc: "A narrow water passage with two connecting [Concept('concept_province', '$concept_provinces$')], one on either side of the $concept_strait$. A [concept_country] only needs control over one of the $concept_provinces$ in order to be able to manage whose ships have [concept_strait_access] through the $concept_strait$.\n@information! The $strait_gibraltar$ requires a $concept_country$ to control both $concept_provinces$ to manage the $concept_strait_access$ rights."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED MARCH 31, 2022


 concept_port_connection:0 "Port Connection"
 concept_port_connections:0 "Port Connections"
 concept_port_connection_desc:3 "A [concept_shipping_lane] connecting one or several [Concept('concept_state','$concept_states$')] otherwise unreachable overland to the [concept_market_capital], ensuring [concept_market_access] to remote regions. $concept_port_connections$ require a [SelectLocalization(GetPlayer.IsValid,'concept_port_connection_desc_added','Port')] in both ends. The shipping cost of a $concept_port_connection$ is dependent on the total [concept_infrastructure_usage] of the [Concept('concept_state','$concept_states$')] it's connecting."
 concept_port_connection_desc_added:0 "[GetBuildingType('building_port').GetName]"

 concept_shipping_lane_effectiveness:1 "$concept_shipping_lane$ $concept_shipping_lane_effectiveness_short$"
 concept_shipping_lane_effectiveness_short:0 "Effectiveness"
 concept_shipping_lane_effectiveness_desc:3 "The $concept_shipping_lane_effectiveness_short$ of a [concept_shipping_lane] is determined by the strength of a [Concept('concept_country','$concept_country_possessive$')] [concept_supply_network]. When $concept_shipping_lane_effectiveness_short$ is below #v 100%#!, the function of the $concept_shipping_lane$ is reduced to match."

 concept_supply_route:0 "Supply Route"
 concept_supply_routes:0 "Supply Routes"
 concept_supply_route_possessive:0 "Supply Route’s"
 concept_supply_route_desc:2 "A [concept_shipping_lane] that supplies a [concept_general] [Concept('concept_order','$concept_ordered$')] to advance or defend a [concept_front] only accessible by sea. The $concept_general$'s [concept_supply] level is equal to the $concept_supply_route$'s [Concept('concept_shipping_lane_effectiveness','$concept_shipping_lane_effectiveness_short$')]."

 concept_character:0 "Character"
 concept_characters:1 "Characters"
 concept_character_possessive:0 "Character’s"
 concept_character_desc:2 "$concept_characters$ fulfill different [Concept('concept_character_role','$concept_character_roles$')] in your [concept_country]. Their ability to perform these duties depends on their [Concept('concept_character_trait','$concept_character_traits$')]. They always support an [concept_interest_group], and may have an [concept_ideology] that shapes their aspirations and outlook."

 concept_busy: "Busy"
 concept_busy_desc: "A [concept_character] can be considered $concept_busy$ when occupied with a certain assignment, such as being on an expedition. When $concept_busy$, the $concept_character$ is unavailable for their regular duties. For example, a [concept_commander] would be unable to participate in [Concept('concept_battle','$concept_battles$')]."

 concept_popularity:0 "Popularity"
 concept_popular:0 "Popular"
 concept_popularity_desc:2 "The $concept_popularity$ of a [concept_character] measures the willingness of [Concept('concept_pop','$concept_pops$')] to follow them. \n\n$concept_popularity$ affects [concept_prominence] and can have different effects depending on the $concept_character$'s [concept_character_role]: #indent_newline:3 \n• [Concept('concept_agitator','$concept_agitators$')]: affects chance of [Concept('concept_pop', '$concept_pops$')] joining their [concept_political_movement] \n• [Concept('concept_ruler', '$concept_rulers$')]: adds or takes away [concept_authority] \n• [Concept('concept_admiral','$concept_admirals$')]/[Concept('concept_general', '$concept_generals$')]: affects chance of launching a successful [concept_coup] \n• [concept_interest_group] [Concept('concept_leader', '$concept_leaders$')]: affects [concept_interest_group_attraction] \n• [Concept('concept_party_leader', '$concept_party_leaders$')]: affects [concept_party] [concept_momentum] during [Concept('concept_election','$concept_elections$')] \n• [Concept('concept_executive','$concept_executives$')]: affects [concept_prosperity]"

 concept_prominence: "Prominence"
 concept_prominent: "Prominent"
 concept_prominence_desc: "The $concept_prominence$ of a [concept_character] measures their level of influence in the [Concept('concept_country','$concept_country_possessive$')] political machine and affects the chance that a $concept_character$ will be selected as the next leader of their [concept_interest_group]. $concept_characters$ whose $concept_prominence$ is at least [GetDefine('NCharacters','PROMINENCE_SIGNIFICANT_THRESHOLD')|v] also contribute to the [concept_political_strength] of their [concept_interest_group] and may be selected as its next [concept_leader]."

 concept_loyalty: "Loyalty"
 concept_loyalty_desc: "The $concept_loyalty$ of a [concept_character] measures how faithful they are to the sitting [concept_government], and is affected by the [concept_approval] of their [concept_interest_group] as well as their personal [concept_ideology]. Disloyal [Concept('concept_commander','$concept_commanders$')] may attempt to launch a [concept_coup]."

 concept_momentum:0 "Momentum"
 concept_momentum_desc:1 "The success of a [Concept('concept_party','$concept_party_possessive$')] [concept_election] campaign. $concept_momentum$ increases the number of [concept_votes] a $concept_party$ gains on $concept_election$ day, and is nullified thereafter. $concept_momentum$ can be affected by random chance, special events, and the [concept_popularity] of its [concept_party_leader]."

 concept_government_expenses:0 "Government Expenses"
 concept_government_expenses_short:1 "Expenses"
 concept_government_expenses_desc:1 "The total weekly $concept_government_expenses_short$ accrued by the [concept_government], balanced against all its weekly revenues such as [concept_taxes], with the balance added to or removed from the [concept_treasury]."

 concept_sovereignty:0 "Sovereignty"
 concept_sovereignty_desc:1 "A [Concept('concept_country','$concept_country_possessive$')] right to self-govern. When one $concept_country$ violates the $concept_sovereignty$ of another they openly disrespect this right. Should the other not respond in turn with an immediate military response enforcing the integrity of their borders, they submit to the violator and permit them military access through their territory."

 concept_average_wage:0 "Average Annual Wage"
 concept_average_wage_desc:0 "The average [Concept('concept_building_wage', '$concept_building_wages$')] a single [concept_individual] in the [concept_workforce] would earn annually while working at this [concept_building]."

 concept_subsidized_wage:0 "Subsidized Wage"
 concept_subsidized_wage_desc:1 "When a [Concept('concept_subsidies','$concept_subsidized$')] [concept_building] cannot pay their [concept_workforce] at least the [concept_normal_wage], the remainder is covered by government $concept_subsidies$ through the [concept_treasury]. In return the $concept_building$ will never fire its $concept_workforce$ and aim to keep [concept_throughput] maximized at all times."

 concept_government_wage:0 "Government Wage"
 concept_government_wages:0 "Government Wages"
 concept_government_wage_desc:0 "All [Concept('concept_government_building','$concept_government_buildings$')] except [Concept('concept_military_building','$concept_military_buildings$')] pay their [concept_workforce] according to the same standardized $concept_government_wage$ rate. This rate is based on the [concept_normal_wage] in the [concept_country], with any adjustments set in the Budget panel."

 concept_military_wage:0 "Military Wage"
 concept_military_wages:0 "Military Wages"
 concept_military_wage_desc:0 "All [Concept('concept_military_building','$concept_military_buildings$')] pay their [concept_workforce] according to the same standardized $concept_military_wage$ rate. This rate is based on the [concept_normal_wage] in the [concept_country], with any adjustments set in the Budget panel."

 concept_normal_wage:0 "Normal Wage"
 concept_normal_wage_desc:3 "The baseline [concept_building_wage] in a [concept_country] which many [Concept('concept_building','$concept_buildings$')] take into account. [Concept('concept_government_wage','$concept_government_wages$')] and [Concept('concept_military_wage','$concept_military_wages$')] are based on the $concept_normal_wage$. It is determined from the average $concept_building_wages$ paid by [Concept('concept_building','$concept_building_industries$')] across [Concept('concept_incorporated_state', '$concept_incorporated_states$')]."

 concept_dead:0 "Dead"
 concept_dead_desc:2 "[concept_casualties] that end up $concept_dead$ due to [concept_battle] or [concept_attrition]."

 concept_wounded:0 "Wounded"
 concept_wounded_desc:2 "[concept_casualties] that are merely $concept_wounded$ in [concept_battle] or due to [concept_attrition]. Some $concept_wounded$ $concept_casualties$ recover and return to active service after some time, while others end up as [concept_dependents] of other [Concept('concept_pop','$concept_pops$')] in your [concept_country]."

 concept_attrition:0 "Attrition"
 concept_attrition_risk: "Attrition Risk"
 concept_attrition_desc:3 "[concept_casualties] inflicted on [concept_manpower] outside of [concept_battle] is referred to as $concept_attrition$. It is frequently experienced when [Concept('concept_battalion','$concept_battalions$')] are [Concept('concept_mobilize_battalion','$concept_mobilize_battalion_mobilized$')] and can be the result of disease, accidents, exposure, or even desertion. $concept_attrition$ can be counteracted by using $medic_support$ [Concept('concept_mobilization_option','$concept_mobilization_options$')]."

 concept_ruler:0 "Ruler"
 concept_rulers:0 "Rulers"
 concept_ruler_possessive:1 "Ruler’s"
 concept_ruler_desc:2 "A $concept_ruler$ is usually the [concept_head_of_state] who represents the [Concept('concept_country','$concept_country_possessive$')] in domestic and world affairs. A $concept_ruler$'s [Concept('concept_character_trait','$concept_character_traits$')] affects the $concept_country$ directly. When a $concept_ruler$ dies a new one will take their place, either an [concept_heir] if one exists or another $concept_character$ depending on [concept_government_type]."

 concept_heir:0 "Heir"
 concept_heir_desc:2 "The $concept_heir$ of a [concept_country] is a [concept_character]. They will take over the [concept_character_role] of [concept_ruler] upon the current $concept_ruler$'s death."

 concept_executive: "Executive"
 concept_executives: "Executives"
 concept_executives_desc: "$concept_executive_desc$"
 concept_executive_desc: "$concept_executives$ are the [Concept('concept_character','$concept_characters$')] that lead a [concept_company]. Like other $concept_characters$ they can have [Concept('concept_character_trait','$concept_character_traits$')] which influence how good they are at their job. They provide [concept_clout] to their [concept_interest_group] based on how well their [concept_company] is doing. $concept_executives$ can also become [concept_leader] of an $concept_interest_group$."

 concept_magnate: "Magnate"
 concept_magnates: "Magnates"
 concept_magnates_desc: "$concept_magnate_desc$"
 concept_magnate_desc: "$concept_magnates$ are wealthy [Concept('concept_character','$concept_characters$')] that own numerous estates or businesses and use their fortune to wield political power. $concept_magnates$ $concept_magnate_holding_desc$."
 concept_magnate_holding_desc: "possess a [concept_holding] in their [concept_home_state], and gain [concept_prominence] based on its [concept_revenue]"

 concept_holding: "Holding"
 concept_holding_desc: "A $concept_holding$ is a [concept_building] (usually $MANOR_HOUSES_GC_LINK$ or $FINANCIAL_DISTRICTS_GC_LINK$) in the [concept_home_state] of a [concept_character], which the $concept_character$ is presumed to own a considerable stake in. The type of $concept_building$ that a $concept_character$ will receive as their $concept_holding$ is mainly dependent on their [concept_interest_group]."

 concept_character_role:0 "Role"
 concept_character_roles:0 "Roles"
 concept_character_role_desc:2 "$concept_character_roles$ determine what areas of your [concept_country] a particular [concept_character] has influence over. A $concept_character$ can have one or several $concept_character_roles$.\n\nThe list of $concept_character_roles$ are: \n  #indent_newline:3  • [concept_ruler] (usually also a [concept_politician])\n• [concept_heir]\n• [concept_politician]\n• [concept_executive]\n• [concept_agitator]\n• [concept_general]\n• [concept_admiral]"

 concept_treasury:0 "Treasury"
 concept_treasury_possessive:0 "Treasury’s"
 concept_treasury_desc:1 "The $concept_treasury$ keeps track of your [Concept('concept_country','$concept_country_possessive$')] assets. Each week your budget balance will result in the $concept_treasury$ taking out more [concept_loans] to cover a [concept_money] deficit, or depositing $concept_money$ into the [concept_gold_reserves]."

 concept_building_balance:0 "Balance"
 concept_building_balance_profit:0 "Profit"
 concept_building_balance_desc:3 "A [Concept('concept_building','$concept_building_possessive$')] $concept_building_balance$ is the amount of [concept_money] that remains of its [concept_revenue] after paying [Concept('concept_building_wage','$concept_building_wages$')] and purchasing required [Concept('concept_good','$concept_goods_input$')].\n\nThe $concept_building_balance$ is divided between [concept_building_owners] and the $concept_building$'s [concept_cash_reserves].\n\nA $concept_building$'s $concept_building_balance$ can be improved either by making its $concept_goods_input$ cheaper, or by making its $concept_goods_output$ more expensive. This can be done by increasing or decreasing [Concept('concept_sell_orders','$concept_sell_orders_supply$')] and [Concept('concept_buy_orders','$concept_buy_orders_demand$')] on the [concept_market] it belongs to."

 concept_building_wage:0 "Wage"
 concept_building_wages:0 "Wages"
 concept_building_wage_desc:3 "$concept_building_wages$ paid to [Concept('concept_pop','$concept_pops$')] by the [concept_building] they work in depends on several factors, the most prominent being the $concept_pop$'s [concept_profession] and the $concept_building$'s financial situation. If a $concept_building$'s [concept_building_balance] allows for raising $concept_building_wages$ at all, the $concept_building$ will only do so if it needs to in order to attract more $concept_pops$ to its [concept_workforce]. If a $concept_building$'s $concept_building_balance$ is negative, it will consider lowering $concept_building_wages$ to return to profitability.\n\nYou can guarantee that the $concept_workforce$ is paid a competitive $concept_building_wage$ by [Concept('concept_subsidies', '$concept_subsidizing$')] the building. This will keep it afloat with funds from the [concept_treasury] if necessary."

 concept_sell_orders:0 "Sell Orders"
 concept_sell_order:0 "Sell Order"
 concept_sell_order_short:0 "Sell"
 concept_sell_orders_supply:0 "Supply"
 concept_sell_orders_desc:2 "The number of orders to sell a [concept_good] on the central [concept_market] is used in combination with [concept_buy_orders] to determine its [concept_market_price]. $concept_sell_orders$ are generated by the production of the $concept_good$ in each of the $concept_market$'s [Concept('concept_state','$concept_states$')]. The higher the [concept_market_access] a $concept_state$ has, the closer the number of $concept_sell_orders$ generated will be to the total production."

 concept_buy_orders:0 "Buy Orders"
 concept_buy_order:0 "Buy Order"
 concept_buy_order_short:0 "Buy"
 concept_buy_orders_demand:0 "Demand"
 concept_buy_orders_desc:2 "The number of orders to buy a [concept_good] on the central [concept_market] is used in combination with [concept_sell_orders] to determine its [concept_market_price]. $concept_buy_orders$ are generated by the consumption of the $concept_good$ in each of the $concept_market$'s [Concept('concept_state','$concept_states$')]. The higher the [concept_market_access] a $concept_state$ has, the closer the number of $concept_buy_orders$ generated will be to the total consumption."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED MARCH 30, 2022

 concept_head_of_state:0 "Head of State"
 concept_head_of_state_desc:3 "A [Concept('concept_country','$concept_country_possessive$')] [concept_ruler] or highest representative. The [concept_government_type] determines who serves as the $concept_head_of_state$ and when they are replaced.[AddLocalizationIf(GetPlayer.IsValid, 'concept_head_of_state_ingame_added')]"
 concept_head_of_state_ingame_added:1 "\n\nThe [GetPlayer.GetAdjectiveNoFlag] $concept_head_of_state$ is [GetPlayer.GetRuler.GetFullNameWithTitle]."

 concept_government_type:0 "Government Type"
 concept_government_types:0 "Government Types"
 concept_government_type_transfer_of_power:0 "Transfer of Power"
 concept_government_type_desc:1 "A [Concept('concept_country','$concept_country_possessive$')] $concept_government_type$ is determined by its [Concept('concept_law','$concept_laws$')] and determines its $concept_government_type_transfer_of_power$, meaning who serves as its [concept_head_of_state].[AddLocalizationIf(GetPlayer.IsValid,'concept_government_type_ingame_added')]"
 concept_government_type_ingame_added:3 "\n\nThe $concept_government_type$ in [GetPlayer.GetNameNoFlag] is #tooltippable #tooltip:[GetPlayer.GetGovernment.GetTooltipTag],GOVERNMENT_TYPE_TOOLTIP_DESC [GetPlayer.GetGovernment.GetName]#!#!, for the following reasons:\n[GetPlayer.GetGovernment.GetPossibleTriggerDesc(AccessPlayer)]"

 concept_transfer_of_power:0 "Transfer of Power"
 concept_transfer_of_power_desc:0 "The Transfer of Power determines how a [Concept('concept_ruler','$concept_ruler_possessive$')] power is given to the next $concept_ruler$ and when this transfer will take place."

### ITEMS BELOW THIS LINE UPDATED OR VERIFIED MARCH 29, 2022

 concept_recognized_power:0 "Recognized Power"
 concept_recognized_powers:0 "Recognized Powers"
 concept_recognized_power_short:0 "Recognized"
 concept_recognition: "Recognition"
 concept_recognized_power_desc:1 "A $concept_recognized_power$ is considered a valid nation-state capable of self-determination by consensus of the [Concept('concept_great_power','$concept_great_powers$')], which sets them apart from [Concept('concept_unrecognized_power','$concept_unrecognized_powers$')].\n\nAn $concept_unrecognized_power$ may become a $concept_recognized_power$ by completing the #bold $je_earn_recognition$#! [concept_journal_entry]."

 concept_unification_supporter:0 "Unification Supporter"
 concept_unification_supporters:0 "Unification Supporters"
 concept_unification_support:0 "Support"
 concept_unification_supporting:0 "Supporting"
 concept_unification_supporter_desc:1 "A $concept_unification_supporter$ is a [concept_country] that favors a particular [concept_unification_candidate]. Should the unification be successful, the $concept_unification_supporter$ will become a part of the union."

 concept_unification_candidate:0 "Unification Candidate"
 concept_unification_candidate_short:0 "Candidate"
 concept_unification_candidates:0 "Unification Candidates"
 concept_unification_candidate_desc:1 "A $concept_unification_candidate$ is a [concept_country] considered a viable candidate for unification. The conditions for who qualifies as a $concept_unification_candidate$ varies depending on which unified nation it is. "

 concept_unification:0 "Country Unification"
 concept_unification_short: "Unification"
 concept_unify: "Unify"
 concept_unified: "Unified"
 concept_major_unification:0 "Major Unification"
 concept_minor_unification:0 "Minor Unification"
 concept_unification_desc:0 "The act of unifying and forming a new [concept_country] out of several $concept_countries$ is called Unification. A $concept_country$ can be formed by controlling a specific number of [Concept('concept_state','$concept_states$')] in the new $concept_country$'s region.\n\nA #b Major Unification#! allows $concept_countries$ to become [Concept('concept_unification_candidate','$concept_unification_candidates$')] which gives them access to the Unification [concept_diplomatic_play]. This $concept_diplomatic_play$ sets the [Concept('concept_war_goal','$concept_war_goals$')] to annex all the required $concept_states$ and $concept_countries$.\n\nWhile a #b Minor Unification#! do not allow any [Concept('concept_unification_candidate','$concept_unification_candidates$')] and can only form a $concept_country$ if the number of required $concept_states$ are controlled."


 concept_order:0 "Order"
 concept_orders:0 "Orders"
 concept_ordered:0 "Ordered"
 concept_order_desc: "[Concept('concept_commander','$concept_commanders$')] can be given $concept_orders$ that cause them to pursue different military objectives depending on their current location. All $concept_commanders$ have a few basic $concept_orders$, but their [Concept('concept_character_trait','$concept_character_traits$')] may add special $concept_orders$ for that $concept_commander$ to use.\n\nBasic [concept_general] orders are:\n[GetBasicGeneralOrdersBreakdown]"

 concept_naval_mission: "Naval Mission"
 concept_naval_missions: "Naval Missions"
 concept_naval_mission_short: "Mission"
 concept_naval_missions_short: "Missions"
 concept_naval_mission_desc: "[Concept('concept_fleet','$concept_fleets$')] can be assigned to $concept_naval_missions$ to determine what they should be focused on. A $concept_naval_mission_short$ takes place in a set of connected [Concept('concept_sea_node','$concept_sea_nodes$')] and has different effects depending on the type of the $concept_naval_mission_short$."
 concept_naval_mission_area_limit: "Naval Mission Area Limit"
 concept_naval_mission_area_limit_desc: "The maximum number of [Concept('concept_sea_node', '$concept_sea_regions$')] that can be assigned to a $concept_naval_mission_short$. This limit is determined by the [concept_commander_rank] of the assigned [concept_admiral]."

 concept_party:0 "Party"
 concept_parties:1 "Parties"
 concept_party_possessive:0 "Party’s"
 concept_party_desc:1 "A $concept_party$ is a political entity that participates in [Concept('concept_election','$concept_election$')]. They consist of one or more [Concept('concept_interest_group','$concept_interest_groups$')] whose [Concept('concept_ideology','$concept_ideologies$')] are at least somewhat compatible. These $concept_interest_groups$ are empowered by the [concept_votes] the $concept_party$ has won proportional to their [concept_clout]. Individual $concept_interest_groups$ cannot be included in [concept_government] without the rest of their $concept_party$ members."

 concept_party_leader:0 "Party Leader"
 concept_party_leader_short:0 "Leader"
 concept_party_leader_desc:1 "The [concept_leader] of the [concept_interest_group] in the [concept_party] with the most [concept_clout] is considered the $concept_party_leader$. The $concept_party_leader_short$ acts as a [concept_party_whip]."
 concept_party_leaders: "Party Leaders"
 concept_party_leaders_short: "Leaders"
 concept_party_leaders_desc: "$concept_party_leader_desc$"

 concept_suppress:0 "Suppress"
 concept_suppressed:0 "Suppressed"
 concept_suppressing:0 "Suppressing"
 concept_suppression:0 "Suppression"
 concept_suppress_desc:2 "A $concept_suppressed$ [concept_political_movement] is less attractive for [Concept('concept_pop','$concept_pops$')] to support. Your base $concept_suppression$ ability is determined by your [SelectLocalization(GetPlayer.IsValid,'concept_suppress_desc_added','Free Speech')] [concept_law]. $concept_suppressing$ $concept_interest_groups$ cost [concept_authority]."
 concept_suppress_desc_added:0 "[GetLawGroup('lawgroup_free_speech').GetName]"

 concept_bolster:0 "Bolster"
 concept_bolstered:0 "Bolstered"
 concept_bolsters:0 "Bolsters"
 concept_bolstering:0 "Bolstering"
 concept_bolster_desc:0 "A $concept_bolstered$ [concept_political_movement] is more attractive for [Concept('concept_pop','$concept_pops$')] to support. Your base $concept_bolstering$ ability is determined by your [SelectLocalization(GetPlayer.IsValid,'concept_bolster_desc_added','Free Speech')] [concept_law]. $concept_bolstering$ $concept_interest_groups$ costs [concept_authority]."
 concept_bolster_desc_added:0 "[GetLawGroup('lawgroup_free_speech').GetName]"

 concept_journal_entry:0 "Journal Entry"
 concept_journal:0 "Journal"
 concept_journal_entries:1 "Journal Entries"
 concept_journal_entry_desc:1 "$concept_journal_entries$ track ongoing events in your country. They can present opportunities or challenges, remind you of promises you have made, or warn of potential crises that may occur.\n\n$concept_journal_entries$ usually resolve and are removed from your $concept_journal$ when they are considered #bold Complete#!. Not all $concept_journal_entries$ can be #bold Completed#! - some can only #bold Fail#!, #bold Time Out#!, or will be removed under some condition."

 concept_political_lobby: "Political Lobby"
 concept_political_lobby_short: "Lobby"
 concept_political_lobbies_short: "Lobbies"
 concept_political_lobby_short_possessive: "Lobbies’"
 concept_political_lobbies: "Political Lobbies"
 concept_political_pro_lobby: "Pro-Lobby"
 concept_political_pro_lobbies: "Pro-Lobbies"
 concept_political_anti_lobby: "Anti-Lobby"
 concept_political_anti_lobbies: "Anti-Lobbies"
 concept_political_lobby_desc: "A $concept_political_lobby$ is a collection of [Concept('concept_interest_group','$concept_interest_groups$')] either opposing or endorsing a certain [concept_country].\n\nThe $concept_interest_groups$ in the $concept_political_lobby_short$ gain [concept_approval] based on the [concept_political_lobby_appeasement] of the $concept_political_lobby$.\n\n$concept_political_lobbies_short$ make it easier or harder to perform [Concept('concept_diplomatic_action','$concept_diplomatic_actions$')] against their target $concept_country$, by affecting [concept_influence] cost, and if the $concept_country$ will accept. $concept_political_lobbies_short$ in [Concept('concept_subject','$concept_subjects$')] which target their [concept_overlord] affect [concept_liberty_desire]. These effects are scaled by the [concept_clout] of the $concept_political_lobby_short$.\n\n[AddLocalizationIf( HasDlcFeature('lobbies'),'concept_political_lobby_desc_DEMANDS_OPPORTUNITIES')]$concept_political_lobbies_short$ may form randomly when a [concept_diplomatic_catalyst] happens, or when a $concept_country$ is [Concept('concept_fund_lobbies','$concept_funding_lobbies$')] in another."
 concept_political_lobby_desc_DEMANDS_OPPORTUNITIES: "From time to time, $concept_political_lobbies_short$ present [Concept('concept_political_lobby_demand','$concept_political_lobby_demands_short$')]. If the $concept_political_lobby_short$ is supported by [Concept('concept_interest_group','$concept_interest_groups$')] [concept_in_government], $concept_political_lobbies_short$ also present [Concept('concept_political_lobby_opportunity','$concept_political_lobby_opportunities_short$')]\n\n"

 concept_political_lobby_appeasement: "Appeasement"
 concept_political_lobby_appease: "Appease"
 concept_political_lobby_appeasing: "Appeasing"
 concept_political_lobby_appeasement_desc: "The $concept_political_lobby_appeasement$ of a [concept_political_lobby] affects the [concept_approval] of the [Concept('concept_interest_group','$concept_interest_groups$')] of the $concept_political_lobby_short$.\n\n$concept_political_lobby_appeasement$ changes based on your [Concept('concept_diplomatic_action','$concept_diplomatic_actions$')] against the $concept_political_lobby_short$'s $concept_country$. $concept_political_pro_lobbies$ are appeased by friendly $concept_diplomatic_actions_short$, while $concept_political_anti_lobbies$ are appeased by hostile $concept_diplomatic_actions_short$."

 concept_political_lobby_opportunity: "Lobby Opportunity"
 concept_political_lobby_opportunities_short: "Opportunities"
 concept_political_lobby_opportunity_short: "Opportunity"
 concept_political_lobby_opportunity_desc: "A special [concept_journal_entry] offered by a [concept_political_lobby] supported by [Concept('concept_interest_group','$concept_interest_groups$')] [concept_in_government].\n\nThese allow a special chance to achieve something normally not possible."

 concept_political_lobby_demand: "Lobby Demand"
 concept_political_lobby_demands_short: "Demands"
 concept_political_lobby_demand_short: "Demand"
 concept_political_lobby_demand_desc: "A [concept_journal_entry] presented by a [concept_political_lobby].\n\nFulfilling a $concept_political_lobby_demand_short$ will increase [concept_political_lobby_appeasement] of the $concept_political_lobby_short$."

 concept_diplomatic_catalyst: "Diplomatic Catalyst"
 concept_diplomatic_catalyst_short: "Catalyst"
 concept_diplomatic_catalysts_short: "Catalysts"
 concept_diplomatic_catalysts: "Diplomatic Catalysts"
 concept_diplomatic_catalyst_desc: "A $concept_diplomatic_catalyst$ is essentially any diplomatic occurence, which may create [Concept('concept_political_lobby','$concept_political_lobbies$')] or change a [Concept('concept_country','$concept_country_possessive$')] [concept_attitude] towards you.\n\nCatalysts can be any change on the world stage, for example:\n$EFFECT_LIST_BULLET$[Concept('concept_diplomatic_action','$concept_diplomatic_actions$')]\n$EFFECT_LIST_BULLET$Actions taken in [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]\n$EFFECT_LIST_BULLET$Change in [concept_relations] levels"

 concept_end_of_discussion_factor:0 "End-of-Discussion Factor"
 concept_end_of_discussion_factor_desc:1 "The presence of a $concept_end_of_discussion_factor$ represents that [Concept('concept_interest_group', '$concept_interest_groups$')] in [concept_government] consider further discussion of the merits of the [concept_law] currently being enacted no longer useful. The lower this factor gets, the more negative pressure it puts on the possibility that the enactment may $concept_enactment_advance_short$ or $concept_enactment_stall_short$."

 concept_enactment_of_laws: "Enactment of Laws"
 concept_enactment_of_laws_enactment: "Enactment"
 concept_enactment_of_laws_enact: "Enact"
 concept_enactment_of_laws_enacting: "Enacting"
 concept_enactment_of_laws_enacted: "Enacted"
 concept_enactment_of_laws_desc: "The act of attempting to push a new [concept_law] through several [Concept('concept_enactment_phase','$concept_enactment_phases_short$')] in the [Concept('concept_country','$concept_country_possessive$')] legislature. At regular intervals the $concept_law$'s [concept_enactment_success] chance will be tested. The time between tests can vary by law, and is also dependent on the [Concept('concept_government','$concept_government_possessive$')] [concept_legitimacy]. If the $concept_law$ does not progress to the next [concept_enactment_phase], it will either [Concept('concept_enactment_advance','$concept_enactment_advance_short$')], be [Concept('concept_enactment_debate','$concept_enactment_debate_short_debated$')], or [Concept('concept_enactment_stall','$concept_enactment_stall_short$')] which affects its chances to pass the next test or introduce other consequences to your $concept_country$.n\n$concept_enactment_of_laws_potential$"
 concept_enactment_of_laws_potential: "For a $concept_law$ to be able to be [Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')] it must be [Concept('concept_endorse_oppose','$concept_endorsed$')] by at least one $concept_interest_group$ [concept_in_government], supported by a current [concept_political_movement], or have a positive [concept_enactment_success] chance for some other reason."

 concept_enactment_success: "Enactment Success"
 concept_enactment_success_short: "Success"
 concept_enactment_successes: "Successes"
 concept_enactment_success_desc: "$concept_enactment_success$ indicates the percentage chance that a [concept_law] will progress to the next [Concept('concept_enactment_phase','$concept_enactment_phase_short$')] at the next checkpoint. It is equal to the [concept_base_success_chance] plus any effects accumulated during the enactment process. The $concept_base_success_chance$ is increased by support from an [concept_interest_group] [concept_in_government], a [concept_political_movement] with at least $RADICALISM_AGITATING$ #v 25%#! [concept_activism], or [Concept('concept_endorse_oppose','$concept_endorsement$')] from the [Concept('concept_ruler','$concept_ruler_possessive$')] [concept_ideology]."

 concept_enactment_advance: "Enactment Advance"
 concept_enactment_advance_short: "Advance"
 concept_enactment_advance_desc: "$concept_enactment_advance$ indicates the percentage chance that the enactment process of a [concept_law] will advance somehow at the next checkpoint, even if it won't complete or progress to the next [Concept('concept_enactment_phase','$concept_enactment_phase_short$')] yet. It is derived from the enactment's [concept_base_success_chance]."

 concept_enactment_debate: "Enactment Debate"
 concept_enactment_debate_short: "Debate"
 concept_enactment_debate_short_debated: "Debated"
 concept_enactment_debate_desc: "$concept_enactment_debate$ indicates the percentage chance that the enactment process of a [concept_law] will meet with some kind of complication at the next checkpoint. The lower the total chances of [Concept('concept_enactment_success','$concept_enactment_success_short$')], [Concept('concept_enactment_advance','$concept_enactment_advance_short$')], and [Concept('concept_enactment_stall','$concept_enactment_stall_short$')] the greater the chance of $concept_enactment_debate_short$."

 concept_enactment_stall: "Stalled Enactment"
 concept_enactment_stall_short: "Stall"
 concept_enactment_stall_desc: "$concept_enactment_stall$ indicates the percentage chance that the enactment process of a [concept_law] will be substantially hindered at the next checkpoint. Its base chance is equal to the total [concept_clout] of opposing [Concept('concept_interest_group','$concept_interest_groups$')] whose [concept_approval] is $ig_approval_unhappy$ or $ig_approval_angry$."

 concept_base_success_chance: "Base Success chance"
 concept_base_success_chance_desc: "$concept_base_success_chance$ is equal to the total [concept_clout] of supporting [Concept('concept_interest_group','$concept_interest_groups$')] in [concept_government] plus or minus [Concept('concept_political_movement_support', '$concept_political_movement_support_short$')] gained from any relevant [Concept('concept_political_movement', '$concept_political_movements$')]."

 concept_advance_factor: "Advance Factor"
 concept_advance_factor_desc: "$concept_advance_factor$ is a static factor used to determine [concept_enactment_advance] by scaling the [concept_base_success_chance]."

 concept_migration_pull: "Migration Attraction"
 concept_migration_pull_short: "Attraction"
 concept_migration_pull_desc: "$concept_migration_pull$ is a [concept_state]'s ability to attract migrants. It is based primarily on the average [concept_sol] among [Concept('concept_pop','$concept_pops$')] in the $concept_state$ but can be modified by a number of other factors. Any [Concept('concept_unemployed','$concept_unemployment$')] in the $concept_state$ will depress $concept_migration_pull$. The value is compared against other $concept_states$ between which $concept_migration$ may occur to determine in which direction migrants tend to flow.\n\n$concept_migration_pull$ is also the primary factor used to determine a $concept_country$'s [concept_mass_migration_pull]."
 concept_cultural_community: "Cultural Community"
 concept_cultural_communities: "Cultural Communities"
 concept_cultural_community_short: "Community"
 concept_cultural_community_desc: "A $concept_cultural_community$ indicates a certain [concept_culture] is present in a [concept_state] and allows [Concept('concept_pop','$concept_pops$')] in your [concept_market] to migrate to this $concept_state$.\n\nA newly formed $concept_cultural_community_short$ will have lower [concept_acceptance], but this will go away over time. A new [concept_law] that changes $concept_acceptance$ may also take time to implement, so $concept_pops$ of that $concept_cultural_community_short$ will temporarily have a different $concept_acceptance$ from the norm."

 concept_lower_strata: "Lower Strata"
 concept_lower_strata_short: "Lower"
 concept_lower_strata_desc: "The $concept_lower_strata$ consist of [Concept('concept_pop','$concept_pops$')] in [Concept('concept_profession','$concept_professions$')] that work with their hands or do repetitive labor which require little to no [concept_pop_qualifications] and result in low [Concept('concept_building_wage','$concept_building_wages$')].\n\n$STRATA_CONCEPTS_DEPEND_ON_SOCIAL_HIERARCHY$"

 concept_middle_strata: "Middle Strata"
 concept_middle_strata_short: "Middle"
 concept_middle_strata_desc: "The $concept_middle_strata$ consist of [Concept('concept_pop','$concept_pops$')] with specialized [Concept('concept_profession','$concept_professions$')] that are harder to gain [concept_pop_qualifications] for. This provides them with more leverage on the labor market and thereby higher [Concept('concept_building_wage','$concept_building_wages$')].\n\n$STRATA_CONCEPTS_DEPEND_ON_SOCIAL_HIERARCHY$"

 concept_upper_strata: "Upper Strata"
 concept_upper_strata_short: "Upper"
 concept_upper_strata_desc: "The $concept_upper_strata$ consist of [Concept('concept_pop','$concept_pops$')] with [Concept('concept_profession','$concept_professions$')] they [Concept('concept_pop_qualifications','$concept_qualify$')] for mostly on the basis of [concept_wealth]. These $concept_professions$ are typically not available to $concept_pops$ that have low [concept_acceptance] either. They tend to hold [Concept('concept_ownership_share','$concept_ownership_shares$')] in their [Concept('concept_building','$concept_buildings$')] and draw [concept_dividends] and collect [concept_budget_interest] in addition to [Concept('concept_building_wage','$concept_building_wages$')].\n\n$STRATA_CONCEPTS_DEPEND_ON_SOCIAL_HIERARCHY$"

 concept_incoming_units:0 "Units under Recruitment"
 concept_incoming_units_short:0 "Under Recruitment"
 concept_incoming_units_desc:1 "Each Unit under recruitment either has a level of a [concept_military_building] in the [concept_construction_queue] or have a $concept_military_building$ that are trying to hire [Concept('concept_pop','$concept_pops$')] in order to be able to create the [concept_unit]."

 concept_neighbors: "Neighbors"
 concept_neighboring: "Neighboring"
 concept_neighbors_desc: "Two [Concept('concept_country','$concept_countries$')] are considered to be $concept_neighbors$ if they share a land border or if they both own coastal [Concept('concept_state','$concept_states$')] that connect to the same [concept_sea_node]."

 concept_welfare_payments: "Welfare Payments"
 concept_welfare_payments_desc: "$concept_welfare_payments$ are a form of direct subsidy paid by by a [concept_country] to all $concept_pops$ in the [concept_workforce] that receive wages lower than the defined fraction of the [concept_normal_wage]."

 concept_sea_node: "Sea Node"
 concept_sea_nodes: "Sea Nodes"
 concept_sea_node_desc: "An intersection or point along a naval [concept_shipping_lane] representing a part of the ocean. $concept_shipping_lanes$ always take the shortest travel distance route between two coastal [Concept('concept_state','$concept_states$')]. For each multiple of the expected travel distance (#v [GetDefine('NEconomy','SEA_DISTANCE_EXPECTED_TRAVEL_DISTANCE')]#!), #v [GetDefine('NEconomy','SHIPPING_LANE_MERCHANT_MARINE_COST_SCALING')|=-%0]#! is added to the shipping cost."
 concept_sea_region: "Sea Region"
 concept_sea_regions: "Sea Regions"
 concept_sea_region_short: "Region"
 concept_sea_regions_short: "Regions"

 concept_agitator: "Agitator"
 concept_agitators: "Agitators"
 concept_agitate: "Agitate"
 concept_agitator_possessive: "Agitator’s"
 concept_agitator_desc: "A [concept_character_role] for [Concept('concept_character','$concept_characters$')] who support a [concept_political_movement], making it more attractive to [Concept('concept_individual','$concept_individuals$')] belonging to their [concept_interest_group]. Agitators may be invited with the #b Invite [concept_exile]#! character action or will appear randomly in your country, with their chance of appearance dependent upon your $concept_country$'s [concept_literacy].\n\nAgitators can only be invited if their [concept_acceptance_status] is one of the following in your [concept_country]: $SECOND_RATE_CITIZEN_GC_LINK$ or $FULL_ACCEPTANCE_GC_LINK$.\n\nThe [concept_political_movement] they support is determined by their [concept_ideology]. Their impact on their [concept_political_movement] is determined by the Agitator's [concept_popularity] and [Concept('concept_character_trait', '$concept_character_traits$')]."
 AGITATORS_TITLE: "[Concept('concept_agitator','$concept_agitators$')]"

 concept_exile: "Exile"
 concept_exiles: "Exiles"
 concept_exiled: "Exiled"
 concept_in_exile: "In Exile"
 concept_exile_desc: "A [concept_character] may be $concept_exiled$ using the #b Exile Dissident#! character action. The $concept_character$ becomes an [concept_agitator] and is expelled from your country.\n\nAn $concept_exiled$ $concept_character$ may be invited to any [concept_country] through the #b Invite Exile#! character action, where they will immediately start or join a [concept_political_movement] for that $concept_country$ in accordance with their [concept_ideology]. If all their [Concept('concept_endorse_oppose', '$concept_endorsed$')] [Concept('concept_law', '$concept_laws$')] are already active when they arrive, the invited $concept_agitator$ will remain dormant.\n\nAn $concept_exiled$ $concept_character$ can only be invited if their [concept_acceptance_status] is one of the following in your [concept_country]: $SECOND_RATE_CITIZEN_GC_LINK$ or $FULL_ACCEPTANCE_GC_LINK$."

 concept_message_settings_feed: "Feed"
 concept_message_settings_feed_desc: "Notifications that appear in chronological order in the feed in the bottom-right corner of the screen."

 concept_message_settings_toast: "Toast"
 concept_message_settings_toasts: "Toasts"
 concept_message_settings_toast_desc: "Notifications that appear one at a time in the middle of the screen."

 concept_message_settings_popup: "Popup"
 concept_message_settings_popup_desc: "Customized Notifications that pop up in the middle of the screen and have to be manually closed. This option is only available if the Notification Type has a customized popup panel specified."

 concept_message_settings_none: "None"
 concept_message_settings_none_desc: "Notifications that does not appear anywhere in the user interface."

 concept_alert_settings_alert: "Alert"
 concept_alert_settings_alerts: "Alerts"
 concept_alert_settings_alert_desc: "Alerts that appear as their own individual element with an icon to the right of the [Concept('concept_capacity','$concept_capacities$')] and #b Current Situation#! at the top center of the screen."

 concept_alert_settings_important_action: "Important Action"
 concept_alert_settings_important_actions: "Important Actions"
 concept_alert_settings_important_action_desc: "Alerts that appear in the list when you click the #b Current Situations#! button."

 concept_alert_settings_angry_important_action: "Angry Important Action"
 concept_alert_settings_angry_important_actions: "Angry Important Actions"
 concept_alert_settings_angry_important_action_desc: "Red Alerts that appear in the list when you click the #b Current Situations#! button."

 concept_alert_settings_none: "None"
 concept_alert_settings_none_desc: "Alerts/important actions that does not appear anywhere in the user interface."

 concept_training_rate: "Training Rate"
 concept_training_rate_desc:1 "The $concept_training_rate$ is the amount of [concept_manpower] that can be trained per week at a [concept_military_building]."

 concept_landing_progress: "Landing Progress"
 concept_landing_progress_desc: "The $concept_landing_progress$ is equivalent to how much [concept_occupation] the invader has gained of the invaded [concept_state]. If the $concept_landing_progress$ reaches #v 100%#!, the #b Naval Invasion#! is successful and a [concept_front] will be established."

 concept_naval_invasion_support: "Naval Invasion Support"
 concept_naval_invasion_support_desc: "$concept_naval_invasion_support$ is a comparison of the amount of the [Concept('concept_ship','$concept_ships$')] you have assigned to naval invasion to the amount of [Concept('concept_battalion','$concept_battalions$')] taking part in that invasion. Each invading $concept_battalion$ requires a $concept_ship$ to avoid any negative penalties upon landing."

 concept_capitulation_desire: "Capitulation Desire"
 concept_capitulation_desire_desc: "An AI-controlled [concept_country] will try to capitulate if this value reaches 0 or higher."

 concept_risk: "Risk"
 concept_risk_desc: "The Risk of a particular [concept_terrain] type influences the amount of [concept_casualties] and [concept_wounded] a [concept_battle] would result in."

 concept_terrain_labels: "Terrain Labels"
 concept_terrain_labels_desc: "A [concept_terrain] Label is a grouping of several $concept_terrain$ Types. [Concept('concept_character_trait','$concept_character_traits$')] can have [Concept('concept_modifier','$concept_modifiers$')] affecting all $concept_terrain$ Types with a specific Terrain Label."

 concept_job_satisfaction: "Job Satisfaction"
 concept_job_satisfaction_satisfied: "Satisfied"
 concept_job_satisfaction_dissatisfied: "Dissatisfied"
 concept_job_satisfaction_desc: "Pops can be satisfied or dissatisfied with their jobs based on a number of factors such as their [concept_sol] or [concept_building_wage]. This determines whether they are looking for new [concept_employment] or not."

 concept_employment: "Employment"
 concept_employed: "Employed"
 concept_employees: "Employees"
 concept_employment_desc: "A [concept_pop] working in a [concept_building] is said to be $concept_employed$. $concept_employment$ provides the $concept_pop$ with a [concept_building_wage]. An $concept_employed$ $concept_pop$ can switch jobs if a job with a better $concept_building_wage$ appears as long as they have the [concept_pop_qualifications] for it."

 concept_power_bloc: "Power Bloc"
 concept_power_blocs: "Power Blocs"
 concept_power_bloc_possessive: "Power Bloc’s"
 concept_power_blocs_possessive: "Power Blocs’"
 concept_power_bloc_short: "Bloc"
 concept_power_bloc_shorts: "Blocs"
 concept_power_bloc_desc: "Power Blocs are multinational associations, led by a [concept_great_power], [concept_major_power], or [Concept('concept_unrecognized_power', '$concept_unrecognized_major_power$')], that grant powerful effects to [Concept('concept_power_bloc_leader','$concept_power_bloc_leaders$')] and [Concept('concept_power_bloc_member','$concept_power_bloc_members$')]. They serve the [Concept('concept_power_bloc_leader','$concept_power_bloc_leader_short$')] in building their sphere of influence by building up [concept_power_bloc_leverage_advantage] in [Concept('concept_country','$concept_countries$')] to make them join the [concept_power_bloc]."

 concept_power_bloc_rank: "Power Bloc Rank"
 concept_power_bloc_rank_short: "Rank"
 concept_power_bloc_rank_desc: "A [Concept('concept_power_bloc','$concept_power_bloc_possessive$')] Rank is solely based on its [Concept('concept_power_bloc_member','$concept_power_bloc_members_short$')] total [concept_prestige] compared to all other $concept_power_blocs$."

 concept_power_bloc_leader: "Power Bloc Leader"
 concept_power_bloc_leader_possessive: "Power Bloc Leader’s"
 concept_power_bloc_leaders: "Power Bloc Leaders"
 concept_power_bloc_leader_short: "Bloc Leader"
 concept_power_bloc_leader_possessive_short: "Bloc Leader’s"
 concept_power_bloc_leaders_short: "Bloc Leaders"
 concept_power_bloc_leader_extra_short: "Leader"
 concept_power_bloc_leader_possessive_extra_short: "Leader’s"
 concept_power_bloc_leaders_extra_short: "Leaders"

 concept_power_bloc_leader_desc: "A [concept_great_power], [concept_major_power], or [Concept('concept_unrecognized_power', '$concept_unrecognized_major_power$')] that leads a [concept_power_bloc]. They tend to benefit more from [Concept('concept_power_bloc','$concept_power_blocs$')] than regular [Concept('concept_power_bloc_member','$concept_power_bloc_members$')]."

 concept_power_bloc_member: "Power Bloc Member"
 concept_power_bloc_members: "Power Bloc Members"
 concept_power_bloc_member_short: "Bloc Member"
 concept_power_bloc_members_short: "Bloc Members"
 concept_power_bloc_member_extra_short: "Member"
 concept_power_bloc_members_extra_short: "Members"
 concept_power_bloc_member_non_leader: "Non-leader Power Bloc Member"
 concept_power_bloc_members_non_leader: "Non-leader Power Bloc Members"
 concept_power_bloc_member_short_non_leader: "Non-leader Bloc Member"
 concept_power_bloc_members_short_non_leader: "Non-leader Bloc Members"
 concept_power_bloc_member_extra_short_non_leader: "Non-leader Member"
 concept_power_bloc_members_extra_short_non_leader: "Non-leader Members"
 concept_power_bloc_member_desc: "A member of a [concept_power_bloc], this includes the [Concept('concept_power_bloc_leader','$concept_power_bloc_leader_short$')] #b except#! when calculating [concept_power_bloc_mandate_progress]. Although, $concept_power_bloc_members_short_non_leader$ tend to benefit less from [Concept('concept_power_bloc','$concept_power_blocs$')] than their [Concept('concept_power_bloc_leader','$concept_power_bloc_leaders$')]."

 concept_power_bloc_identity: "Central Identity Pillar"
 concept_power_bloc_identity_short: "Central Identity"
 concept_power_bloc_identity_extra_short: "Identity"
 concept_power_bloc_identity_desc: "The $concept_power_bloc_identity$ defines the core values a [concept_power_bloc] revolves around. They determine the [concept_power_bloc]'s [concept_power_bloc_cohesion] and grant special powers to the [concept_power_bloc_leader]. They can unlock certain [Concept('concept_power_bloc_principle_group','$concept_power_bloc_principle_groups$')]."

 concept_power_bloc_principle: "Principle"
 concept_power_bloc_principles: "Principles"
 concept_power_bloc_principle_desc: "$concept_power_bloc_principles$ belong to a [concept_power_bloc_principle_group] and are bestowing different kinds of effects on [Concept('concept_power_bloc','$concept_power_blocs$')] and [concept_power_bloc_member]. They cost [Concept('concept_power_bloc_mandate','$concept_power_bloc_mandates$')] to enact and can be upgraded."

 concept_power_bloc_primary_principle_group: "Primary Principle Group"
 concept_power_bloc_primary_principle_groups: "Primary Principle Groups"
 concept_power_bloc_primary_principle_group_short: "Primary Group"
 concept_power_bloc_primary_principle_groups_short: "Primary Groups"
 concept_power_bloc_primary_principle_group_extra_short: "Primary"
 concept_power_bloc_primary_principle_group_desc: "A $concept_power_bloc_primary_principle_group$ is dependent on a [Concept('concept_power_bloc','$concept_power_bloc_possessive$')] selected [concept_power_bloc_identity]. A $concept_power_bloc$ must always have at least one [concept_power_bloc_principle] from a $concept_power_bloc_primary_principle_group_short$ to have a stable [concept_power_bloc_cohesion]. [Concept('concept_power_bloc_mandate','$concept_power_bloc_mandating$')] higher-tier $concept_power_bloc_principles$ from $concept_power_bloc_primary_principle_groups_short$ (tier II and III) strengthens the $concept_power_bloc_cohesion$ further."

 concept_power_bloc_principle_group: "Principle Group"
 concept_power_bloc_principle_groups: "Principle Groups"
 concept_power_bloc_principle_group_desc: "Groups of three tiers of [Concept('concept_power_bloc_principle','$concept_power_bloc_principles$')] that support the same theme."

 concept_power_bloc_mandate: "Mandate"
 concept_power_bloc_mandates: "Mandates"
 concept_power_bloc_mandated: "Mandated"
 concept_power_bloc_mandating: "Mandating"
 concept_power_bloc_mandate_desc: "$concept_power_bloc_mandates$ are used to upgrade, switch or enact new [Concept('concept_power_bloc_principle','$concept_power_bloc_principles$')]. [Concept('concept_power_bloc','$concept_power_blocs$')] gain [concept_power_bloc_mandate_progress] by having powerful [Concept('concept_power_bloc_member','$concept_power_bloc_members$')] and a high [concept_power_bloc_cohesion] value. Up to three $concept_power_bloc_mandates$ can be stored."

 concept_power_bloc_mandate_progress: "Mandate Progress"
 concept_power_bloc_mandate_progress_desc: "The progress towards the next [concept_power_bloc_mandate]. [Concept('concept_power_bloc','$concept_power_blocs$')] gain progress by having powerful [Concept('concept_power_bloc_member','$concept_power_bloc_members$')] and a high [concept_power_bloc_cohesion] value."

 concept_power_bloc_cohesion: "Cohesion"
 concept_power_bloc_cohesion_desc: "$concept_power_bloc_cohesion$ is the indicator for how well a [concept_power_bloc] is running. It is mostly affected by the [concept_power_bloc_identity] which informs what impacts the value. The larger the [concept_power_bloc], the lower the Cohesion will generally be."

 concept_power_bloc_leverage: "Leverage"
 concept_power_bloc_leverage_desc: "[Concept('concept_power_bloc','$concept_power_blocs$')] build up $concept_power_bloc_leverage$ in [Concept('concept_country','$concept_countries$')] over time, by comparing their influence in the $concept_country$ to that of other $concept_power_blocs$. $concept_power_bloc_leverage$ share can be gained through different interactions, for example an active [concept_diplomatic_pact] or [concept_treaty], and current $concept_power_bloc_leverage$ will drift towards this share each week. Once enough [concept_power_bloc_leverage_advantage] has been accumulated over a $concept_country$, they can be invited to the $concept_power_bloc$."

 concept_power_bloc_unclaimed_leverage: "Unclaimed Leverage"
 concept_power_bloc_unclaimed_leverage_short: "Unclaimed"
 concept_power_bloc_unclaimed_leverage_desc: "A [Concept('concept_country','$concept_country_possessive$')] $concept_power_bloc_unclaimed_leverage$ is the [concept_power_bloc_leverage] that no [concept_power_bloc] has claimed on that $concept_country$. It is based on the $concept_country_possessive$ #b Leverage Resistance#! which in turn is based on a number of factors like their [Concept('concept_law','$concept_laws$')] and [Concept('concept_pop','$concept_population$')], more people means more people to convince."

 concept_power_bloc_leverage_advantage: "Leverage Advantage"
 concept_power_bloc_leverage_advantage_short: "Advantage"
 concept_power_bloc_leverage_disadvantage: "Leverage Disadvantage"
 concept_power_bloc_leverage_disadvantage_short: "Disadvantage"
 concept_power_bloc_leverage_advantage_desc: "The amount of [concept_power_bloc_leverage] a [concept_power_bloc] has over a [concept_country] compared to the other $concept_power_blocs$. If the value is #positive_value +positive#! this $concept_power_bloc$ has a $concept_power_bloc_leverage_advantage$ meaning the most $concept_power_bloc_leverage$ of all $concept_power_blocs$; if it is #negative_value -negative#! this $concept_power_bloc$ has a $concept_power_bloc_leverage_disadvantage$ which means that some other $concept_power_blocs$ currently has more than them, or the $concept_country_possessive$ [concept_power_bloc_unclaimed_leverage] is higher.\n\nIn order for a [concept_power_bloc_leader] to invite a $concept_country$ into their $concept_power_bloc$, $concept_power_bloc_leverage_advantage$ must be positive and have reached a necessary threshold."

 concept_power_bloc_leverage_share: "Leverage Share"
 concept_power_bloc_leverage_share_desc: "A [Concept('concept_power_bloc','$concept_power_bloc_possessive$')] $concept_power_bloc_leverage_share$ of a [concept_country] is the total [concept_power_bloc_leverage] the $concept_power_bloc$ can have at any moment over that $concept_country$. $concept_countries$ have a finite amount of [concept_power_bloc_leverage] that [Concept('concept_power_bloc','$concept_power_blocs$')] can project on them. This $concept_power_bloc_leverage$ is divided up between all $concept_power_blocs$ with any $concept_power_bloc_leverage$ over this $concept_country$ resulting in each $concept_power_bloc_possessive$ $concept_power_bloc_leverage_share$. However, a certain amount of the $concept_power_bloc_leverage$ may become [Concept('concept_power_bloc_unclaimed_leverage','$concept_power_bloc_unclaimed_leverage_short$')] based on the $concept_country_possessive$ own #b Leverage Resistance#!."

 concept_power_struggle: "Power Struggle"
 concept_power_struggling: "Power Struggling"
 concept_power_struggle_desc: "A $concept_power_struggle$ is the attempt of a [concept_power_bloc_member] to take leadership from the current [concept_power_bloc_leader]. It automatically triggers if a [Concept('concept_power_bloc_member','$concept_power_bloc_member_non_leader$')] has #v [Subtract_CFixedPoint(GetDefine('NPowerBlocs','POWER_STRUGGLE_PRESTIGE_THRESHOLD_START'), '(CFixedPoint)1')|0%]#! more [concept_prestige] than the [concept_power_bloc_leader]. If they uphold at least #v [Subtract_CFixedPoint(GetDefine('NPowerBlocs','POWER_STRUGGLE_PRESTIGE_THRESHOLD_FAIL'), '(CFixedPoint)1')|0%]#! more $concept_prestige$ for #v [GetDefine('NPowerBlocs','POWER_STRUGGLE_DURATION_SUCCESS_MONTHS')|0] months#!, they become the new [concept_power_bloc_leader]."

 concept_autonomy: "Autonomy"
 concept_autonomous: "Autonomous"
 concept_autonomy_desc: "Each [concept_subject] [concept_country] has its own $concept_autonomy$ level. This level will determine what kind of interaction they will have with their [concept_overlord].\n\nA $concept_subject$ with high $concept_autonomy$ will be more independent in regards to diplomacy. They will also have lower tribute payments to their $concept_overlord$. There is a risk that a $concept_country$ that is too $concept_autonomous$ will attempt to Declare an #v $war_goal_independence_type_name$#! [concept_diplomatic_play].\n$concept_subjects$ with low $concept_autonomy$ will be more reliant on their $concept_overlords$ and pay larger tributes to their $concept_overlord$. $concept_subjects$ with the lowest level of $concept_autonomy$ can be integrated with a #v $dp_annex_subject$#! [concept_diplomatic_play] into their $concept_overlord$."

 concept_economic_dependence: "Economic Dependence"
 concept_economic_dependence_desc: "$concept_economic_dependence$ is the amount of economic reliance two [Concept('concept_country','$concept_countries$')] have between one another. The main influence of which is the amount of [Concept('concept_building','$concept_buildings$')] that are owned by the other $concept_country$. This can either be through direct ownership from a $concept_country$ or by [concept_pop] investors.\n\nBeing in a shared market will additionally take into consideration the difference in [concept_gdp] and the impact of each [Concept('concept_country','$concept_countries_possessive$')] produced [Concept('concept_good','$concept_goods$')] and owned $concept_buildings$ on $concept_pops$.\n\nIf the two $concept_countries$ are not in a shared market, the $concept_economic_dependence$ is impacted by [concept_trade]. The impact of this is dependent on the amount of $concept_trade$ between the two $concept_countries$ and the impact on $concept_good$ Market Balance."

 concept_electoral_confidence: "Electoral Confidence"
 concept_electoral_confidence_desc: "$concept_electoral_confidence$ is a measure in how much the electorate of a [concept_country] trusts that any elections held will be free and fair. Tampering with elections by rigging them in favor of a specific [concept_party] will lower $concept_electoral_confidence$, while allowing elections to proceed without interference will increase it. A low $concept_electoral_confidence$ will impact [concept_legitimacy] and the amount of [concept_political_strength] gained from votes, with the degree of effect varying based on your enacted [Concept('concept_law','$concept_laws$')] and [Concept('concept_amendment','$concept_amendments$')]."

 concept_princely_state: "Princely State"
 concept_princely_states: "Princely States"
 concept_princely_state_desc: "A $concept_princely_state$ is a state under the rule of a native Indian monarch subordinate to a European colonial power. They possess greatly different degrees of prominence within the Indian imperial system, but all are generally subject to a similar diplomatic arrangement."

 concept_crown_land: "Crown Land"
 concept_crown_lands: "Crown Lands"
 concept_crown_land_desc: "A $concept_crown_land$ is an administrative region of a dynastic empire, retaining varying levels of regional autonomy."

 concept_georegion: "Geographic Region"
 concept_georegions: "Geographic Regions"
 concept_georegion_desc: "A $concept_georegion$ is an area that corresponds to a collection of [Concept('concept_strategic_region','$concept_strategic_regions$')] and [Concept('concept_state_region','$concept_state_regions$')]. $concept_georegions$ are unchanging but may overlap and in some cases can be a part of a larger $concept_georegion$ altogether."

 concept_privy_purse: "Privy Purse"
 concept_privy_purse_desc: "A Privy Purse is the personal income of a [Concept('concept_ruler','Monarch')]. In the context of [GetGeographicRegion('geographic_region_india').GetName], it represents the pension paid to the former ruler of a [concept_princely_state] #b annexed#! by another [concept_country] using a #v The Federation of India#! [concept_journal_entry].\n\nThe $modifier_privy_purse_payments$ modifier will be added upon annexing any $concept_princely_state$ with this $concept_journal_entry$, and will be updated upon each subsequent annexation. The #b Privy Purse#! payments will add #b National Expenses#! equivalent to #v 0.01%#! [concept_gdp] times the number of #b Princely States#! annexed using this [concept_journal_entry]"

 concept_fervor: "Fervor"
 concept_fervor_desc:1 "$concept_fervor$ is a measure of the national spirit of a [concept_culture]. [Concept('concept_pop', '$concept_pops$')] of a $concept_culture$ with high $concept_fervor$ will [Concept('concept_assimilation','$concept_assimilate$')] more slowly, form more [Concept('concept_radical','$concept_radicals$')] when conquered, increase [concept_liberty_desire] and be more likely to join [Concept('concept_cultural_movement', '$concept_cultural_movements$')].\n\n#title The following conditions #b increase#! $concept_fervor$:#! #indent_newline:3 \n• Being a [Concept('concept_primary_cultures','$concept_primary_culture$')] of an independent [concept_country] with an #tooltippable;tooltip:[GetPlayer.GetTooltipTag],fervor_effects_from_citizenship_laws_tt applicable#! [SelectLocalization(GetPlayer.IsValid,'CITIZENSHIP_LINK','lawgroup_citizenship')] [concept_law]\n• Number of [concept_casualties] of this [concept_culture] in [concept_war]\n• Having high average [concept_literacy]\n• Number of [GetPopType('academics').GetName] $concept_pops$ of this $concept_culture$\n• $concept_pops$ of this culture resident in $concept_countries$ with [GetTechnology('nationalism').GetName] or [GetTechnology('pan-nationalism').GetName] [Concept('concept_technology', '$concept_technologies$')]\n• Being a $concept_primary_culture$ of a $concept_country$ with an applicable [GetInstitutionType('institution_schools').GetName] [concept_institution]\n• Other $concept_culture$ released as independent $concept_countries$\n• Experiencing a [concept_national_awakening]#!\n\n#title The following conditions #b decrease#! $concept_fervor$:#! #indent_newline:3 \n• Being a $concept_primary_culture$ of a $concept_country$ with the [GetLawType('law_multicultural').GetName] $concept_law$\n• Having high average [concept_acceptance]#!"

 fervor_effects_from_citizenship_laws_tt: "#title Applicable [Concept('concept_law','$concept_laws$')] include:#!\n• $law_ethnostate$ (#v +20#!)\n• $law_national_supremacy$ (#v +15#!)\n• $law_racial_segregation$ (#v +10#!)\n• $law_cultural_exclusion$ (#v +5#!)"

 concept_cultural_movement: "Cultural Movement"
 concept_cultural_movements: "Cultural Movements"
 concept_cultural_movement_desc:1 "$concept_cultural_movements$ are [Concept('concept_political_movement','$concept_political_movements$')] pursuing a better life for people of a specific [concept_culture]. If this culture is the [Concept('concept_primary_cultures','$concept_primary_culture$')] of a [concept_country], the movement will push a nationalistic agenda. Otherwise, the movement will push for [Concept('concept_law','$concept_laws$')] which give their people greater [concept_acceptance], or even attempt a [concept_secession].\n\nIf a $concept_cultural_movement$'s [concept_activism] exceeds @activism_red! $RADICALISM_PROTESTING$ (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!), it will begin to generate [concept_obstinance] in $concept_states$ with $concept_political_movement_supporting$ $concept_pops$."

 concept_religious_movement: "Religious Movement"
 concept_religious_movements: "Religious Movements"
 concept_religious_movement_desc: "$concept_religious_movements$ are [Concept('concept_political_movement','$concept_political_movements$')] pursuing a better life for people of a specific [concept_religion]. If this $religion$ is the [concept_state_religion] of a [concept_country], the movement will push a traditionalist agenda. Otherwise, the movement will push for [Concept('concept_law','$concept_laws$')] which give their people greater [concept_acceptance], or even attempt a [concept_secession].\n\nIf a $concept_religious_movement$'s [concept_activism] exceeds @activism_red! $RADICALISM_PROTESTING$ (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!), it will begin to generate [concept_obstinance] in $concept_states$ with $concept_political_movement_supporting$ $concept_pops$."

 concept_dynastic_loyalty: "Dynastic Loyalty"
 concept_dynastic_loyalty_desc:1 "$concept_dynastic_loyalty$ represents the Serbian population's support for keeping the ruling dynasty on the throne, as opposed to their rivals. The ruling dynasty must gain enough support to prevent the opposition from voicing a claim. Failing to do so will cause them to lose the throne, and stagnate national growth.\n\nThe following conditions will #bold advance#! $concept_dynastic_loyalty$:\n• High [concept_ruler] [concept_popularity]\n• Low [concept_popularity] of rival claimants\n• High [concept_legitimacy] \n• High [concept_sol]\n• Fraction of [Concept('concept_loyalist','$concept_loyalists$')]\n• Non-[concept_marginalized] [Concept('concept_interest_group','$concept_interest_groups$')] [concept_in_opposition] above 4 [concept_approval] by [concept_clout] \n• Has [GetLawType('law_censorship').GetName] or [GetLawType('law_outlawed_dissent').GetName] enacted\n• Not being a [concept_subject]\n• Each [concept_major_power] or [concept_great_power] supporting our independence\n• Events or other choices\n\nThe following conditions will #bold deplete#! $concept_dynastic_loyalty$:\n• Low [concept_ruler] [concept_popularity]\n• High [concept_popularity] of rival claimants\n• Low [concept_legitimacy]\n• Low [concept_sol]\n• Fraction of [Concept('concept_radical','$concept_radicals$')]\n• Non-[concept_marginalized] [Concept('concept_interest_group','$concept_interest_groups$')] [concept_in_opposition] below -4 [concept_approval] by [concept_clout] \n• Negative [concept_authority]\n• Negative [concept_bureaucracy]\n• Positive [concept_relations] with [concept_overlord]\n• Events or other choices"

 concept_brz_national_hero: "National Hero"
 concept_brz_national_hero_desc: "A #bold National Hero#! is a general who has won a battle against a state that is not Brazilian, and been hailed as a hero in the event '#bold A New National Hero#!'."

 # IP3 Concepts
 concept_house_of_obrenovic: "House of Obrenović"
 concept_house_of_obrenovic_short: "Obrenović"
 concept_house_of_obrenovic_desc: "The $concept_house_of_obrenovic$ is one of the two contending $SER_ADJ$ royal houses. They are descended from #b Miloš Obrenović#!, leader of the Second Serbian Uprising and founder of the autonomous Principality of Serbia. Supporters of the $concept_house_of_obrenovic_short$ typically favor improved [concept_relations] with #b Austria#!."

 concept_house_of_karadjordjevic: "House of Karađorđević"
 concept_house_of_karadjordjevic_short: "Karađorđević"
 concept_house_of_karadjordjevic_desc: "The $concept_house_of_karadjordjevic$ is one of the two contending $SER_ADJ$ royal houses. They are descended from #b Karađorđe#!, leader of the ill-fated First Serbian Uprising against the Ottoman Empire. Supporters of the $concept_house_of_karadjordjevic_short$ typically favor improved [concept_relations] with #b Russia#!."

 concept_lands_of_anarchy_control: "Control over the Lands of Anarchy"
 concept_lands_of_anarchy_control_short: "Control"
 concept_lands_of_anarchy_control_desc: "$concept_lands_of_anarchy_control_short$ represents the Makhzen's authority over the remote tribes of Morocco.\n\nThere is a bar for each surrounding [concept_state] to the [concept_capital_state]. A higher value indicates that the tribesfolk respect and fear the [concept_government]'s decisions more, thus enabling officials to carry out their tasks effectively. Each state's starting negative [concept_modifier] scales monthly based on its current value. Greater $concept_lands_of_anarchy_control_short$ results in less effective penalties, and vice versa.\n\nBy developing the chaotic state centers, creating more job opportunities, and fostering connections between urban and rural life, the tribes will gradually be influenced, reducing their isolation. Ultimately, their influence over the tribesmen will fade away.\n\nFailing to maintain $concept_lands_of_anarchy_control_short$ can prepare our downfall, leaving behind long-lasting effects on these states."

 concept_austrian_constitutional_pressure: "Constitutional Pressure"
 concept_austrian_constitutional_pressure_short: "Pressure"
 concept_austrian_constitutional_pressure_desc: "$concept_austrian_constitutional_pressure$ represents the strength and influence of the opposition to the neo-absolutist regime, and is tied to the preceived authority of the regime.\n\nShould $concept_austrian_constitutional_pressure$ reach #v 100#!, the neo-absolutist government will fall, and a constitution will be have to be granted. \n\n#title The following conditions #r #b increase#!#! $concept_austrian_constitutional_pressure_short$:#! #indent_newline:3 \n• Having a [concept_war_goal] enforced on you\n• Declaring [concept_bankruptcy]\n• Taking [concept_loans]\n• [Concept('concept_state','$concept_states$')] with [Concept('concept_radical','$concept_radicals$')]\n• [Concept('concept_interest_group','$concept_interest_groups$')] opposing [GetLawType('law_autocracy').GetName]\n• [Concept('concept_activism', '$concept_activism_short$')] of #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt Liberal#!, #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt Socialist#!, and $movement_cultural_minority_short$ [Concept('concept_political_movement','$concept_political_movements$')]\n• Having a [concept_bureaucracy] deficit\n• Events and other conditions #!\n\n#title The following conditions #g #b decrease#!#! $concept_austrian_constitutional_pressure_short$:#! #indent_newline:3 \n• Having a positive budget balance\n• Enforcing a [concept_war_goal] on a [concept_great_power]\n• [Concept('concept_state', '$concept_states$')] with [Concept('concept_loyalist','$concept_loyalists$')]\n• [Concept('concept_interest_group','$concept_interest_groups$')] supporting [GetLawType('law_autocracy').GetName]\n• [Concept('concept_political_movement_support', '$concept_political_movement_support_short$')] of $movement_royalist_absolutist_short$, $movement_religious_majority_short$, and $movement_cultural_majority_short$ [Concept('concept_political_movement','$concept_political_movements$')]\n• Having a [concept_bureaucracy] surplus\n• Events and other conditions #!"

 concept_coup: "Coup"
 concept_coups: "Coups"
 concept_coup_desc: "A $concept_coup$ is an attempt by a [concept_commander] with low [concept_loyalty] to overthrow the sitting [concept_government]. The risk of a $concept_coup$ increases when a [concept_country] is ruled by a $concept_government$ with low [concept_legitimacy], or if a disloyal $concept_commander$ has a high [Concept('concept_commander_rank', 'concept_commander_rank_short')] and [concept_popularity].\n\nOnce a $concept_coup$ begins, if its progress reaches #v 100%#!, the commander executing the $concept_coup$ will issue a [concept_pronunciamento]. A successful $concept_pronunciamento$ will cause the overthrow of the $concept_government$.\n\nThe progress of a $concept_coup$ is determined by the [concept_coup_strength] of the commander executing the $concept_coup$, evaluated against the [concept_coup_resistance] of the sitting government."

 concept_coup_strength: "Coup Strength"
 concept_coup_strength_short: "Strength"
 concept_coup_strength_desc: "$concept_coup_strength$ represents the ability for a [concept_commander] to successfully orchestrate a [concept_coup] against the sitting [concept_government]. A $concept_coup$ will #b progress#! when the $concept_commander$'s [concept_interest_group]'s [concept_approval] is #b negative#!, and the $concept_coup_strength$ of the $concept_commander$ orchestrating the $concept_coup$ is higher than the [concept_coup_resistance] of the sitting government.\n\nFactors contributing to $concept_coup_strength$ include:\n• High [concept_popularity]\n• High [concept_commander_rank]\n• [concept_clout] of $concept_commander$ $concept_interest_group$\n• Proximity of the [concept_commander]'s [concept_military_formation] to the [concept_capital_state]"

 concept_coup_resistance: "Coup Resistance"
 concept_coup_resistance_short: "Resistance"
 concept_coup_resist: "Resist"
 concept_coup_resistant: "Resistant"
 concept_coup_resistance_desc: "$concept_coup_resistance$ represents the ability for a [concept_government] to fend off a [concept_coup] by a [concept_commander]. A $concept_coup$ will #b retreat#! when the $concept_coup_resistance$ of the sitting $concept_government$ is higher than the [concept_coup_strength] of the $concept_commander$ orchestrating the $concept_coup$.\n\nFactors contributing to $concept_coup_resistance$ include:\n• High [concept_government] [concept_legitimacy]\n• Level of [GetInstitutionType('institution_home_affairs').GetName] investment under [GetLawType('law_secret_police').GetName] or [GetLawType('law_national_guard').GetName] [Concept('concept_law', '$concept_laws$')]"

 concept_pronunciamento: "Pronunciamento"
 concept_pronunciamento_desc: "A $concept_pronunciamento$ is the final stage of a [concept_coup], in which a [concept_commander] declares opposition to the sitting [concept_government] and rallies their forces to support them. When a $concept_pronunciamento$ occurs, the [concept_coup_resistance] of the sitting $concept_government$ is compared to the [concept_coup_strength] of $concept_commander$ executing the $concept_coup$.\n\nIf the $concept_coup_strength$ of the $concept_commander$ is less than the $concept_coup_resistance$ of the $concept_government$, or if the $concept_coup$ is triggered by a Character Interaction, the $concept_government$ will have a chance to defend itself against the $concept_coup$. The $government$'s chance of successfully defending itself is determined by the ratio of [concept_coup_resistance] to the aforementioned factors.\n\nA successful $concept_pronunciamento$ will cause the overthrow of the $concept_government$. A failed $concept_pronunciamento$ will result in increased [Concept('concept_radical', '$concept_radicalism$')], and negative repercussions for the coupist $concept_commander$."

 concept_negotiation: "Negotiation"
 concept_negotiations: "Negotiations"
 concept_negotiating: "Negotiating"
 concept_negotiated: "Negotiated"
 concept_negotiate: "Negotiate"
 concept_negotiation_desc: "$concept_negotiate$ with an [concept_interest_group] during [Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enactment$')] to convince them to change their stance on the currently $concept_enactment_of_laws_enacting$ [concept_law]. An $concept_interest_group_possessive$ willingness to $concept_negotiate$ is determined by their [concept_amenability]. The higher $concept_amenability$ they have the friendlier and more willing they will be to $concept_negotiate$.\n\n@indifferent! [Concept('concept_endorse_oppose', '$concept_indifferent$')] $concept_interest_groups$ must be @in_government! [concept_in_government] to be $concept_negotiated$ with while @disapproves! [Concept('concept_endorse_oppose', '$concept_opposing$')] $concept_interest_groups$ can be $concept_negotiated$ with when [concept_in_opposition].\n\nConvincing an $concept_interest_group$ to move from @disapproves! $concept_opposing$ to @indifferent! $concept_indifferent$ can be just as effective has convincing them to move from @indifferent! [Concept('concept_endorse_oppose', '$concept_indifferent$')] to @approves! [Concept('concept_endorse_oppose', '$concept_endorsing$')]."

 concept_guerilla_war: "Guerilla War"
 concept_guerilla_war_desc: "A $concept_guerilla_war$ is a special kind of [concept_war] subject to a set of rules distinct from regular warfare, the details of which can differ from one $concept_guerilla_war$ to another.\n\nThe following general rules are applied during a $concept_guerilla_war$:\n#indent_newline:2 $EFFECT_LIST_BULLET$ [Concept('concept_battle', '$concept_battles$')] are much smaller in size and created at a lower pace#! \n#indent_newline:2 $EFFECT_LIST_BULLET$ The [GetBattleCondition('battle_condition_guerilla_skirmish').GetName], [GetBattleCondition('battle_condition_guerilla_ambush').GetName] and [GetBattleCondition('battle_condition_guerilla_disarray').GetName] [Concept('concept_battle_condition', '$concept_battle_conditions$')] can occur#!\n#indent_newline:2 $EFFECT_LIST_BULLET$ Victories do not grant [concept_occupation] Score#!\n#indent_newline:2 $EFFECT_LIST_BULLET$ A $concept_guerilla_war$ may escalate into a regular $concept_war$ if conflict specific conditions are met"

 concept_amenability: "Amenability"
 concept_amenability_desc: "How willing an [concept_interest_group] is to [Concept('concept_negotiation', '$concept_negotiate$')] during the [concept_enactment_of_laws], higher value means more willing.\n\n#b 0 - [GetDefine('NPolitics', 'MIN_AMENABILITY_TENSE_NEGOTIATION')]#!:     Will #r refuse#! to $concept_negotiate$\n#b [GetDefine('NPolitics', 'MIN_AMENABILITY_TENSE_NEGOTIATION')] - [GetDefine('NPolitics', 'MIN_AMENABILITY_NORMAL_NEGOTIATION')]#!:   #v #r $negotiation_tier_3$#!#!\n#b [GetDefine('NPolitics', 'MIN_AMENABILITY_NORMAL_NEGOTIATION')] - [GetDefine('NPolitics', 'MIN_AMENABILITY_FRIENDLY_NEGOTIATION')]#!:   #v $negotiation_tier_2$#!\n#b [GetDefine('NPolitics', 'MIN_AMENABILITY_FRIENDLY_NEGOTIATION')] - 100#!: #v #g $negotiation_tier_1$#!#!"

 concept_obstinance: "Obstinance"
 concept_obstinate: "Obstinate"
 concept_obstinance_desc:1 "$concept_obstinance$ represents [Concept('concept_pop', '$concept_pops$')] supporting a [concept_cultural_movement] or [concept_religious_movement] within a [concept_state] passively refusing to comply with a [concept_country]'s [Concept('concept_institution', '$concept_institutions$')]. $concept_obstinance$ is caused by the [concept_activism] of an applicable [Concept('concept_political_movement', '$concept_political_movement_short$')] exceeding @activism_red! $RADICALISM_PROTESTING$ (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!). The amount of $concept_obstinance$ is equal to the fraction of the $concept_state$'s [concept_workforce] that are members of an $concept_obstinate$ $concept_political_movement$.\n\nThe presence of $concept_obstinance$ in a state inflicts a number of negative local status effects on a $concept_state$, such as reduced [concept_assimilation], [Concept('concept_taxes','$state_tax_collection_mult$')], [Concept('concept_conscription_center','$concept_conscription$')], and $concept_institution$ impact."

 concept_bavarocratic_ire: "Bavarocratic Ire"
 concept_bavarocratic_ire_short: "Ire"
 concept_bavarocratic_ire_desc: "$concept_bavarocratic_ire_short$ represents the Greek population's opposition to the rule of the Bavarian clique in Greece. High $concept_bavarocratic_ire_short$ may result in the ousting of King Otto and his Bavarian supporters.\n\nThe following conditions will #bold advance#! $concept_bavarocratic_ire_short$:\n• [GetCulture('south_german').GetName] [Concept('concept_commander','$concept_commanders$')] or [Concept('concept_character', '$concept_characters$')] in [concept_in_government]\n• #bold Not#! having an [GetReligion('orthodox').GetName] [concept_ruler]\n• The [concept_ruler] #bold Not#! having an [concept_heir]\n• The [concept_ruler] being unmarried \n• #bold Not#! having [Concept('concept_votes','$concept_voting_rights$')]\n• Fielding less than #v 10#! [Concept('concept_battalion', '$concept_battalions$')]\n• [Concept('concept_radical','$concept_radicals$')] in owned [GetCulture('greek').GetName] [concept_homeland] [Concept('concept_state','$concept_states$')]\n• Having recently #r lost#! a [concept_war]\n• Event or button choices\n\nThe following conditions will #bold deplete#! $concept_bavarocratic_ire_short$:\n• Owning [GetCulture('greek').GetName] [concept_homeland] [Concept('concept_state','$concept_states$')]\n• [Concept('concept_loyalist','$concept_loyalists$')] in owned [GetCulture('greek').GetName] [concept_homeland] [Concept('concept_state','$concept_states$')]\n• Having recently #g won#! a [concept_war]\n• Having at least one [GetBuildingType('building_university').GetName] in a [GetCulture('greek').GetName] [concept_homeland] [concept_state]\n• Fielding more than #v 20#! [Concept('concept_battalion', '$concept_battalions$')]\n• Event or button choices"

 concept_disqualified_culture: "Disqualified Culture"
 concept_disqualified_culture_short: "Disqualified"
 concept_disqualified_culture_present: "Disqualify"
 concept_disqualified_culture_verb: "Disqualifies"
 concept_disqualified_culture_present_verb: "Disqualifying"
 concept_disqualified_culture_desc: "A [concept_culture] is $concept_disqualified_culture_short$ for the purposes of organizing the #b $dyn_c_usga$#! if its demands are refused. Typically, this occurs as a result of [Concept('concept_integrated_culture','$concept_integrated_culture_present_verb$')] a different $concept_culture$ with which the culture to be $concept_disqualified_culture_short$ shares [concept_homeland] [Concept('concept_state','$concept_states$')]. $concept_disqualified_culture_short$ $concept_cultures$ may not be negotiated with further, or $concept_integrated_culture_short$ under any circumstances."

 concept_integrated_culture: "Integrated Culture"
 concept_integrated_culture_short: "Integrated"
 concept_integrated_culture_present: "Integrate"
 concept_integrated_culture_present_verb: "Integrating"
 concept_integrated_culture_verb: "Integrates"
 concept_integrated_culture_process: "Integration"
 concept_integrated_culture_desc: "An $concept_integrated_culture$ is a [concept_culture] whose demands have been satisfactorily addressed during the process of organizing the #b $dyn_c_usga$#!. When a $concept_culture$ is $concept_integrated_culture_short$, it becomes a [Concept('concept_primary_cultures','$concept_primary_culture$')], and contributes to the progress of the #b $je_danubian_federation$#! [concept_journal_entry]. $concept_integrated_culture_short$ $concept_cultures$ may become [Concept('concept_disqualified_culture','$concept_disqualified_culture_short$')] if their demands are contradicted following their $concept_integrated_culture_process$. $concept_disqualified_culture_present_verb$ a $concept_culture$ that has already been $concept_integrated_culture_short$ will lead to heavy penalties."

 concept_radicalized_interest_group: "Radicalized Interest Group"
 concept_radicalized_interest_group_desc: "When an [concept_interest_group]'s [concept_approval] is below [GetApprovalRatingFromValue(GetDefine('NPolitics','APPROVAL_THRESHOLD_ANGRY'))], it is said to be $concept_radicalized$. A $concept_radicalized$ $concept_interest_group$ is likely to become [Concept('concept_insurrection','$concept_insurrectionary$')], or stage a [concept_coup] against the sitting [concept_government]."

 concept_strait_access: "Strait Access"
 concept_strait_accesses: "Strait Accesses"
 concept_strait_access_short: "Access"
 concept_strait_access_desc: "$concept_strait_access$ determines what [Concept('concept_ship','$concept_ships$')] can pass through a [concept_strait]. It can be changed by the [Concept('concept_strait_control','$concept_strait_controller$')] of either side of the $concept_strait$ by setting restrictions. [Concept('concept_country','$concept_countries$')] can also secure a [concept_treaty] to be guaranteed $concept_strait_access$ when they would normally be forbidden to pass.\n\n#title A $concept_strait$ can be:#!#indent_newline:3 \n#b Open#! - All $concept_ships$ may pass\n#b No Military#! - Only [GetGoods('merchant_marine').GetName] $concept_ships$ & [Concept('concept_supply_ship','$concept_supply_ships$')] may pass\n#b Closed#! - No $concept_ships$ may pass, potentially restricting access to the [concept_world_market]#!\n\nWhich [Concept('concept_country','$concept_countries$')] are affected by this restriction is determined by the [concept_strait_allowed_countries]. In the case where the two $concept_states$ have set different $concept_strait_accesses$, the most severe $concept_strait_access_short$ restriction will take precedence."

 concept_strait_allowed_countries: "Allowed Countries"
 concept_strait_allowed_countries_short: "Countries"
 concept_strait_allowed_countries_desc: "Determines which [Concept('concept_country','$concept_countries$')] are affected by the [concept_strait_access] restrictions if it is set to #b No Military#! or #b Closed#!\n\n#title The $concept_strait_allowed_countries$ can be set to:#!#indent_newline:3 \n#b No enemies#!#indent_newline:3 \n$concept_strait_access_short$ restrictions only affects $concept_ships$ from enemies of the [Concept('concept_strait_control','$concept_strait_controller$')]#!\n\n#b Only allies#!#indent_newline:3 \nOnly $concept_ships$ of allies to the $concept_strait_controller$ are exempt from the restrictions#!\n\n#b Only $concept_strait_controller_short$#!#indent_newline:3 \nOnly $concept_ships$ from the $concept_strait_controller$ & its [Concept('concept_subject','$concept_subjects$')] are exempt from the restrictions#!#!"

 concept_strait_control: "Strait Control"
 concept_strait_control_short: "Control"
 concept_strait_controller: "Strait Controller"
 concept_strait_controller_short: "Controller"
 concept_strait_control_desc: "$concept_strait_control$ is determined by control of the two [Concept('concept_state','$concept_states$')] on each side of a [concept_strait]. In all cases each [concept_country] with control over one of the $concept_states$ becomes a $concept_strait_controller$ that can change the [concept_strait_access] through the $concept_strait$, with the exception of #b $strait_gibraltar$#! which requires control of both $concept_states$ to be able to set the [concept_strait_access] to #b Closed#!.\n\nIn the case where the two $concept_states$ have set different $concept_strait_accesses$, the most severe $concept_strait_access_short$ restriction will take precedence."

 concept_japanese_emperor: "Emperor"
 concept_japanese_emperor_desc: "The Emperor, or Tennō, is the traditional ruler of #b Japan#!, as well as the head of the #b Shinto#! [concept_religion]. Throughout the Tokugawa period, the Emperor has remained secluded within the Imperial Palace in Kyōto, with their affairs tightly regulated by the Shogunate."

 concept_zaibatsu: "Zaibatsu"
 concept_zaibatsu_desc: "A #b #italic $concept_zaibatsu$#!#! is a family-owned and vertically-integrated industrial and financial conglomerate.\n\nA typical $concept_zaibatsu$ is organized around a holding company and a bank, which hold ownership shares in several, typically industrial, subsidiary companies. The $concept_zaibatsu$ emerged from family merchant congolomerates of the late Edo period, which made use of their pre-existing wealth and ties to the state to consolidate control of much of Japan's industrial base.\n\n[Concept('concept_company','$concept_companies$')] regarded as Zaibatsu include #v $company_mitsui$#!, #v $company_mitsubishi$#!, #v $company_yasuda$#!, and #v $company_sumitomo$#!."

 #Raiding
 concept_raiding: "Raiding"
 concept_raiding_short: "Raiding"
 concept_raiding_desc: "Raiding is income derived from the theft, pillage and plunder of neighboring lands over time. With little arable land, $MON$ must rely on $concept_raiding$ and [concept_russian_aid] to survive. \n\nOur income from raiding is dependent on our [concept_raiding_frequency] multiplied by our army's [concept_power_projection]. #g @money!+[GetPlayer.MakeScope.ScriptValue('max_raiding_income')]#! is the most we can possibly earn from raiding."
 #"Raiding Fervor"
 concept_raiding_frequency: "Raiding Fervor"
 concept_raiding_frequency_short: "Raiding Fervor"
 concept_raiding_frequency_desc: "$concept_raiding_frequency$ represents how often the tribes are permitted to [Concept('concept_raiding', 'raid')].\n\nIn addition to increasing our income from [concept_raiding], each #v 1%#! of $concept_raiding_frequency$ will also have the following effects:\n[GetStaticModifier('modifier_montenegrin_disobedience').GetDesc]"
 #Russian Aid
 concept_russian_aid: "Russian Aid"
 concept_russian_aid_short: "Russian Aid"
 concept_russian_aid_desc: "$concept_russian_aid$ is support from #v $RUS$#! to our tribes, as fellow brethren of the Orthodox Church. \n\nThe base amount we receive depends on our [concept_relations] with #v $RUS$#!: \n\n• #v Neutral Relations#! (or worse): @money!200 \n• #v Cordial Relations#! : @money!400 \n• #v Amicable Relations#! : @money!700 \n• #v Friendly Relations#! : @money!1000"

 concept_government_premium: "Government Premium"
 concept_government_premium_desc: "Coverage for services provided."
